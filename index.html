<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP - Grupo 4 PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --guindo: #800020; --accent: #ff9800; --bg: #f0f2f5; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; overflow-x: hidden; }
        
        header { background: var(--guindo); color: white; padding: 25px 15px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(128,0,32,0.2); transition: all 0.5s; }
        .container { padding: 15px; max-width: 500px; margin: auto; }

        /* CARDS */
        .card { background: white; border-radius: 24px; padding: 25px; margin-bottom: 20px; border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.05); transform: translateY(0); transition: 0.3s; }
        .card:active { transform: scale(0.98); }

        /* INPUTS */
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 2px solid #eee; font-size: 14px; transition: 0.3s; outline: none; }
        input:focus { border-color: var(--guindo); }

        .btn-main { background: var(--guindo); color: white; padding: 18px; width: 100%; border-radius: 18px; border: none; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 4px 15px rgba(128,0,32,0.3); }
        
        /* BOTONES ASISTENCIA */
        .asistencia-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
        .btn-check { padding: 10px 5px; font-size: 10px; font-weight: 800; border-radius: 10px; border: 2px solid #eee; background: white; color: #666; cursor: pointer; }
        .btn-check.active-p { background: #e8f5e9; border-color: #2e7d32; color: #2e7d32; }
        .btn-check.active-f { background: #ffebee; border-color: #d32f2f; color: #d32f2f; }
        .btn-check.active-per { background: #fff3e0; border-color: #ef6c00; color: #ef6c00; }

        /* TAREAS VISIBLES PARA ELLOS */
        .tarea-banner { background: #fff9c4; border-left: 5px solid #fbc02d; padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; font-weight: 700; }

        /* NAVBAR */
        .nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 25px; display: flex; justify-content: space-around; padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid white; }
        .nav i { font-size: 24px; color: #bdbdbd; cursor: pointer; transition: 0.3s; }
        .nav i.active { color: var(--guindo); transform: translateY(-5px); }

        .hidden { display: none !important; }
        .domingo-off { opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

<header id="main-header" class="animate__animated animate__fadeInDown">
    <img src="https://i.ibb.co/Lnbm2Xq/1000540900-jpg.jpg" style="width: 70px; border-radius: 50%; border: 3px solid white;">
    <h2 style="margin: 10px 0 0; letter-spacing: 1px; font-size: 18px;">GRUPO 4 • 2º AÑO</h2>
</header>

<div class="container">
    
    <div id="v-reg" class="view animate__animated animate__fadeIn">
        <div class="card">
            <h3 style="margin-top:0">Inscripción Oficial</h3>
            <input type="text" id="r-nom" placeholder="Nombre completo">
            <input type="number" id="r-ci" placeholder="C.I. / Documento">
            <button class="btn-main" onclick="app.registrar()">COMPLETAR REGISTRO</button>
        </div>
        <div id="tarea-anuncio" class="hidden"></div>
    </div>

    <div id="v-misa" class="view hidden animate__animated animate__fadeIn">
        <div class="card" id="misa-card">
            <h3 id="misa-titulo">⛪ Reporte de Misa</h3>
            <p id="misa-msg" style="font-size:12px; color:#888;"></p>
            
            <div id="misa-controles">
                <select id="sel-joven-misa"></select>
                <button class="btn-main" id="btn-in" style="background:#444" onclick="app.misaIn()">MARCAR ENTRADA</button>
                
                <div id="misa-final" class="hidden">
                    <textarea id="h-text" rows="3" placeholder="¿Qué aprendiste de la homilía? (Un párrafo corto)"></textarea>
                    <button class="btn-main" onclick="app.misaOut()">ENVIAR REPORTE AL FINAL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="v-admin" class="view hidden">
        <div class="card">
            <h3>📢 Poner Tarea Semanal</h3>
            <textarea id="task-input" placeholder="Escribe aquí la tarea que verán los chicos..."></textarea>
            <button class="btn-main" style="background:var(--accent)" onclick="app.postTask()">PUBLICAR TAREA</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>Lista de Hoy</h3>
                <button onclick="app.cerrarLista()" style="background:#2e7d32; color:white; border:none; padding:8px; border-radius:10px; font-size:10px;">CERRAR LISTA DE HOY</button>
            </div>
            <div id="lista-master-pro"></div>
        </div>
    </div>

</div>

<div class="nav">
    <i class="fas fa-id-badge active" onclick="app.nav('reg', this)"></i>
    <i class="fas fa-church" onclick="app.nav('misa', this)"></i>
    <i class="fas fa-crown" onclick="app.nav('admin', this)"></i>
</div>

<script>
    const app = {
        db: JSON.parse(localStorage.getItem('g4_vpro')) || { alumnos: [], reportes: [], tareaActual: "" },
        tempAsistencia: {},

        init: () => {
            app.checkDomingo();
            app.render();
        },

        checkDomingo: () => {
            const hoy = new Date().getDay(); // 0 es domingo
            const esDomingo = (hoy === 0);
            const card = document.getElementById('misa-card');
            if(!esDomingo) {
                document.getElementById('misa-controles').classList.add('domingo-off');
                document.getElementById('misa-msg').innerText = "Vuelve el domingo para reportar tu asistencia a misa.";
            } else {
                document.getElementById('misa-msg').innerText = "Registra tu llegada a la parroquia.";
            }
        },

        nav: (id, el) => {
            if(id === 'admin' && prompt("Acceso Michael:") !== "4444") return;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
            document.getElementById('v-'+id).classList.remove('hidden');
            el.classList.add('active');
            app.render();
        },

        registrar: () => {
            const n = document.getElementById('r-nom').value;
            if(!n) return;
            app.db.alumnos.push({ nombre: n, ci: document.getElementById('r-ci').value, p:0, f:0, per:0 });
            app.save("¡Registro exitoso!");
            confetti();
        },

        misaIn: () => {
            document.getElementById('btn-in').classList.add('hidden');
            document.getElementById('misa-final').classList.remove('hidden');
        },

        misaOut: () => {
            if(document.getElementById('h-text').value.length < 10) return alert("Escribe un párrafo sobre la homilía.");
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            alert("¡Reporte enviado! Feliz domingo.");
            location.reload();
        },

        postTask: () => {
            app.db.tareaActual = document.getElementById('task-input').value;
            app.save("Tarea publicada para los chicos.");
        },

        setAsistencia: (idx, tipo, btn) => {
            // Animación al presionar
            btn.classList.add('animate__animated', 'animate__pulse');
            app.tempAsistencia[idx] = tipo;
            app.render();
        },

        cerrarLista: () => {
            if(!confirm("¿Deseas cerrar la lista? Esto sumará los puntos al historial.")) return;
            Object.keys(app.tempAsistencia).forEach(idx => {
                const tipo = app.tempAsistencia[idx];
                app.db.alumnos[idx][tipo]++;
            });
            app.tempAsistencia = {};
            app.save("Lista del día guardada en el historial.");
        },

        save: (m) => {
            localStorage.setItem('g4_vpro', JSON.stringify(app.db));
            if(m) alert(m);
            app.render();
        },

        render: () => {
            // Banner de Tareas para los chicos
            const banner = document.getElementById('tarea-anuncio');
            if(app.db.tareaActual) {
                banner.innerHTML = `<div class="tarea-banner animate__animated animate__lightSpeedInLeft"><i class="fas fa-star" style="color:var(--accent)"></i> TAREA: ${app.db.tareaActual}</div>`;
                banner.classList.remove('hidden');
            }

            // Select de Misa
            document.getElementById('sel-joven-misa').innerHTML = app.db.alumnos.map(a => `<option>${a.nombre}</option>`);

            // Lista Michael
            document.getElementById('lista-master-pro').innerHTML = app.db.alumnos.map((a, i) => `
                <div style="padding:15px 0; border-bottom:1px solid #eee;">
                    <div style="display:flex; justify-content:space-between">
                        <small style="color:var(--guindo); font-weight:800">P:${a.p} | F:${a.f} | PER:${a.per}</small>
                        <b>${a.nombre}</b>
                    </div>
                    <div class="asistencia-grid">
                        <button class="btn-check ${app.tempAsistencia[i]=='p'?'active-p':''}" onclick="app.setAsistencia(${i},'p', this)">PRESENTE</button>
                        <button class="btn-check ${app.tempAsistencia[i]=='f'?'active-f':''}" onclick="app.setAsistencia(${i},'f', this)">FALTA</button>
                        <button class="btn-check ${app.tempAsistencia[i]=='per'?'active-per':''}" onclick="app.setAsistencia(${i},'per', this)">PERMISO</button>
                    </div>
                </div>
            `).join('');
        }
    };

    app.init();
</script>
</body>
</html>
