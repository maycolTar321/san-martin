<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Catequistas Dijeron - Sagrado Show</title>
    <style>
        :root {
            --purpura: #4b0082;
            --dorado: #ffd700;
            --blanco-luz: #fdf5e6;
            --rojo-pasion: #b22222;
        }

        body {
            background: radial-gradient(circle, var(--purpura) 0%, #1a0033 100%);
            color: var(--blanco-luz);
            font-family: 'Georgia', serif;
            margin: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* Estilo Vitral de Fondo */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/church-windows.png');
            opacity: 0.1; z-index: -1;
        }

        #selector { position: fixed; inset: 0; background: var(--purpura); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        
        .btn-fancy {
            padding: 20px 40px; border: 3px solid var(--dorado); background: transparent;
            color: var(--dorado); font-weight: bold; border-radius: 50px; cursor: pointer;
            font-size: 1.2rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn-fancy:hover { background: var(--dorado); color: var(--purpura); }

        /* VISTA PÚBLICO */
        .view { display: none; padding: 15px; }
        .score-container { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .team-box { border: 2px solid var(--dorado); padding: 10px; border-radius: 15px; background: rgba(0,0,0,0.4); min-width: 140px; }
        .team-box span { font-size: 12px; color: var(--dorado); display: block; }
        .points { font-size: 45px; font-weight: bold; font-family: 'Impact', sans-serif; }

        #pregunta { font-size: 2rem; color: var(--dorado); text-shadow: 2px 2px 4px #000; margin: 20px 0; }

        .x-area { height: 90px; display: flex; justify-content: center; gap: 20px; }
        .x-mark { font-size: 80px; color: var(--rojo-pasion); display: none; text-shadow: 3px 3px 0px #000; animation: shake 0.5s; }

        /* TABLERO */
        .board { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }
        .card {
            background: linear-gradient(to bottom, #333, #000);
            border: 3px solid var(--dorado); height: 75px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .card.revealed {
            background: linear-gradient(to bottom, #fff, var(--dorado));
            color: var(--purpura); transform: rotateX(360deg); transition: 0.7s;
        }
        .ans { display: none; width: 100%; padding: 0 30px; justify-content: space-between; font-weight: bold; }
        .card.revealed .ans { display: flex; }
        .card.revealed .num { display: none; }

        /* MODO ADMIN */
        .admin-view { padding: 20px; max-width: 500px; margin: 0 auto; }
        .admin-card { background: #222; border: 1px solid #444; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
    </style>
</head>
<body>

    <div id="selector">
        <h1 style="color:var(--dorado)">† CATEQUESIS SHOW †</h1>
        <button class="btn-fancy" onclick="setMode('player')">PANTALLA PROYECTOR</button>
        <button class="btn-fancy" onclick="setMode('admin')">MANDO COORDINADOR</button>
    </div>

    <div class="view" id="pv">
        <div class="score-container">
            <div class="team-box"><span>EQUIPO FE</span><div class="points" id="pts-a">0</div></div>
            <div class="team-box"><span>EQUIPO ESPERANZA</span><div class="points" id="pts-b">0</div></div>
        </div>
        <h2 id="pregunta">...</h2>
        <div class="x-area"><div id="px1" class="x-mark">X</div><div id="px2" class="x-mark">X</div><div id="px3" class="x-mark">X</div></div>
        <div class="board" id="player-board"></div>
    </div>

    <div class="view" id="av">
        <h2 id="adm-q"></h2>
        <div id="admin-board"></div>
        <div class="controls-grid">
            <button class="btn-fancy" style="border-color:var(--rojo-pasion); color:white; background:var(--rojo-pasion);" onclick="send('error')">¡ERROR!</button>
            <button class="btn-fancy" onclick="send('next')">SIGUIENTE</button>
        </div>
        <div class="controls-grid">
            <button class="btn-fancy" style="border-color:#28a745;" onclick="send('addA')">PUNTOS A FE</button>
            <button class="btn-fancy" style="border-color:#28a745;" onclick="send('addB')">PUNTOS A ESPERANZA</button>
        </div>
    </div>

    <audio id="snd-ok" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
    <audio id="snd-no" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        const niveles = [
            { q: "¿Qué llevaron los Reyes Magos?", a: [{t:"ORO",p:40},{t:"INCIENSO",p:35},{t:"MIRRA",p:25}] },
            { q: "¿Cuáles son los Evangelios?", a: [{t:"MATEO",p:25},{t:"MARCOS",p:25},{t:"LUCAS",p:25},{t:"JUAN",p:25}] },
            { q: "Menciona un color de la Iglesia", a: [{t:"BLANCO",p:50},{t:"MORADO",p:20},{t:"VERDE",p:20},{t:"ROJO",p:10}] }
        ];

        let state = JSON.parse(localStorage.getItem('catholic_gs')) || { lvl: 0, rev: [], err: 0, pA: 0, pB: 0 };

        function setMode(m) {
            document.getElementById('selector').style.display = 'none';
            document.getElementById(m == 'player' ? 'pv' : 'av').style.display = 'block';
            if(m == 'player') { 
                window.addEventListener('storage', renderPlayer); 
                renderPlayer();
                document.body.onclick = () => { document.getElementById('snd-ok').play().then(()=>document.getElementById('snd-ok').pause()); };
            } else { 
                renderAdmin(); 
            }
        }

        function send(type, val = null) {
            if(type == 'rev' && !state.rev.includes(val)) state.rev.push(val);
            if(type == 'error') state.err++;
            if(type == 'addA') state.pA += 15;
            if(type == 'addB') state.pB += 15;
            if(type == 'next') { state.lvl++; state.rev = []; state.err = 0; if(state.lvl >= niveles.length) state.lvl = 0; }

            localStorage.setItem('catholic_gs', JSON.stringify(state));
            localStorage.setItem('gs_trigger', Date.now());
            renderAdmin();
        }

        function renderPlayer() {
            state = JSON.parse(localStorage.getItem('catholic_gs'));
            const data = niveles[state.lvl];
            document.getElementById('pregunta').innerText = data.q;
            document.getElementById('pts-a').innerText = state.pA;
            document.getElementById('pts-b').innerText = state.pB;

            const board = document.getElementById('player-board');
            board.innerHTML = '';
            data.a.forEach((ans, i) => {
                const isR = state.rev.includes(i);
                board.innerHTML += `<div class="card ${isR?'revealed':''}">
                    <div class="num">${i+1}</div>
                    <div class="ans"><span>${ans.t}</span><span>${ans.p}</span></div>
                </div>`;
            });

            // Sonidos
            if(window.lastR < state.rev.length) document.getElementById('snd-ok').play();
            if(window.lastE < state.err) document.getElementById('snd-no').play();
            window.lastR = state.rev.length; window.lastE = state.err;

            for(let i=1; i<=3; i++) document.getElementById('px'+i).style.display = (state.err >= i) ? 'block' : 'none';
        }

        function renderAdmin() {
            const data = niveles[state.lvl];
            document.getElementById('adm-q').innerText = data.q;
            const container = document.getElementById('admin-board');
            container.innerHTML = '';
            data.a.forEach((ans, i) => {
                const isR = state.rev.includes(i);
                container.innerHTML += `<div class="admin-card" style="${isR?'opacity:0.4; border-color:green':''}" onclick="send('rev', ${i})">
                    ${i+1}. ${ans.t} (${ans.p} pts)
                </div>`;
            });
        }
    </script>
</body>
</html>
