<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Catequistas - Versión Pro</title>
    <style>
        body { background-color: #003366; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #ffd700; margin-bottom: 10px; font-size: 24px; }
        
        /* Contenedor de X */
        .x-container { height: 80px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .x-mark { color: red; font-size: 60px; font-weight: bold; display: none; text-shadow: 2px 2px black; }

        /* Tablero de tarjetas */
        .board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: 0 auto; }
        .card { 
            background: linear-gradient(#444, #111); 
            border: 3px solid #ffd700; 
            height: 60px; 
            border-radius: 10px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 22px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .card.open { background: linear-gradient(#0055ff, #0022aa); border-color: white; }
        .card .ans { display: none; font-size: 16px; width: 100%; padding: 0 10px; justify-content: space-between; }
        .card.open .ans { display: flex; }
        .card.open .num { display: none; }

        /* Botones */
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        button { padding: 15px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-err { background: red; color: white; }
        .btn-next { background: #ffd700; color: black; }

        /* TU PANEL SECRETO - Los chicos no deben ver esto */
        .admin-panel { margin-top: 40px; border-top: 2px dashed #666; padding-top: 20px; color: #aaa; font-size: 14px; }
        .cheat-sheet { background: rgba(0,0,0,0.3); padding: 10px; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

    <h1 id="pregunta">¿Cuántos evangelios hay?</h1>

    <div class="x-container">
        <span id="x1" class="x-mark">X</span>
        <span id="x2" class="x-mark">X</span>
        <span id="x3" class="x-mark">X</span>
    </div>

    <div class="board" id="board">
        </div>

    <div class="controls">
        <button class="btn-err" onclick="playError()">¡ERROR (X)!</button>
        <button class="btn-next" onclick="nextLevel()">Siguiente Nivel</button>
    </div>

    <div class="admin-panel">
        <p>SOLO PARA EL COORDINADOR (Baja el brillo si ellos ven esto):</p>
        <div id="cheat-sheet" class="cheat-sheet"></div>
    </div>

    <audio id="snd-ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
    <audio id="snd-buzzer" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        const niveles = [
            { p: "¿Cuáles son los evangelios?", r: ["Mateo", "Marcos", "Lucas", "Juan"], pts: [25, 25, 25, 25] },
            { p: "Menciona un Mandamiento", r: ["Amar a Dios", "No Matar", "No Robar", "Honrar Padre/Madre"], pts: [40, 30, 20, 10] }
        ];

        let cur = 0;
        let errs = 0;

        function load() {
            const n = niveles[cur];
            document.getElementById('pregunta').innerText = n.p;
            const b = document.getElementById('board');
            const s = document.getElementById('cheat-sheet');
            b.innerHTML = '';
            s.innerHTML = '';
            errs = 0;
            hideX();

            n.r.forEach((txt, i) => {
                // Crear Tarjeta
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<span class="num">${i+1}</span><div class="ans"><span>${txt}</span><span>${n.pts[i]}</span></div>`;
                div.onclick = () => {
                    if(!div.classList.contains('open')) {
                        div.classList.add('open');
                        document.getElementById('snd-ding').play();
                    }
                };
                b.appendChild(div);

                // Crear tu chuleta
                s.innerHTML += `<b>${i+1}:</b> ${txt} | `;
            });
        }

        function playError() {
            if(errs < 3) {
                errs++;
                document.getElementById('x'+errs).style.display = 'block';
                document.getElementById('snd-buzzer').play();
                setTimeout(() => { if(errs<3) document.getElementById('x'+errs).style.display = 'none'; }, 1500);
            }
        }

        function hideX() { for(let i=1; i<=3; i++) document.getElementById('x'+i).style.display = 'none'; }
        function nextLevel() { cur++; if(cur < niveles.length) load(); else alert("¡Fin!"); }

        window.onload = load;
    </script>
</body>
</html>
