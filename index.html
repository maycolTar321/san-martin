<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catequesis Tarija</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; }
        body { background: #f4f7f9; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
        .app-header { background: var(--blue); color: white; padding: 25px; border-bottom: 6px solid var(--gold); border-radius: 0 0 30px 30px; text-align: center; }
        .progress-circle { position: relative; width: 80px; height: 80px; margin: 0 auto; }
        .jesus-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; }
        circle { transition: stroke-dashoffset 0.5s; stroke-linecap: round; }
        .card { border-radius: 20px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin: 15px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 20px 20px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #bbb; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        .nav-item i { font-size: 22px; display: block; }
        .hidden { display: none !important; }
        .admin-only { display: none; } /* Oculto por defecto */
        #admin-access { position: fixed; top: 10px; right: 10px; opacity: 0.1; z-index: 2000; color: white; }
    </style>
</head>
<body>

<div id="admin-access" onclick="showLogin()"><i class="bi bi-shield-lock"></i></div>

<div id="login-box" class="hidden" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:3000; display:flex; align-items:center; justify-content:center;">
    <div class="card p-4 text-center" style="width: 85%;">
        <h5 class="fw-bold">Acceso Coordinador</h5>
        <input type="password" id="pass" class="form-control my-3 rounded-pill" placeholder="Contraseña">
        <button onclick="validaAdmin()" class="btn btn-primary w-100 rounded-pill">ENTRAR</button>
        <button onclick="hideLogin()" class="btn btn-link btn-sm mt-2 text-muted">Cancelar</button>
    </div>
</div>

<div id="app">
    <div class="app-header">
        <div class="progress-circle">
            <svg width="80" height="80"><circle cx="40" cy="40" r="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="5"/><circle id="bar" cx="40" cy="40" r="35" fill="none" stroke="var(--gold)" stroke-width="5" stroke-dasharray="220" stroke-dashoffset="220" transform="rotate(-90 40 40)"/></svg>
            <div id="jesus" class="jesus-icon">🙏</div>
        </div>
        <h6 class="mt-2 fw-bold">MISIÓN CATEQUESIS: <span id="perc">0</span>%</h6>
        <div id="status-tag" class="badge bg-light text-dark rounded-pill">MODO JOVEN (LECTURA)</div>
    </div>

    <div id="sec-home" class="seccion p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">📢 Últimos Avisos</h6>
            <div id="avisos-p">Aquí saldrán las tareas que Maycol asigne...</div>
        </div>
        <div class="card p-3">
            <h6 class="fw-bold text-danger"><i class="bi bi-youtube me-2"></i>Formación en Video</h6>
            <div class="ratio ratio-16x9 rounded-3 overflow-hidden">
                <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <div id="sec-tareas" class="seccion hidden p-2">
        <div class="admin-only card p-3 bg-light border-warning">
            <h6 class="fw-bold">Asignar Nueva Tarea</h6>
            <input type="text" id="t-n" class="form-control mb-2 rounded-pill" placeholder="Tarea">
            <input type="text" id="t-g" class="form-control mb-2 rounded-pill" placeholder="Grupo (Ej: San Pedro)">
            <input type="text" id="t-l" class="form-control mb-2 rounded-pill" placeholder="📍 Lugar">
            <button onclick="nuevaT()" class="btn btn-primary w-100 rounded-pill btn-sm">PUBLICAR</button>
        </div>
        <div id="lista-t"></div>
    </div>

    <div id="sec-inv" class="seccion hidden p-2 admin-only">
        <div class="card p-3">
            <h6 class="fw-bold">Inventario de Materiales</h6>
            <div id="lista-i"></div>
            <button onclick="nuevoI()" class="btn btn-outline-primary w-100 rounded-pill btn-sm mt-3">+ Item</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-house"></i>Inicio</div>
        <div onclick="tab('tareas')" id="n-tareas" class="nav-item"><i class="bi bi-people"></i>Grupos</div>
        <div id="btn-inv-nav" onclick="tab('inv')" class="nav-item admin-only"><i class="bi bi-box-seam"></i>Equipo</div>
    </div>
</div>

<script>
    const CLAVES = ["coord_2026", "sub_tarija"];
    let esAdmin = false;

    function showLogin() { document.getElementById('login-box').classList.remove('hidden'); }
    function hideLogin() { document.getElementById('login-box').classList.add('hidden'); }

    function validaAdmin() {
        const p = document.getElementById('pass').value;
        if(CLAVES.includes(p)) {
            esAdmin = true;
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('status-tag').innerText = "MODO COORDINADOR";
            document.getElementById('status-tag').className = "badge bg-warning text-dark rounded-pill";
            hideLogin();
            alert("Acceso concedido, Michael.");
        } else { alert("Error."); hideLogin(); }
    }

    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-' + id).classList.remove('hidden');
        document.getElementById('n-' + id).classList.add('active');
    }

    function updateP() {
        const cks = document.querySelectorAll('.t-ck');
        const done = Array.from(cks).filter(c => c.checked).length;
        const p = cks.length > 0 ? (done / cks.length) * 100 : 0;
        document.getElementById('bar').style.strokeDashoffset = 220 - (220 * p / 100);
        document.getElementById('perc').innerText = Math.round(p);
        document.getElementById('jesus').innerText = p === 100 ? "🙌" : "🙏";
    }

    function nuevaT() {
        const n = document.getElementById('t-n').value;
        const g = document.getElementById('t-g').value;
        const l = document.getElementById('t-l').value;
        if(!n) return;
        const html = `
            <div class="card p-3 mb-2 d-flex flex-row align-items-center">
                <input type="checkbox" class="t-ck form-check-input me-3" ${!esAdmin ? 'disabled' : ''} onchange="updateP()" style="width:25px;height:25px">
                <div class="flex-grow-1">
                    <small class="text-primary fw-bold">${g} - 📍 ${l}</small>
                    <div class="fw-bold">${n}</div>
                </div>
                <button onclick="window.open('https://calendar.google.com/calendar/render?action=TEMPLATE&text=${n}&location=${l}')" class="btn btn-link p-0"><i class="bi bi-calendar-plus fs-4"></i></button>
            </div>`;
        document.getElementById('lista-t').insertAdjacentHTML('afterbegin', html);
        updateP();
    }

    function nuevoI() {
        document.getElementById('lista-i').innerHTML += `<div class="p-2 border-bottom d-flex justify-content-between"><input class="border-0 bg-transparent" placeholder="Item..."><select class="border-0 small"><option>Bueno</option><option>Dañado</option></select></div>`;
    }
</script>
</body>
</html>
