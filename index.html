<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaControl Pro - Sistema de Gestión</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .stat-card i { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .stat-card h3 { font-size: 0.9rem; opacity: 0.7; }
        .stat-card p { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }

        /* Forms and Sections */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        h2 { margin-bottom: 20px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; opacity: 0.8; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            outline: none;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,210,255,0.3); }

        .btn-location { background: #10b981; margin-top: 5px; font-size: 0.8rem; }

        /* Table */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); opacity: 0.7; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .badge {
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 0.75rem;
            background: rgba(0,210,255,0.2);
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AQUA<span style="color: var(--primary)">CONTROL</span></h1>
        <p>Gestión de Distribución - Tarija & Provincias</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <i class="fas fa-wallet"></i>
            <h3>Inversión Mes</h3>
            <p id="total-inv">Bs 0.00</p>
        </div>
        <div class="stat-card">
            <i class="fas fa-hand-holding-usd"></i>
            <h3>Ventas Totales</h3>
            <p id="total-ventas">Bs 0.00</p>
        </div>
        <div class="stat-card" style="background: rgba(16, 185, 129, 0.1);">
            <i class="fas fa-chart-line" style="color: #10b981;"></i>
            <h3>Ganancia Neta</h3>
            <p id="total-ganancia" style="color: #10b981;">Bs 0.00</p>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
        <div class="main-card">
            <h2><i class="fas fa-user-plus"></i> Registro de Cliente</h2>
            <div class="form-group">
                <label>Nombre del Cliente / Negocio</label>
                <input type="text" id="c-nombre" placeholder="Ej: Tienda Doña María">
            </div>
            <div class="form-group">
                <label>Tipo de Producto</label>
                <select id="c-producto">
                    <option value="Botellón 20L">Botellón 20L</option>
                    <option value="Hielo Cubos">Hielo en Cubos</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ubicación GPS</label>
                <input type="text" id="c-gps" readonly placeholder="Esperando coordenadas...">
                <button class="btn btn-location" onclick="getLocation()">
                    <i class="fas fa-map-marker-alt"></i> Obtener Ubicación Actual
                </button>
            </div>
            <button class="btn" onclick="saveClient()">Guardar Cliente</button>
        </div>

        <div class="main-card">
            <h2><i class="fas fa-cart-plus"></i> Nueva Venta / Salida</h2>
            <div class="form-group">
                <label>Monto de Venta (Bs)</label>
                <input type="number" id="v-monto" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Costo de Inversión (Producción/Logística)</label>
                <input type="number" id="v-costo" placeholder="0.00">
            </div>
            <button class="btn" onclick="addSale()">Registrar Transacción</button>
        </div>
    </div>

    <div class="main-card">
        <h2><i class="fas fa-list"></i> Cartera de Clientes Registrados</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Producto</th>
                        <th>Ubicación</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="client-list">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let sales = [];
    let clients = [];

    // Función para obtener GPS
    function getLocation() {
        const gpsInput = document.getElementById('c-gps');
        if (navigator.geolocation) {
            gpsInput.value = "Localizando...";
            navigator.geolocation.getCurrentPosition((position) => {
                gpsInput.value = `${position.coords.latitude.toFixed(6)}, ${position.coords.longitude.toFixed(6)}`;
            }, () => {
                alert("Error: No se pudo acceder a la ubicación. Verifica los permisos.");
                gpsInput.value = "";
            });
        } else {
            alert("Tu navegador no soporta geolocalización.");
        }
    }

    // Guardar Cliente
    function saveClient() {
        const name = document.getElementById('c-nombre').value;
        const prod = document.getElementById('c-producto').value;
        const gps = document.getElementById('c-gps').value;

        if(!name || !gps) return alert("Completa el nombre y la ubicación");

        clients.push({ name, prod, gps });
        renderClients();
        
        // Limpiar
        document.getElementById('c-nombre').value = "";
        document.getElementById('c-gps').value = "";
    }

    function renderClients() {
        const list = document.getElementById('client-list');
        list.innerHTML = clients.map(c => `
            <tr>
                <td>${c.name}</td>
                <td><span class="badge">${c.prod}</span></td>
                <td><small>${c.gps}</small></td>
                <td><i class="fas fa-check-circle" style="color: #10b981;"></i> Activo</td>
            </tr>
        `).join('');
    }

    // Agregar Venta
    function addSale() {
        const monto = parseFloat(document.getElementById('v-monto').value);
        const costo = parseFloat(document.getElementById('v-costo').value);

        if(isNaN(monto) || isNaN(costo)) return alert("Ingresa montos válidos");

        sales.push({ monto, costo });
        updateDashboard();

        // Limpiar
        document.getElementById('v-monto').value = "";
        document.getElementById('v-costo').value = "";
    }

    function updateDashboard() {
        const totalVentas = sales.reduce((acc, s) => acc + s.monto, 0);
        const totalCosto = sales.reduce((acc, s) => acc + s.costo, 0);
        const ganancia = totalVentas - totalCosto;

        document.getElementById('total-ventas').innerText = `Bs ${totalVentas.toFixed(2)}`;
        document.getElementById('total-inv').innerText = `Bs ${totalCosto.toFixed(2)}`;
        document.getElementById('total-ganancia').innerText = `Bs ${ganancia.toFixed(2)}`;
    }
</script>

</body>
</html>
