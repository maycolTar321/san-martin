<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>† 100 Catequistas Dijeron - Sagrado Show †</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purpura: #3d0066; --dorado: #ffd700; --luz: #fff5e6; --rojo: #cc0000; --verde: #28a745; }
        
        /* BLOQUEO DE RECARGA Y FONDOS DE VITRAL */
        html, body { 
            overscroll-behavior-y: contain; margin: 0; padding: 0; height: 100%; width: 100%;
            background: radial-gradient(circle, var(--purpura) 0%, #1a0033 100%);
            color: var(--luz); font-family: 'Georgia', serif; text-align: center;
            background-image: url('https://www.transparenttextures.com/patterns/church-windows.png');
            overflow: hidden;
        }

        /* --- INTRO ANIMADO (5 Segundos) --- */
        #intro {
            position: fixed; inset: 0; background: var(--purpura); z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-image: url('https://www.transparenttextures.com/patterns/church-windows.png');
            opacity: 1; animation: fadeOut 1s forwards 4s;
        }
        #intro h1 { 
            color: var(--dorado); font-size: 3rem; text-shadow: 2px 2px 8px #000; 
            margin: 0; animation: scaleIn 1s ease;
        }
        #intro img { 
            width: 150px; margin-top: 20px; animation: bounceIn 1.5s ease 0.5s; 
            border: 4px solid var(--dorado); border-radius: 50%; padding: 5px;
        }
        #intro .text-glow { 
            color: white; font-size: 1.5rem; text-transform: uppercase; margin-top: 30px;
            animation: glow 1.5s infinite 1s;
        }

        /* --- SECTOR DE CONEXIÓN --- */
        #setup { 
            position: fixed; inset: 0; background: var(--purpura); z-index: 100; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            gap: 15px; padding: 20px; animation: fadeIn 1s;
        }
        .btn-fancy { 
            padding: 15px 30px; border: 3px solid var(--dorado); background: rgba(0,0,0,0.5); 
            color: var(--dorado); border-radius: 50px; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; text-transform: uppercase; transition: 0.3s;
        }
        .btn-fancy:hover { background: var(--dorado); color: var(--purpura); }
        input { padding: 12px; border-radius: 10px; border: 2px solid var(--dorado); text-align: center; font-size: 1rem; width: 80%; background: white; color: black; }

        /* --- VISTA PÚBLICO (PROYECTOR) --- */
        .view { display: none; padding: 20px; height: 100vh; overflow-y: auto; box-sizing: border-box; }
        .marcador { display: flex; justify-content: space-around; margin-bottom: 10px; }
        .equipo { border: 3px solid var(--dorado); background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; min-width: 130px; }
        .equipo small { color: var(--dorado); font-size: 11px; }
        .pts { font-size: 40px; font-family: 'Impact', sans-serif; color: white; }

        #pregunta { font-size: 2.2rem; color: var(--dorado); text-shadow: 2px 2px 4px #000; min-height: 80px; margin: 15px 0; }
        .x-box { height: 90px; display: flex; justify-content: center; gap: 15px; }
        .x-mark { font-size: 80px; color: var(--rojo); text-shadow: 3px 3px 0px #000; display: none; animation: shake 0.5s; }

        /* TABLERO */
        .tablero { display: grid; grid-template-columns: 1fr; gap: 12px; max-width: 550px; margin: 0 auto; }
        .tarjeta { 
            background: linear-gradient(#444, #000); border: 3px solid var(--dorado); height: 65px;
            border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px;
        }
        .tarjeta.open { 
            background: linear-gradient(to bottom, #fff, var(--dorado)); color: var(--purpura); 
            transform: rotateX(360deg); transition: 0.7s; 
        }
        .ans { display: none; width: 100%; padding: 0 25px; justify-content: space-between; font-weight: bold; font-size: 20px; }
        .open .ans { display: flex; } .open .num { display: none; }

        /* --- MODO ADMIN (TU CELULAR) --- */
        .admin-item { background: #222; border: 1px solid #555; padding: 12px; margin: 6px 0; border-radius: 10px; color: white; width: 100%; text-align: left; font-size: 14px; cursor: pointer;}
        .grid-ctrl { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }

        /* ANIMACIONES */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
        @keyframes scaleIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px white; } 50% { text-shadow: 0 0 20px var(--dorado); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @keyframes bounceIn {
          0% { opacity: 0; transform: scale(.3) translateY(200px); }
          50% { opacity: 1; transform: scale(1.05) translateY(-10px); }
          100% { transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="intro">
        <h1>† 100 CATEQUISTAS †</h1>
        <h1 style="color:white; font-size:2.5rem; margin-top:-10px;">DIJERON</h1>
        <img src="https://image.spreadshirtmedia.net/image-server/v1/mp/products/T1459A1MPA4459PT28D182650059W10000H10000/views/1,width=10000,height=10000,appearanceId=1,backgroundColor=F2F2F2/padre-feliz-emoji-cara-feliz-sacerdote-riendo.jpg" alt="Logo†">
        <div class="text-glow">Cargando Sagrado Show...</div>
    </div>

    <div id="setup">
        <h1 style="color:var(--dorado); font-size: 26px;">MODO DE JUEGO</h1>
        <button class="btn-fancy" onclick="initPlayer()">† PROYECTOR (RECIBIR)</button>
        <div style="margin: 20px 0; border-top: 1px solid #555; width: 80%;"></div>
        <p>Escribe el ID del Proyector:</p>
        <input type="text" id="peer-id-input" placeholder="Ej: 1234">
        <button class="btn-fancy" style="background:var(--dorado); color:var(--purpura); border-color:var(--purpura)" onclick="initAdmin()">† CONTROL (CONECTAR)</button>
        <p style="font-size:12px; color:gray; margin-top:20px;">Nota: Se requiere internet.</p>
    </div>

    <div class="view" id="pv">
        <div class="marcador">
            <div class="equipo"><small>EQUIPO FE</small><div class="pts" id="ptsA">0</div></div>
            <div class="equipo"><small>EQUIPO ESPERANZA</small><div class="pts" id="ptsB">0</div></div>
        </div>
        <h2 id="pregunta">† ESPERANDO INICIO †</h2>
        <div class="x-box"><div id="x1" class="x-mark">X</div><div id="x2" class="x-mark">X</div><div id="x3" class="x-mark">X</div></div>
        <div class="tablero" id="t-p"></div>
    </div>

    <div class="view" id="av">
        <h3 id="adm-q" style="color:var(--dorado); margin:5px;">† SAGRADO MANDO †</h3>
        <div id="admin-board"></div>
        <div class="grid-ctrl">
            <button class="btn-fancy" style="background:var(--rojo); color:white; border:none;" onclick="sendAction('error')">ERROR (X)</button>
            <button class="btn-fancy" onclick="sendAction('next')">SIGUIENTE</button>
            <button class="btn-fancy" style="border-color:var(--verde)" onclick="sendAction('ptsA')">+ FE</button>
            <button class="btn-fancy" style="border-color:var(--verde)" onclick="sendAction('ptsB')">+ ESPERANZA</button>
        </div>
        <button class="btn-fancy" style="width:100%; margin-top:10px; font-size:12px; opacity:0.6;" onclick="location.reload()">Reset Conexión</button>
    </div>

    <audio id="s-ding" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
    <audio id="s-buzz" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        // Ocultar Intro tras 5 segundos
        setTimeout(() => {
            document.getElementById('intro').style.display = 'none';
            document.getElementById('setup').style.display = 'flex';
        }, 5000);

        const banco = [
            { q: "¿Qué llevaron los Reyes Magos?", a: [{t:"ORO",p:40},{t:"INCIENSO",p:35},{t:"MIRRA",p:25}] },
            { q: "¿Menciona un Mandamiento?", a: [{t:"AMARÁS A DIOS",p:50},{t:"NO MATARÁS",p:20},{t:"HONRARÁS PADRE",p:15},{t:"NO ROBARÁS",p:10}] },
            { q: "¿Cuáles son los Evangelios?", a: [{t:"MATEO",p:25},{t:"MARCOS",p:25},{t:"LUCAS",p:25},{t:"JUAN",p:25}] }
        ];

        let peer, conn;
        // Memoria para no perder datos si se actualiza
        let state = JSON.parse(localStorage.getItem('saved_game_catholic')) || { lvl: 0, rev: [], err: 0, pA: 0, pB: 0 };

        function saveGame() { localStorage.setItem('saved_game_catholic', JSON.stringify(state)); }

        function initPlayer() {
            peer = new Peer();
            peer.on('open', id => {
                document.getElementById('setup').innerHTML = `
                    <h2 style="color:white; font-size:18px;">ID DEL PROYECTOR:</h2>
                    <h1 style="color:var(--dorado); font-size:45px; margin: 5px 0;">${id}</h1>
                    <p style="color:#aaa;">Pon este ID en tu celular Admin</p>
                    <button class="btn-fancy" onclick="startPlayerView()">ENTRAR AL TABLERO</button>
                `;
            });
            peer.on('connection', c => {
                conn = c;
                conn.on('data', data => { state = data; saveGame(); renderPlayer(); });
            });
        }

        function startPlayerView() {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('pv').style.display = 'block';
            renderPlayer();
        }

        function initAdmin() {
            const targetId = document.getElementById('peer-id-input').value;
            if(!targetId) return alert("† Pon el ID del proyector †");
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(targetId);
                conn.on('open', () => {
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('av').style.display = 'block';
                    updateAdmin();
                    conn.send(state); // Sincronizar estado guardado al conectar
                });
            });
        }

        function sendAction(type, val = null) {
            if(type == 'rev' && !state.rev.includes(val)) state.rev.push(val);
            if(type == 'error') state.err++;
            if(type == 'ptsA') state.pA += 10;
            if(type == 'ptsB') state.pB += 10;
            if(type == 'next') { state.lvl++; state.rev = []; state.err = 0; if(state.lvl >= banco.length) state.lvl = 0; }
            
            saveGame();
            if(conn) conn.send(state);
            updateAdmin();
        }

        function renderPlayer() {
            const data = banco[state.lvl];
            document.getElementById('pregunta').innerText = data.q;
            document.getElementById('ptsA').innerText = state.pA;
            document.getElementById('ptsB').innerText = state.pB;
            
            const tp = document.getElementById('t-p');
            tp.innerHTML = '';
            data.a.forEach((ans, i) => {
                const isR = state.rev.includes(i);
                tp.innerHTML += `<div class="tarjeta ${isR?'open':''}">
                    <div class="num">${i+1}</div>
                    <div class="ans"><span>${ans.t}</span><span>${ans.p}</span></div>
                </div>`;
            });

            // Sonidos con seguro para móviles
            try {
                if(window.lr < state.rev.length) document.getElementById('s-ding').play();
                if(window.le < state.err) document.getElementById('s-buzz').play();
            } catch(e) {}
            window.lr = state.rev.length; window.le = state.err;

            for(let i=1; i<=3; i++) document.getElementById('px'+i).style.display = (state.err >= i) ? 'block' : 'none';
        }

        function updateAdmin() {
            const data = banco[state.lvl];
            document.getElementById('adm-q').innerText = data.q;
            const container = document.getElementById('admin-board');
            container.innerHTML = '';
            data.a.forEach((ans, i) => {
                const isR = state.rev.includes(i);
                container.innerHTML += `<div class="admin-item" style="${isR?'opacity:0.4; border-color:green; color:green;':''}" onclick="sendAction('rev', ${i})">
                    ${i+1}. ${ans.t} (${ans.p} pts)
                </div>`;
            });
        }

        // Desbloquear audio en móviles con el primer toque
        document.addEventListener('touchstart', () => {
            const d = document.getElementById('s-ding'); const b = document.getElementById('s-buzz');
            d.play().then(()=>d.pause()); b.play().then(()=>b.pause());
        }, {once: true});
    </script>
</body>
</html>
