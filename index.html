<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catequesis San Martín de Porres Tarija</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --guindo: #800020;
            --guindo-soft: #fdf2f4;
            --insta-grad: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            --bg: #fafafa;
            --white: #ffffff;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 20px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: #262626; padding-bottom: 80px; }

        /* --- HEADER ESTILO PREMIUM --- */
        header {
            background: var(--white); border-bottom: 1px solid #dbdbdb;
            padding: 12px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-container img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid var(--guindo); }
        .brand-name { font-weight: 800; font-size: 14px; color: var(--guindo); text-transform: uppercase; letter-spacing: -0.5px; }

        /* --- STORIES (CATEGORÍAS RÁPIDAS) --- */
        .stories-bar { display: flex; gap: 15px; padding: 15px 20px; overflow-x: auto; background: var(--white); border-bottom: 1px solid #dbdbdb; }
        .story { display: flex; flex-direction: column; align-items: center; min-width: 70px; cursor: pointer; }
        .story-ring { 
            width: 60px; height: 60px; border-radius: 50%; padding: 3px;
            background: var(--insta-grad); margin-bottom: 5px;
        }
        .story-inner { 
            width: 100%; height: 100%; border-radius: 50%; background: white; 
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container { max-width: 500px; margin: auto; padding: 15px; }

        /* --- TARJETAS TIPO INSTAGRAM --- */
        .post-card { background: var(--white); border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; }
        .post-img { width: 100%; height: 250px; background: var(--guindo-soft); display: flex; align-items: center; justify-content: center; color: var(--guindo); font-size: 40px; }
        .post-actions { padding: 12px; display: flex; gap: 15px; font-size: 20px; }
        .post-content { padding: 0 12px 12px; font-size: 14px; line-height: 1.4; }
        .post-content b { margin-right: 5px; }

        /* --- PANEL DE GESTIÓN (LMS) --- */
        .admin-panel { background: var(--white); padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; }
        input, select, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dbdbdb; 
            border-radius: 8px; background: #fafafa; font-size: 14px;
        }
        .btn-action { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            background: var(--guindo); color: white; font-weight: 700; cursor: pointer;
        }

        /* --- NAV INFERIOR --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #dbdbdb; z-index: 1000;
        }
        .nav-item { color: #262626; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: var(--guindo); transform: scale(1.1); }

        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://i.ibb.co/Lnbm2Xq/1000540900-jpg.jpg" alt="Logo SMP">
            <div class="brand-name">Catequistas <br>Confirmación Tarija</div>
        </div>
        <i class="fab fa-facebook-messenger fa-lg"></i>
    </header>

    <div class="stories-bar">
        <div class="story" onclick="app.nav('feed')">
            <div class="story-ring"><div class="story-inner"><i class="fas fa-home"></i></div></div>
            <span style="font-size: 10px; font-weight: 600;">Inicio</span>
        </div>
        <div class="story" onclick="app.nav('edu')">
            <div class="story-ring"><div class="story-inner"><i class="fas fa-book-open"></i></div></div>
            <span style="font-size: 10px; font-weight: 600;">LMS</span>
        </div>
        <div class="story" onclick="app.nav('staff')">
            <div class="story-ring"><div class="story-inner"><i class="fas fa-users"></i></div></div>
            <span style="font-size: 10px; font-weight: 600;">Equipo</span>
        </div>
        <div class="story admin-only hidden" onclick="app.nav('admin')">
            <div class="story-ring"><div class="story-inner"><i class="fas fa-cog"></i></div></div>
            <span style="font-size: 10px; font-weight: 600;">Admin</span>
        </div>
    </div>

    <div class="container">
        
        <div id="v-feed" class="section active">
            <div id="main-feed"></div>
        </div>

        <div id="v-edu" class="section">
            <h3 style="margin-bottom: 15px;">Módulos de Formación</h3>
            <div id="lms-content"></div>
        </div>

        <div id="v-staff" class="section">
            <h3 style="margin-bottom: 15px;">Nuestros Catequistas</h3>
            <div id="catequistas-list"></div>
        </div>

        <div id="v-admin" class="section">
            <div class="admin-panel">
                <h4>Subir Nuevo Contenido</h4>
                <select id="pub-type">
                    <option value="avisos">Publicar Aviso (Feed)</option>
                    <option value="tareas">Publicar Tarea (LMS)</option>
                    <option value="catequistas">Registrar Catequista</option>
                </select>
                <input type="text" id="pub-title" placeholder="Título o Nombre">
                <textarea id="pub-desc" placeholder="Descripción o link del material..."></textarea>
                <button class="btn-action" onclick="app.saveData()">Publicar en la Plataforma</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <i class="fas fa-home nav-item active" onclick="app.nav('feed')"></i>
        <i class="fas fa-search nav-item"></i>
        <i class="fas fa-plus-square nav-item admin-only hidden" onclick="app.nav('admin')"></i>
        <i class="fas fa-heart nav-item"></i>
        <i class="fas fa-user-circle nav-item" onclick="app.logout()"></i>
    </div>

    <script>
        const app = {
            db: JSON.parse(localStorage.getItem('smp_final_db')) || {
                avisos: [{title: 'Bienvenida', desc: 'Bienvenidos al ciclo 2026 de Confirmación en Tarija.', date: 'Hoy'}],
                tareas: [],
                catequistas: [{name: 'Michael Avila', info: 'Administrador General'}]
            },
            session: { role: 'admin' }, // Forzado para Michael

            init: () => {
                app.render();
                if(app.session.role === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
                }
            },

            nav: (id) => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById('v-' + id).classList.add('active');
                // Estética de botones
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            },

            saveData: () => {
                const type = document.getElementById('pub-type').value;
                const title = document.getElementById('pub-title').value;
                const desc = document.getElementById('pub-desc').value;

                if(!title) return alert("Completa el título");
                
                app.db[type].push({title, name: title, desc, info: desc, date: 'Reciente'});
                localStorage.setItem('smp_final_db', JSON.stringify(app.db));
                alert("¡Publicado!");
                app.render();
            },

            render: () => {
                // Render Feed (Avisos)
                document.getElementById('main-feed').innerHTML = app.db.avisos.slice().reverse().map(a => `
                    <div class="post-card">
                        <div class="post-header"><img src="https://i.ibb.co/Lnbm2Xq/1000540900-jpg.jpg"> <b>Confirmación SMP</b></div>
                        <div class="post-img"><i class="fas fa-church"></i></div>
                        <div class="post-actions"><i class="far fa-heart"></i> <i class="far fa-comment"></i> <i class="far fa-paper-plane"></i></div>
                        <div class="post-content"><b>Confirmación SMP</b> ${a.title}: ${a.desc}</div>
                    </div>
                `).join('');

                // Render Catequistas
                document.getElementById('catequistas-list').innerHTML = app.db.catequistas.map(c => `
                    <div class="post-header" style="background:white; border-radius:10px; margin-bottom:10px; border:1px solid #dbdbdb;">
                        <img src="https://ui-avatars.com/api/?name=${c.name}&background=800020&color=fff">
                        <div><b>${c.name}</b><br><small>${c.info}</small></div>
                    </div>
                `).join('');

                // Render LMS
                document.getElementById('lms-content').innerHTML = app.db.tareas.map(t => `
                    <div class="admin-panel" style="border-left: 5px solid var(--guindo);">
                        <strong>${t.title}</strong><br><small>${t.desc}</small>
                        <button class="btn-action" style="margin-top:10px; padding:5px; font-size:12px;">Ver Material</button>
                    </div>
                `).join('') || '<p>Aún no hay tareas publicadas.</p>';
            },

            logout: () => { if(confirm("¿Cerrar sesión?")) { localStorage.clear(); location.reload(); } }
        };

        app.init();
    </script>
</body>
</html>
