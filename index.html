<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Poleras - Coordinación</title>
    <style>
        :root { --primary: #7c3aed; --secondary: #ede9fe; --accent: #059669; --dark: #1f2937; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; margin: 0; display: flex; justify-content: center; padding: 15px; }
        
        .app-container { background: white; max-width: 500px; width: 100%; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); overflow: hidden; min-height: 90vh; display: flex; flex-direction: column; }
        
        /* Vistas */
        .view { display: none; padding: 25px; flex-grow: 1; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { color: var(--primary); font-size: 1.5rem; text-align: center; margin-bottom: 1rem; }
        p.subtitle { text-align: center; color: #6b7280; font-size: 0.9rem; margin-bottom: 2rem; }

        /* Formulario */
        .field { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--dark); }
        input, select { width: 100%; padding: 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 1rem; transition: border 0.3s; }
        input:focus { border-color: var(--primary); outline: none; }

        /* Selector de Colores Pro */
        .color-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .color-card { border: 2px solid #f3f4f6; padding: 12px; border-radius: 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
        .color-dot { width: 24px; height: 24px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .color-card { border-color: var(--primary); background: var(--secondary); }

        /* Botones */
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:active { transform: scale(0.98); }
        .btn-admin { background: transparent; color: #9ca3af; font-size: 0.8rem; margin-top: 20px; }

        /* QR Final */
        .qr-wrapper { background: #faf5ff; border: 3px dashed #ddd6fe; border-radius: 20px; padding: 20px; text-align: center; }
        .qr-img { width: 100%; max-width: 250px; border-radius: 15px; margin: 15px 0; }

        /* Tabla Admin */
        .table-res { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="view-form" class="view active">
        <h2>👕 Pedido de Polera</h2>
        <p class="subtitle">Completa tus datos para coordinar el uniforme de este año.</p>
        
        <form id="mainForm">
            <div class="field">
                <label>Nombre Completo</label>
                <input type="text" id="u_nombre" placeholder="Escribe tu nombre aquí" required>
            </div>

            <div class="field">
                <label>Talla de Polera</label>
                <select id="u_talla" required>
                    <option value="">Selecciona tu talla...</option>
                    <option value="S">S - Pequeña</option>
                    <option value="M">M - Mediana</option>
                    <option value="L">L - Grande</option>
                    <option value="XL">XL - Extra Grande</option>
                    <option value="XXL">XXL - Especial</option>
                </select>
            </div>

            <label>Color Favorito</label>
            <div class="color-grid" id="colorList"></div>

            <button type="submit" class="btn btn-main" style="margin-top: 25px;">Registrar mi Pedido</button>
        </form>
        
        <button class="btn btn-admin" onclick="goAdmin()">Acceso Privado Coordinación</button>
    </div>

    <div id="view-success" class="view">
        <div style="text-align: center;">
            <div style="font-size: 50px;">✅</div>
            <h2 style="color: var(--accent);">¡Recibido!</h2>
            <p>Tus datos han sido guardados correctamente.</p>
        </div>

        <div class="qr-wrapper">
            <p style="font-weight: bold; margin: 0;">📸 GUARDA ESTA IMAGEN</p>
            <p style="font-size: 0.8rem; color: #6b7280;">Cuando se defina el monto a pagar, deberás usar este QR para cubrir la diferencia.</p>
            <img src="https://i.postimg.cc/k4G6VskF/1000544014.jpg" class="qr-img" alt="QR Pago">
            <p style="font-weight: bold; color: var(--primary);">Maycol Anghelo Avila Zenteno</p>
        </div>

        <button onclick="location.reload()" class="btn btn-main" style="margin-top: 20px; background: #6b7280;">Volver al Inicio</button>
    </div>

    <div id="view-admin" class="view">
        <h2>📊 Reporte de Pedidos</h2>
        <div id="stats" style="display: flex; gap: 10px; margin-bottom: 15px;"></div>
        <div class="table-res" id="tableBox"></div>
        
        <button onclick="exportCSV()" class="btn btn-main" style="background: var(--accent); margin-top: 20px;">Descargar Excel (.csv)</button>
        <button onclick="location.reload()" class="btn btn-admin">Regresar al Formulario</button>
    </div>

</div>

<script>
    // Configuración de Colores (14 opciones)
    const db_colores = [
        {n: 'Blanco', c: '#ffffff'}, {n: 'Negro', c: '#000000'}, 
        {n: 'Azul Marino', c: '#1e3a8a'}, {n: 'Gris Melange', c: '#94a3b8'},
        {n: 'Vino', c: '#7f1d1d'}, {n: 'Verde Militar', c: '#365314'},
        {n: 'Celeste', c: '#7dd3fc'}, {n: 'Rojo', c: '#dc2626'},
        {n: 'Turquesa', c: '#06b6d4'}, {n: 'Verde Olivo', c: '#65a30d'},
        {n: 'Coral', c: '#fb7185'}, {n: 'Naranja', c: '#f97316'},
        {n: 'Amarillo', c: '#facc15'}, {n: 'Lila', c: '#c084fc'}
    ];

    // Renderizar colores
    const colorList = document.getElementById('colorList');
    db_colores.forEach((item, index) => {
        colorList.innerHTML += `
            <label>
                <input type="radio" name="color_opt" value="${item.n}" required>
                <div class="color-card">
                    <div class="color-dot" style="background: ${item.c}"></div>
                    <span>${item.n}</span>
                </div>
            </label>
        `;
    });

    // Manejo de Formulario
    document.getElementById('mainForm').onsubmit = function(e) {
        e.preventDefault();
        const data = {
            nombre: document.getElementById('u_nombre').value,
            talla: document.getElementById('u_talla').value,
            color: document.querySelector('input[name="color_opt"]:checked').value,
            fecha: new Date().toLocaleDateString()
        };

        let db = JSON.parse(localStorage.getItem('pedidos_2026')) || [];
        db.push(data);
        localStorage.setItem('pedidos_2026', JSON.stringify(db));

        document.getElementById('view-form').classList.remove('active');
        document.getElementById('view-success').classList.add('active');
    };

    // Funciones Admin
    function goAdmin() {
        const pin = prompt("Clave de Acceso:");
        if(pin === "2026") {
            document.getElementById('view-form').classList.remove('active');
            document.getElementById('view-admin').classList.add('active');
            loadTable();
        } else { alert("Acceso Denegado"); }
    }

    function loadTable() {
        const db = JSON.parse(localStorage.getItem('pedidos_2026')) || [];
        let html = `<table><tr><th>Catequista</th><th>Talla</th><th>Color</th></tr>`;
        db.forEach(row => {
            html += `<tr><td>${row.nombre}</td><td>${row.talla}</td><td>${row.color}</td></tr>`;
        });
        html += `</table>`;
        document.getElementById('tableBox').innerHTML = db.length > 0 ? html : "<p style='text-align:center'>No hay pedidos aún.</p>";
        document.getElementById('stats').innerHTML = `<div style="background:var(--secondary); padding:10px; border-radius:10px; flex-grow:1; text-align:center"><b>Total:</b> ${db.length}</div>`;
    }

    function exportCSV() {
        const db = JSON.parse(localStorage.getItem('pedidos_2026')) || [];
        if(db.length === 0) return alert("Nada que exportar");
        
        let csv = "Nombre,Talla,Color,Fecha\n";
        db.forEach(r => csv += `${r.nombre},${r.talla},${r.color},${r.fecha}\n`);
        
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "Reporte_Poleras_2026.csv";
        a.click();
    }
</script>

</body>
</html>
