<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catequesis Tarija V8 - Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --p-blue: #151b4d; --p-gold: #ffc107; --p-accent: #ff4081; }
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
        
        /* Encabezado con Jesús y Rueda */
        .app-header { background: var(--p-blue); color: white; padding: 25px; border-bottom: 6px solid var(--p-gold); border-radius: 0 0 30px 30px; text-align: center; }
        .progress-container { position: relative; width: 100px; height: 100px; margin: 0 auto; }
        .jesus-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 40px; transition: 0.5s; }
        .jesus-happy { animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translate(-50%, -50%); } 50% { transform: translate(-50%, -70%); } }
        
        circle { fill: none; stroke-width: 8; stroke-linecap: round; transform: rotate(-90deg); transform-origin: 50% 50%; transition: stroke-dashoffset 0.5s; }
        .bg-circle { stroke: #e0e0e0; }
        .progress-circle { stroke: var(--p-gold); stroke-dasharray: 251.2; stroke-dashoffset: 251.2; }

        .card { border-radius: 25px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 15px; }
        .login-screen { position: fixed; inset: 0; background: var(--p-blue); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        
        /* Navegación App */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 999; border-radius: 20px 20px 0 0; }
        .nav-item { text-align: center; color: #888; font-size: 11px; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--p-blue); font-weight: bold; }
        .nav-item i { font-size: 24px; display: block; }
        
        .hidden { display: none !important; }
        .st-badge { font-size: 11px; padding: 5px 12px; border-radius: 50px; border: none; }
    </style>
</head>
<body>

<div id="login-box" class="login-screen">
    <div class="card p-4 text-center" style="width: 90%; max-width: 380px;">
        <h2 class="fw-bold mb-4" style="color: var(--p-blue)">✝️ Catequesis V8</h2>
        <select id="u-rol" class="form-select mb-3 rounded-pill p-3 border-0 bg-light shadow-sm">
            <option value="Maycol">Maycol (Coordinador)</option>
            <option value="Yoselin">Yoselin (Subcoordinadora)</option>
            <option value="Joven">Joven (Portal Juvenil)</option>
        </select>
        <input type="password" id="u-pass" class="form-control mb-4 rounded-pill p-3 bg-light border-0 shadow-sm" placeholder="Contraseña">
        <button onclick="login()" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow">ACCEDER AL SISTEMA</button>
    </div>
</div>

<div id="app-main" class="hidden">
    <div class="app-header">
        <div class="progress-container">
            <svg width="100" height="100">
                <circle class="bg-circle" cx="50" cy="50" r="40"></circle>
                <circle id="p-bar" class="progress-circle" cx="50" cy="50" r="40"></circle>
            </svg>
            <div id="jesus-box" class="jesus-icon">🙏</div>
        </div>
        <h5 class="mt-2 fw-bold">MISIÓN AL: <span id="p-text">0%</span></h5>
        <div id="label-user" class="badge bg-warning text-dark p-2 px-3 rounded-pill shadow-sm"></div>
    </div>

    <div id="sec-com" class="seccion">
        <div class="card p-4">
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-megaphone me-2"></i>Avisos para WhatsApp</h6>
            <input type="text" id="wa-tit" class="form-control mb-2 rounded-3 border-0 bg-light" placeholder="¿QUÉ EVENTO ES?">
            <input type="text" id="wa-lug" class="form-control mb-2 rounded-3 border-0 bg-light" placeholder="📍 ¿DÓNDE ES?">
            <textarea id="wa-msg" class="form-control mb-3 rounded-3 border-0 bg-light" rows="3" placeholder="Detalles extra..."></textarea>
            <button onclick="enviarWA()" class="btn btn-success w-100 py-3 rounded-pill fw-bold shadow">ENVIAR A GRUPO</button>
        </div>
    </div>

    <div id="sec-age" class="seccion hidden">
        <div class="card p-4">
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-list-check me-2"></i>Misiones y Checklist</h6>
            <div id="admin-agenda" class="bg-light p-3 rounded-4 mb-3 border">
                <input type="date" id="age-f" class="form-control mb-2 border-0 shadow-sm">
                <input type="text" id="age-a" class="form-control mb-2 border-0 shadow-sm" placeholder="Tarea / Actividad">
                <input type="text" id="age-l" class="form-control mb-2 border-0 shadow-sm" placeholder="📍 Lugar">
                <button onclick="addAge()" class="btn btn-primary w-100 rounded-pill btn-sm fw-bold">Añadir Misión</button>
            </div>
            <div id="l-age"></div>
        </div>
    </div>

    <div id="sec-inv" class="seccion hidden">
        <div class="card p-4">
            <div class="d-flex justify-content-between mb-3">
                <h6 class="fw-bold text-primary">Estado de Equipos</h6>
                <button class="btn btn-primary btn-sm rounded-pill" onclick="addInv()">+ Item</button>
            </div>
            <div id="t-inv" class="row"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div id="n-com" class="nav-item active" onclick="tab('com')"><i class="bi bi-chat-heart"></i>Avisos</div>
        <div id="n-age" class="nav-item" onclick="tab('age')"><i class="bi bi-check2-circle"></i>Agenda</div>
        <div id="n-inv" class="nav-item" onclick="tab('inv')"><i class="bi bi-box-seam"></i>Material</div>
    </div>
</div>
