<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP - Gestión Profesional Grupo 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --guindo: #800020; --success: #2e7d32; --warning: #ed6c02; --danger: #d32f2f; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 80px; color: #333; }
        header { background: var(--guindo); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* ASISTENCIA MAESTRA */
        .tabla-asistencia { width: 100%; border-collapse: collapse; font-size: 13px; }
        .row-alumno { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; flex-direction: column; gap: 8px; }
        .btn-group { display: flex; gap: 4px; flex-wrap: wrap; }
        .btn-opt { flex: 1; padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px; font-size: 9px; font-weight: 800; cursor: pointer; background: white; }
        .btn-opt.p { color: var(--success); } .btn-opt.p.active { background: var(--success); color: white; }
        .btn-opt.f { color: var(--danger); } .btn-opt.f.active { background: var(--danger); color: white; }
        .btn-opt.pp { color: var(--warning); } .btn-opt.pp.active { background: var(--warning); color: white; }
        .btn-opt.t { color: #0288d1; } .btn-opt.t.active { background: #0288d1; color: white; }

        /* REPORTE MISA */
        .status-gps { font-size: 11px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
        .timer-box { background: #eee; padding: 10px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 18px; color: var(--guindo); }
        textarea { width: 100%; border-radius: 10px; border: 1px solid #ddd; padding: 10px; margin-top: 10px; resize: none; }
        .btn-full { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; margin-top: 10px; color: white; }
        
        .nav { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 12px 0; }
        .nav i { font-size: 22px; color: #ccc; cursor: pointer; }
        .nav i.active { color: var(--guindo); }
        .hidden { display: none !important; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<header>
    <div style="font-weight: 800;">GRUPO 4 - SAN MARTÍN DE PORRES</div>
    <div id="reloj" style="font-size: 12px; opacity: 0.9;">00:00:00</div>
</header>

<div class="container">
    <div id="v-registro" class="view">
        <div class="card">
            <h3 style="margin-top:0">Ficha de Inscripción</h3>
            <input type="text" id="reg-nom" placeholder="Nombre Completo" style="margin-bottom:10px; width:100%; padding:10px;">
            <input type="number" id="reg-ci" placeholder="C.I." style="margin-bottom:10px; width:100%; padding:10px;">
            <input type="number" id="reg-cel" placeholder="Celular" style="margin-bottom:10px; width:100%; padding:10px;">
            <input type="date" id="reg-nac" style="width:100%; padding:10px;">
            <button class="btn-full" style="background:var(--guindo)" onclick="app.inscribir()">GUARDAR REGISTRO</button>
        </div>
    </div>

    <div id="v-misa" class="view hidden">
        <div class="card">
            <h3>⛪ Marcado de Misa</h3>
            <div id="gps-status" class="status-gps" style="color: grey;"><i class="fas fa-location-dot"></i> Verificando GPS...</div>
            <select id="sel-joven" style="width:100%; padding:10px; margin-bottom:10px;"></select>
            
            <button id="btn-entrada" class="btn-full" style="background:#444" onclick="app.marcarEntrada()">MARCAR ENTRADA</button>
            
            <div id="area-salida" class="hidden">
                <div class="timer-box" id="timer-misa">Misa en curso...</div>
                <label style="font-size:12px; font-weight:700; margin-top:15px; display:block;">Resumen de la Homilía (Un párrafo):</label>
                <textarea id="homilia-text" rows="4" placeholder="Escribe lo que aprendiste hoy..."></textarea>
                <button class="btn-full" style="background:var(--success)" onclick="app.marcarSalida()">ENVIAR REPORTE FINAL</button>
            </div>
        </div>
    </div>

    <div id="v-admin" class="view hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <h3 style="margin:0">Control de Asistencia</h3>
            <button onclick="app.exportar()" style="background:#107c41; border:none; color:white; padding:5px 10px; border-radius:5px; font-size:11px;">Descargar Registro</button>
        </div>
        <div class="card" id="lista-master" style="padding:10px;"></div>
    </div>
</div>

<div class="nav">
    <i class="fas fa-user-plus active" onclick="app.nav('registro', this)"></i>
    <i class="fas fa-church" onclick="app.nav('misa', this)"></i>
    <i class="fas fa-clipboard-check" onclick="app.nav('admin', this)"></i>
</div>

<script>
    const app = {
        db: JSON.parse(localStorage.getItem('g4_vfinal')) || { alumnos: [], reportes: [] },
        posicionParroquia: { lat: -21.535, lon: -64.730 }, // Ajustar a la ubicación real

        init: () => {
            setInterval(() => { document.getElementById('reloj').innerText = new Date().toLocaleTimeString(); }, 1000);
            app.render();
            app.checkGPS();
        },

        checkGPS: () => {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((p) => {
                    document.getElementById('gps-status').style.color = "var(--success)";
                    document.getElementById('gps-status').innerHTML = '<i class="fas fa-check-circle"></i> Ubicación validada: En la Parroquia';
                }, () => {
                    document.getElementById('gps-status').innerHTML = '<i class="fas fa-exclamation-triangle"></i> Activa tu GPS para marcar';
                });
            }
        },

        inscribir: () => {
            const n = document.getElementById('reg-nom').value;
            const ci = document.getElementById('reg-ci').value;
            if(!n || !ci) return alert("Nombre y C.I. obligatorios");
            app.db.alumnos.push({ id: Date.now(), nombre: n, ci, cel: document.getElementById('reg-cel').value, nac: document.getElementById('reg-nac').value, p:0, f:0, per:0, t:0 });
            app.sync("Registrado exitosamente");
            app.nav('misa', document.querySelector('.fa-church'));
        },

        marcarEntrada: () => {
            const j = document.getElementById('sel-joven').value;
            if(!j) return alert("Selecciona tu nombre");
            document.getElementById('btn-entrada').classList.add('hidden');
            document.getElementById('area-salida').classList.remove('hidden');
            app.entradaTemp = new Date().toLocaleTimeString();
        },

        marcarSalida: () => {
            const h = document.getElementById('homilia-text').value;
            if(h.length < 20) return alert("El resumen es muy corto, escribe lo que aprendiste.");
            const j = document.getElementById('sel-joven').value;
            app.db.reportes.push({ joven: j, entrada: app.entradaTemp, salida: new Date().toLocaleTimeString(), homilia: h, fecha: new Date().toLocaleDateString() });
            app.sync("Reporte enviado. ¡Gracias por asistir!");
            location.reload();
        },

        nav: (id, el) => {
            if(id === 'admin' && prompt("Clave Michael:") !== "4444") return;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav i').forEach(i => i.classList.remove('active'));
            document.getElementById('v-'+id).classList.remove('hidden');
            el.classList.add('active');
            app.render();
        },

        sync: (m) => {
            localStorage.setItem('g4_vfinal', JSON.stringify(app.db));
            if(m) alert(m);
            app.render();
        },

        marcarAsistencia: (idx, tipo) => {
            if(tipo === 'p') app.db.alumnos[idx].p++;
            if(tipo === 'f') app.db.alumnos[idx].f++;
            if(tipo === 'per') app.db.alumnos[idx].per++;
            if(tipo === 't') app.db.alumnos[idx].t++;
            app.sync();
        },

        render: () => {
            document.getElementById('sel-joven').innerHTML = '<option value="">Quién eres?</option>' + app.db.alumnos.map(a => `<option>${a.nombre}</option>`);
            
            document.getElementById('lista-master').innerHTML = app.db.alumnos.map((a, i) => `
                <div class="row-alumno">
                    <div style="display:flex; justify-content:space-between">
                        <b>${a.nombre}</b>
                        <span style="font-size:10px; color:var(--guindo)">P:${a.p} | F:${a.f} | Per:${a.per} | T:${a.t}</span>
                    </div>
                    <div class="btn-group">
                        <button class="btn-opt p" onclick="app.marcarAsistencia(${i},'p')">PRESENTE</button>
                        <button class="btn-opt f" onclick="app.marcarAsistencia(${i},'f')">FALTA</button>
                        <button class="btn-opt per" onclick="app.marcarAsistencia(${i},'per')">PERMISO</button>
                        <button class="btn-opt t" onclick="app.marcarAsistencia(${i},'t')">TAREA</button>
                    </div>
                </div>
            `).join('') || "Sin alumnos.";
        },

        exportar: () => {
            const ws = XLSX.utils.json_to_sheet(app.db.alumnos);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Asistencia");
            XLSX.writeFile(wb, "Reporte_Grupo4_SMP.xlsx");
        }
    };
    app.init();
</script>
</body>
</html>
