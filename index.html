<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catequesis PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
.sidebar{
position:fixed;width:220px;height:100%;background:#020617;padding-top:20px;
}
.sidebar button{
display:block;width:100%;padding:12px;border:none;background:none;color:white;text-align:left;
}
.main{margin-left:220px;padding:20px;}
.section{display:none;}
.active{display:block;}
.card{
background:#1e293b;padding:15px;margin:10px 0;border-radius:10px;
}
input,select,textarea{
width:100%;padding:10px;margin:5px 0;border:none;border-radius:10px;
}
button{
padding:10px;border:none;border-radius:10px;background:#22c55e;color:white;
}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="sidebar">
<button onclick="ver('dashboard')">Dashboard</button>
<button onclick="ver('grupos')">Grupos</button>
<button onclick="ver('usuarios')">Confirmantes</button>
<button onclick="ver('tareas')">Tareas</button>
<button onclick="logout()">Salir</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>Panel</h2>
<div class="card">Grupos: <span id="totalGrupos"></span></div>
<div class="card">Confirmantes: <span id="totalUsuarios"></span></div>
</div>

<div id="grupos" class="section">
<h2>Grupos</h2>
<input id="gNombre" placeholder="Nombre grupo">
<button onclick="addGrupo()">Crear</button>
<div id="listaGrupos"></div>
</div>

<div id="usuarios" class="section">
<h2>Confirmantes</h2>
<input id="uNombre" placeholder="Nombre">
<select id="uGrupo"></select>
<button onclick="addUsuario()">Agregar</button>
<div id="listaUsuarios"></div>
</div>

<div id="tareas" class="section">
<h2>Tareas</h2>
<input id="tTexto" placeholder="Tarea">
<select id="tGrupo"></select>
<button onclick="addTarea()">Crear</button>
<div id="listaTareas"></div>
</div>

</div>
</div>

<!-- FIREBASE MODULAR -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import {
getFirestore,
collection,
addDoc,
query,
where,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// 🔥 CONFIGURA AQUÍ
const firebaseConfig = {
apiKey: "TU_API_KEY",
authDomain: "TU_DOMINIO",
projectId: "TU_ID"
};

const appFirebase = initializeApp(firebaseConfig);
const auth = getAuth(appFirebase);
const db = getFirestore(appFirebase);

// LOGIN
window.login = async () => {
await signInWithEmailAndPassword(auth, email.value, pass.value);
};

window.register = async () => {
await createUserWithEmailAndPassword(auth, email.value, pass.value);
};

window.logout = () => signOut(auth);

// ESTADO
onAuthStateChanged(auth, user => {
if(user){
login.style.display="none";
app.style.display="block";
init(user.uid);
}else{
login.style.display="block";
app.style.display="none";
}
});

// NAV
window.ver = (id) => {
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
};

// INIT
function init(uid){
cargarGrupos(uid);
cargarUsuarios(uid);
cargarTareas(uid);
}

// GRUPOS
window.addGrupo = async () => {
await addDoc(collection(db,"grupos"),{
nombre:gNombre.value,
user:auth.currentUser.uid
});
};

function cargarGrupos(uid){
const q = query(collection(db,"grupos"), where("user","==",uid));
onSnapshot(q,data=>{
listaGrupos.innerHTML="";
uGrupo.innerHTML="";
tGrupo.innerHTML="";
totalGrupos.innerText=data.size;
data.forEach(doc=>{
let g=doc.data().nombre;
listaGrupos.innerHTML+=`<div class="card">${g}</div>`;
uGrupo.innerHTML+=`<option>${g}</option>`;
tGrupo.innerHTML+=`<option>${g}</option>`;
});
});
}

// USUARIOS
window.addUsuario = async () => {
await addDoc(collection(db,"usuarios"),{
nombre:uNombre.value,
grupo:uGrupo.value,
user:auth.currentUser.uid
});
};

function cargarUsuarios(uid){
const q = query(collection(db,"usuarios"), where("user","==",uid));
onSnapshot(q,data=>{
listaUsuarios.innerHTML="";
totalUsuarios.innerText=data.size;
data.forEach(doc=>{
let d=doc.data();
listaUsuarios.innerHTML+=`<div class="card">${d.nombre} - ${d.grupo}</div>`;
});
});
}

// TAREAS
window.addTarea = async () => {
await addDoc(collection(db,"tareas"),{
texto:tTexto.value,
grupo:tGrupo.value,
user:auth.currentUser.uid
});
};

function cargarTareas(uid){
const q = query(collection(db,"tareas"), where("user","==",uid));
onSnapshot(q,data=>{
listaTareas.innerHTML="";
data.forEach(doc=>{
let t=doc.data();
listaTareas.innerHTML+=`<div class="card">${t.texto}</div>`;
});
});
}

</script>

</body>
</html>
