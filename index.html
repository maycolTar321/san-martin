<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catequesis PRO</title>

<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0f172a;
color:white;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:20px;
width:100%;
max-width:380px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

.secondary{
background:#334155;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#38bdf8;
}

#msg{
text-align:center;
margin-top:10px;
color:#f87171;
}

/* APP */
#app{display:none;}
.sidebar{
position:fixed;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
background:none;
border:none;
color:white;
text-align:left;
}

.main{
margin-left:220px;
padding:15px;
}

.section{display:none;}
.active{display:block;}

.card{
background:#1e293b;
padding:15px;
border-radius:15px;
margin:10px 0;
}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{
position:relative;
width:100%;
display:flex;
overflow:auto;
}
.main{margin-left:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="container">
<div class="box">
<h2>Login</h2>

<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<div class="link" onclick="mostrarRegistro()">Crear cuenta</div>

<p id="msg"></p>
</div>
</div>

<!-- REGISTRO -->
<div id="registro" class="container" style="display:none;">
<div class="box">
<h2>Registro</h2>

<input id="rNombre" placeholder="Nombre completo">
<input id="rCel" placeholder="Celular">
<input id="rEmail" placeholder="Correo">
<input id="rPass" type="password" placeholder="Contraseña">

<label>¿Cuánto es 3 + 4?</label>
<input id="captcha">

<button onclick="registrar()">Registrar</button>

<div class="link" onclick="volverLogin()">Volver al login</div>

<p id="msg2"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<button onclick="ver('dashboard')">Dashboard</button>
<button onclick="ver('grupos')">Grupos</button>
<button onclick="ver('confirmantes')">Confirmantes</button>
<button onclick="ver('tareas')">Tareas</button>
<button onclick="logout()">Salir</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>Panel</h2>
<div class="card">Grupos: <span id="totalGrupos"></span></div>
<div class="card">Confirmantes: <span id="totalConfirmantes"></span></div>
</div>

<div id="grupos" class="section">
<input id="gNombre" placeholder="Nombre grupo">
<button onclick="addGrupo()">Crear</button>
<div id="listaGrupos"></div>
</div>

<div id="confirmantes" class="section">
<input id="uNombre" placeholder="Nombre">
<select id="uGrupo"></select>
<button onclick="addConfirmante()">Agregar</button>
<div id="listaConfirmantes"></div>
</div>

<div id="tareas" class="section">
<input id="tTexto" placeholder="Tarea">
<select id="tGrupo"></select>
<button onclick="addTarea()">Crear</button>
<div id="listaTareas"></div>
</div>

</div>
</div>

<script>

// BASE LOCAL
let db = JSON.parse(localStorage.getItem("db")) || {
users:[],
grupos:[],
confirmantes:[],
tareas:[]
};

function save(){
localStorage.setItem("db", JSON.stringify(db));
}

// CAMBIOS DE VISTA
function mostrarRegistro(){
login.style.display="none";
registro.style.display="flex";
}

function volverLogin(){
registro.style.display="none";
login.style.display="flex";
}

// REGISTRO
function registrar(){

if(captcha.value != "7"){
msg2.innerText="Captcha incorrecto";
return;
}

if(!rNombre.value || !rEmail.value || !rPass.value){
msg2.innerText="Completa los datos";
return;
}

let existe = db.users.find(u=>u.email===rEmail.value);
if(existe){
msg2.innerText="Correo ya registrado";
return;
}

db.users.push({
nombre:rNombre.value,
cel:rCel.value,
email:rEmail.value,
pass:rPass.value
});

save();

msg2.style.color="#22c55e";
msg2.innerText="Registrado correctamente";

setTimeout(()=>{
volverLogin();
},1500);

}

// LOGIN
function login(){
let user = db.users.find(u=>u.email===email.value && u.pass===pass.value);

if(user){
localStorage.setItem("session", email.value);
mostrarApp();
}else{
msg.innerText="Datos incorrectos";
}
}

// LOGOUT
function logout(){
localStorage.removeItem("session");
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("session")){
mostrarApp();
}

function mostrarApp(){
login.style.display="none";
app.style.display="block";
render();
}

// NAV
function ver(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// FUNCIONES
function addGrupo(){
db.grupos.push({nombre:gNombre.value});
save();render();
}

function addConfirmante(){
db.confirmantes.push({nombre:uNombre.value,grupo:uGrupo.value});
save();render();
}

function addTarea(){
db.tareas.push({texto:tTexto.value,grupo:tGrupo.value});
save();render();
}

// RENDER
function render(){

listaGrupos.innerHTML="";
uGrupo.innerHTML="";
tGrupo.innerHTML="";

db.grupos.forEach(g=>{
listaGrupos.innerHTML+=`<div class="card">${g.nombre}</div>`;
uGrupo.innerHTML+=`<option>${g.nombre}</option>`;
tGrupo.innerHTML+=`<option>${g.nombre}</option>`;
});

listaConfirmantes.innerHTML=db.confirmantes.map(u=>`<div class="card">${u.nombre} - ${u.grupo}</div>`).join("");

listaTareas.innerHTML=db.tareas.map(t=>`<div class="card">${t.texto}</div>`).join("");

totalGrupos.innerText=db.grupos.length;
totalConfirmantes.innerText=db.confirmantes.length;

}

</script>

</body>
</html>
