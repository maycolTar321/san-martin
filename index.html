<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catequesis LMS</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;}
header{background:#7a0019;padding:15px;text-align:center;}
.container{padding:10px;}
.card{background:#1e293b;padding:10px;border-radius:10px;margin:5px 0;}
input,select,button{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;}
button{background:#22c55e;color:white;}
.section{display:none;}
.active{display:block;}
.bottom{position:fixed;bottom:0;width:100%;display:flex;background:#020617;}
.bottom button{flex:1;background:none;color:white;padding:10px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day{background:#1e293b;padding:10px;border-radius:5px;text-align:center;}
</style>
</head>

<body>

<header>
<h2>Catequesis LMS</h2>
</header>

<div class="container">

<!-- LOGIN -->
<div id="login" class="active">
<h3>Login</h3>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h3>Panel</h3>
<div class="card">Rol: <span id="rol"></span></div>
</div>

<!-- GRUPOS -->
<div id="grupos" class="section">
<h3>Grupos</h3>
<input id="gNombre" placeholder="Nombre grupo">
<button onclick="addGrupo()">Crear</button>
<div id="listaGrupos"></div>
</div>

<!-- USUARIOS -->
<div id="usuarios" class="section">
<h3>Usuarios</h3>
<input id="uNombre" placeholder="Nombre">
<select id="uRol">
<option value="catequista">Catequista</option>
<option value="joven">Joven</option>
</select>
<button onclick="addUser()">Agregar</button>
<div id="listaUsuarios"></div>
</div>

<!-- TAREAS -->
<div id="tareas" class="section">
<h3>Tareas</h3>
<input id="tTexto" placeholder="Tarea">
<select id="tGrupo"></select>
<button onclick="addTarea()">Crear</button>
<div id="listaTareas"></div>
</div>

<!-- BIBLIOTECA -->
<div id="biblioteca" class="section">
<h3>Biblioteca</h3>
<input id="bTitulo" placeholder="Título">
<input id="bLink" placeholder="Link">
<button onclick="addLibro()">Agregar</button>
<div id="listaLibros"></div>
</div>

<!-- CALENDARIO -->
<div id="calendario" class="section">
<h3>Calendario</h3>
<input id="evento" placeholder="Evento">
<input type="date" id="fecha">
<button onclick="addEvento()">Agregar</button>
<div id="listaEventos"></div>

<div class="calendar" id="calendar"></div>
</div>

<!-- AVISOS -->
<div id="avisos" class="section">
<h3>Avisos</h3>
<input id="aviso" placeholder="Mensaje">
<button onclick="addAviso()">Publicar</button>
<div id="listaAvisos"></div>
</div>

</div>

<!-- MENÚ -->
<div class="bottom">
<button onclick="nav('dashboard')">🏠</button>
<button onclick="nav('grupos')">📚</button>
<button onclick="nav('tareas')">📝</button>
<button onclick="nav('calendario')">📅</button>
<button onclick="nav('biblioteca')">📖</button>
</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {
users:[],
grupos:[],
tareas:[],
libros:[],
eventos:[],
avisos:[]
};

function save(){localStorage.setItem("db",JSON.stringify(db));}

// LOGIN
function register(){
db.users.push({email:email.value,pass:pass.value,rol:"admin"});
save();
alert("Creado");
}

function login(){
let u = db.users.find(x=>x.email==email.value && x.pass==pass.value);
if(u){
localStorage.setItem("session",JSON.stringify(u));
mostrar();
}
}

function mostrar(){
login.style.display="none";
nav("dashboard");
render();
let user = JSON.parse(localStorage.getItem("session"));
rol.innerText=user.rol;
}

// NAV
function nav(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// FUNCIONES
function addGrupo(){
db.grupos.push({nombre:gNombre.value});
save();render();
}

function addUser(){
db.users.push({nombre:uNombre.value,rol:uRol.value});
save();render();
}

function addTarea(){
db.tareas.push({texto:tTexto.value,grupo:tGrupo.value});
save();render();
}

function addLibro(){
db.libros.push({titulo:bTitulo.value,link:bLink.value});
save();render();
}

function addEvento(){
db.eventos.push({nombre:evento.value,fecha:fecha.value});
save();render();
}

function addAviso(){
db.avisos.push({texto:aviso.value});
save();render();
}

// RENDER
function render(){

listaGrupos.innerHTML=db.grupos.map(g=>`<div class="card">${g.nombre}</div>`).join("");

tGrupo.innerHTML="";
db.grupos.forEach(g=>{
tGrupo.innerHTML+=`<option>${g.nombre}</option>`;
});

listaTareas.innerHTML=db.tareas.map(t=>`<div class="card">${t.texto}</div>`).join("");

listaLibros.innerHTML=db.libros.map(l=>`<div class="card">${l.titulo}</div>`).join("");

listaEventos.innerHTML=db.eventos.map(e=>`<div class="card">${e.nombre} - ${e.fecha}</div>`).join("");

listaAvisos.innerHTML=db.avisos.map(a=>`<div class="card">${a.texto}</div>`).join("");

crearCalendario();
}

// CALENDARIO SIMPLE
function crearCalendario(){
let cal=document.getElementById("calendar");
cal.innerHTML="";
for(let i=1;i<=30;i++){
cal.innerHTML+=`<div class="day">${i}</div>`;
}
}

// AUTO LOGIN
if(localStorage.getItem("session")){
mostrar();
}

</script>

</body>
</html>
