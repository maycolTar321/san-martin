<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP | Catequesis Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --insta-blue: #007BFF;
            --insta-orange: #FF8C00;
            --insta-gradient: linear-gradient(45deg, #007BFF, #FF8C00);
            --bg: #FAFAFA;
            --white: #ffffff;
            --text: #262626;
            --shadow: 0 2px 10px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 75px; }

        /* HEADER */
        header {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #dbdbdb;
        }
        .logo-text { font-weight: 700; font-size: 20px; background: var(--insta-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* STORIES (Secciones rápidas) */
        .stories-container {
            display: flex; gap: 15px; overflow-x: auto; padding: 15px 20px;
            scrollbar-width: none;
        }
        .story { text-align: center; flex-shrink: 0; }
        .story-circle {
            width: 65px; height: 65px; border-radius: 50%; padding: 3px;
            background: var(--insta-gradient); display: flex; align-items: center; justify-content: center;
        }
        .story-circle div { background: white; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .story-circle i { font-size: 22px; color: var(--insta-blue); }
        .story p { font-size: 11px; margin-top: 5px; font-weight: 600; }

        /* CONTENEDOR PRINCIPAL */
        .container { padding: 10px 15px; max-width: 450px; margin: auto; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* POSTS (ESTILO FEED) */
        .post { background: var(--white); border: 1px solid #dbdbdb; border-radius: 12px; margin-bottom: 15px; overflow: hidden; }
        .post-header { padding: 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
        .post-header .avatar { width: 30px; height: 30px; border-radius: 50%; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .post-body { padding: 15px; }
        .post-footer { padding: 10px 15px; border-top: 1px solid #f0f0f0; font-size: 13px; color: #8e8e8e; }

        /* BOTONES Y CAMPOS */
        .input-group { background: white; padding: 20px; border-radius: 15px; border: 1px solid #dbdbdb; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #efefef; border-radius: 8px; background: #fafafa; font-size: 14px; }
        .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; background: var(--insta-blue); color: white; margin-top: 10px; }
        .btn-secondary { background: none; border: 1px solid #dbdbdb; color: var(--text); }

        /* NAV INFERIOR */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: white;
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #dbdbdb; z-index: 1000;
        }
        .nav-item { border: none; background: none; color: #262626; font-size: 24px; cursor: pointer; flex: 1; position: relative; }
        .nav-item span { display: block; font-size: 10px; margin-top: 2px; }
        .nav-item.active { color: var(--insta-orange); }

        /* PANTALLA LOGIN */
        #auth-screen { position: fixed; inset: 0; background: var(--white); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 class="logo-text" style="font-size: 32px; margin-bottom: 30px;">Catequesis Pro</h1>
        <div style="width: 100%; max-width: 300px;">
            <input type="email" id="log-email" placeholder="Correo electrónico">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <button class="btn-main" onclick="app.login()">Iniciar Sesión</button>
            
            <div style="text-align: center; margin: 25px 0; color: #8e8e8e; font-size: 13px;">O TAMBIÉN</div>
            
            <button class="btn-main btn-secondary" onclick="app.guestAccess()">Soy Joven Confirmante</button>
        </div>
    </div>

    <header>
        <span class="logo-text">Confirmación SMP</span>
        <div id="user-badge" style="font-size: 12px; font-weight: 600; color: var(--insta-blue);"></div>
    </header>

    <div class="stories-container" id="stories">
        <div class="story" onclick="app.nav('dash')"><div class="story-circle"><div><i class="fas fa-home"></i></div></div><p>Inicio</p></div>
        <div class="story" onclick="app.nav('edu')"><div class="story-circle"><div><i class="fas fa-book"></i></div></div><p>Tareas</p></div>
        <div class="story" onclick="app.nav('blog')"><div class="story-circle"><div><i class="fas fa-bullhorn"></i></div></div><p>Avisos</p></div>
        <div class="story" onclick="app.nav('event')"><div class="story-circle"><div><i class="fas fa-calendar"></i></div></div><p>Agenda</p></div>
        <div id="story-admin" class="story" style="display:none;" onclick="app.nav('admin')"><div class="story-circle"><div><i class="fas fa-tools"></i></div></div><p>Gestión</p></div>
    </div>

    <div class="container">
        
        <div id="v-dash" class="section active">
            <div id="feed-container">
                </div>
        </div>

        <div id="v-edu" class="section">
            <div id="admin-edu-form" class="input-group admin-only" style="display:none;">
                <h4 style="margin-bottom:10px;">Asignar Tarea / Tema</h4>
                <input type="text" id="edu-title" placeholder="Título">
                <textarea id="edu-desc" placeholder="Instrucciones o descripción..."></textarea>
                <button class="btn-main" onclick="app.save('edu')">Publicar Tarea</button>
            </div>
            <div id="list-edu"></div>
        </div>

        <div id="v-admin" class="section admin-only">
            <h3>Panel Maestro</h3>
            <div class="input-group">
                <select id="adm-type">
                    <option value="cat">Catequista</option>
                    <option value="gru">Grupo</option>
                    <option value="con">Confirmante</option>
                </select>
                <input type="text" id="adm-name" placeholder="Nombre">
                <input type="text" id="adm-extra" placeholder="Dato extra">
                <button class="btn-main" onclick="app.saveAdmin()">Registrar</button>
            </div>
            <div id="list-admin"></div>
        </div>

        <div id="v-blog" class="section">
            <div class="input-group admin-only" style="display:none;">
                <input type="text" id="blog-title" placeholder="Título del Aviso">
                <textarea id="blog-text" placeholder="¿Qué quieres anunciar hoy?"></textarea>
                <button class="btn-main" onclick="app.save('blog')">Postear</button>
            </div>
            <div id="list-blog"></div>
        </div>

        <div id="v-event" class="section">
            <div class="input-group admin-only" style="display:none;">
                <input type="text" id="ev-name" placeholder="Evento">
                <input type="date" id="ev-date">
                <button class="btn-main" onclick="app.save('event')">Agendar</button>
            </div>
            <div id="list-event"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="app.nav('dash')"><i class="fas fa-home"></i></button>
        <button class="nav-item" onclick="app.nav('edu')"><i class="fas fa-graduation-cap"></i></button>
        <button class="nav-item" onclick="app.nav('blog')"><i class="fas fa-plus-square"></i></button>
        <button class="nav-item" id="nav-admin" style="display:none;" onclick="app.nav('admin')"><i class="fas fa-user-cog"></i></button>
        <button class="nav-item" onclick="app.logout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>

    <script>
        const app = {
            db: JSON.parse(localStorage.getItem('smp_final_db')) || { cat:[], gru:[], con:[], blog:[], edu:[], event:[] },
            isAdmin: false,

            login: () => {
                const email = document.getElementById('log-email').value;
                const pass = document.getElementById('log-pass').value;

                if(email === 'avilamichael0@gmail.com' && pass === '123456') {
                    app.isAdmin = true;
                    localStorage.setItem('smp_role', 'admin');
                    app.init();
                } else if(email.length > 3) {
                    app.isAdmin = false;
                    localStorage.setItem('smp_role', 'catequista');
                    app.init();
                } else {
                    alert("Datos incorrectos");
                }
            },

            guestAccess: () => {
                app.isAdmin = false;
                localStorage.setItem('smp_role', 'joven');
                app.init();
            },

            init: () => {
                document.getElementById('auth-screen').style.display = 'none';
                const role = localStorage.getItem('smp_role');
                
                if(role === 'admin') {
                    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
                    document.getElementById('story-admin').style.display = 'block';
                    document.getElementById('nav-admin').style.display = 'block';
                    document.getElementById('user-badge').innerText = "ADMIN";
                } else {
                    document.getElementById('user-badge').innerText = role.toUpperCase();
                }
                app.render();
            },

            nav: (id) => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.getElementById('v-' + id).classList.add('active');
            },

            saveAdmin: () => {
                const type = document.getElementById('adm-type').value;
                const name = document.getElementById('adm-name').value;
                const extra = document.getElementById('adm-extra').value;
                if(!name) return;
                app.db[type].push({name, extra});
                app.sync();
            },

            save: (key) => {
                const t = document.getElementById(key + '-title')?.value || document.getElementById('ev-name')?.value;
                const d = document.getElementById(key + '-text')?.value || document.getElementById(key + '-desc')?.value || document.getElementById('ev-date')?.value;
                if(!t) return;
                app.db[key].push({title: t, desc: d, date: new Date().toLocaleDateString()});
                app.sync();
            },

            sync: () => {
                localStorage.setItem('smp_final_db', JSON.stringify(app.db));
                app.render();
                alert("¡Publicado!");
            },

            render: () => {
                // Render Feed (Dashboard)
                const feed = document.getElementById('feed-container');
                const allPosts = [...app.db.blog, ...app.db.edu].reverse();
                feed.innerHTML = allPosts.map(p => `
                    <div class="post">
                        <div class="post-header"><div class="avatar">SM</div> <b>San Martín de Porres</b></div>
                        <div class="post-body"><b>${p.title}</b><p style="margin-top:5px; font-size:14px;">${p.desc}</p></div>
                        <div class="post-footer">Publicado el ${p.date}</div>
                    </div>
                `).join('');

                // Render Listas
                document.getElementById('list-edu').innerHTML = app.db.edu.map(e => `<div class="post"><div class="post-body">📘 <b>${e.title}</b><p>${e.desc}</p></div></div>`).join('');
                document.getElementById('list-blog').innerHTML = app.db.blog.map(b => `<div class="post"><div class="post-body">📢 <b>${b.title}</b><p>${b.desc}</p></div></div>`).join('');
                document.getElementById('list-event').innerHTML = app.db.event.map(e => `<div class="post"><div class="post-body">📅 <b>${e.title}</b><p>Fecha: ${e.desc}</p></div></div>`).join('');
                document.getElementById('list-admin').innerHTML = app.db.cat.concat(app.db.gru, app.db.con).map(i => `<div class="post-header" style="border:1px solid #dbdbdb; margin-bottom:5px; border-radius:8px;"><b>${i.name}</b> - <small>${i.extra}</small></div>`).join('');
            },

            logout: () => {
                localStorage.clear();
                location.reload();
            }
        };

        if(localStorage.getItem('smp_role')) app.init();
    </script>
</body>
</html>
