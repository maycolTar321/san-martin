<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Poleras - Catequesis</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #059669;
            --warning: #d97706;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            color: #1e293b;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .header { text-align: center; margin-bottom: 1.5rem; }
        .header h2 { margin: 0; color: var(--primary); }

        .budget-box {
            background: #f0f7ff;
            border: 2px solid #bfdbfe;
            padding: 1.2rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: #475569; }

        input[type="text"], select {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: border 0.2s;
        }

        /* --- LISTA DE COLORES MEJORADA --- */
        .color-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Dos columnas para que se vea ordenado */
            gap: 12px;
            margin-top: 10px;
        }

        .color-option {
            position: relative;
            cursor: pointer;
        }

        .color-option input {
            position: absolute;
            opacity: 0;
        }

        .color-content {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            transition: all 0.2s;
        }

        .color-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .color-option input:checked + .color-content {
            border-color: var(--primary);
            background-color: #eff6ff;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.1);
        }

        /* --- SECCIÓN DE PAGO --- */
        .payment-card {
            background: #fffbeb;
            border: 1px solid #fde68a;
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
        }

        .checkbox-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: transform 0.1s, background 0.2s;
        }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h2>👕 Poleras Catequistas</h2>
        <p>Elige tu opción para el uniforme</p>
    </div>

    <div class="budget-box">
        <span style="color: #64748b; font-size: 0.9rem;">Aporte Coordinación: Bs. 20</span><br>
        <strong style="font-size: 1.2rem; color: var(--success);">Diferencia a pagar: Bs. 30</strong>
    </div>

    <form id="orderForm">
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="userName" required placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label>Talla</label>
            <select id="userSize" required>
                <option value="">Selecciona tu talla...</option>
                <option value="S">S (Pequeña)</option>
                <option value="M">M (Mediana)</option>
                <option value="L">L (Grande)</option>
                <option value="XL">XL (Extra Grande)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Color Disponible</label>
            <div class="color-list">
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Blanco" required>
                    <div class="color-content">
                        <div class="color-circle" style="background: white;"></div>
                        <span>Blanco</span>
                    </div>
                </label>
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Azul Marino">
                    <div class="color-content">
                        <div class="color-circle" style="background: #1e3a8a;"></div>
                        <span>Azul Marino</span>
                    </div>
                </label>
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Negro">
                    <div class="color-content">
                        <div class="color-circle" style="background: #000;"></div>
                        <span>Negro</span>
                    </div>
                </label>
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Gris">
                    <div class="color-content">
                        <div class="color-circle" style="background: #94a3b8;"></div>
                        <span>Gris</span>
                    </div>
                </label>
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Vino">
                    <div class="color-content">
                        <div class="color-circle" style="background: #7f1d1d;"></div>
                        <span>Vino</span>
                    </div>
                </label>
                <label class="color-option">
                    <input type="radio" name="shirtColor" value="Verde">
                    <div class="color-content">
                        <div class="color-circle" style="background: #064e3b;"></div>
                        <span>Verde</span>
                    </div>
                </label>
            </div>
        </div>

        <div class="payment-card">
            <label class="checkbox-container">
                <input type="checkbox" required>
                <span>Confirmo que deseo la polera y pagaré la diferencia de <b>Bs. 30</b>.</span>
            </label>
        </div>

        <button type="submit">Enviar mi elección</button>
    </form>
</div>

<script>
    document.getElementById('orderForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('userName').value;
        const color = document.querySelector('input[name="shirtColor"]:checked').value;
        const size = document.getElementById('userSize').value;

        // "Magia" extra: Alerta personalizada
        alert(`¡Excelente registro, ${name}!\n\nHas elegido:\n- Color: ${color}\n- Talla: ${size}\n\nRecuerda el saldo de Bs. 30.`);
    });
</script>

</body>
</html>
