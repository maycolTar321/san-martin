<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Electoral - Gobernación Tarija 2026</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    h1 { text-align: center; color: #3b82f6; margin-bottom: 5px; }
    h3 { text-align: center; color: #94a3b8; margin-top: 0; font-weight: normal; }
    
    /* Barra de Progreso */
    .progress-box { background: #1e293b; border-radius: 20px; height: 25px; width: 100%; margin: 20px 0; border: 1px solid #334155; overflow: hidden; position: relative; }
    #progressBar { background: linear-gradient(90deg, #3b82f6, #22c55e); height: 100%; width: 0%; transition: 0.5s; }
    .perc-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 12px; font-weight: bold; }

    /* Buscador */
    .search-container { position: sticky; top: 10px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); padding: 10px; z-index: 100; display: flex; gap: 10px; border-bottom: 1px solid #334155; }
    input { padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #1e293b; color: white; flex-grow: 1; }
    #buscarNum { max-width: 80px; }

    /* Lista de Votantes */
    .persona { background: #1e293b; padding: 15px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
    .info { display: flex; flex-direction: column; }
    .n-orden { font-size: 12px; color: #3b82f6; font-weight: bold; }
    .nombre { font-size: 16px; font-weight: bold; text-transform: uppercase; }
    .ci { font-size: 13px; color: #94a3b8; }
    
    .btn-marcar { background: #22c55e; border: none; padding: 10px 20px; color: white; cursor: pointer; border-radius: 8px; font-weight: bold; }
    .btn-quitar { background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 8px; margin-left: 8px; cursor: pointer; border-radius: 5px; }
    
    .votado { border-color: #22c55e; background: rgba(34, 197, 94, 0.1); }
    .ausente { opacity: 0.5; filter: grayscale(1); }

    /* Escrutinio Final */
    .escrutinio { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #3b82f6; margin-top: 30px; }
    .grid-votos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .v-btn { padding: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    .patria-btn { background: #ea580c; } /* Adrián Oliva */
    .cdc-btn { background: #2563eb; }    /* María René Soruco */
    .blanco-btn { background: #f8fafc; color: #0f172a; }
    .nulo-btn { background: #dc2626; }
    
    .final-stats { display: flex; justify-content: space-around; font-size: 20px; text-align: center; background: #0f172a; padding: 15px; border-radius: 10px; }
    .btn-reporte { background: #3b82f6; width: 100%; padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .oculto { display: none; }
</style>
</head>
<body>

<div class="container">
    <h1>GOBERNACIÓN TARIJA 2026</h1>
    <h3>Segunda Vuelta - Control de Mesa</h3>

    <div class="progress-box">
        <div class="perc-text"><span id="perc">0</span>% Participación</div>
        <div id="progressBar"></div>
    </div>

    <div class="search-container">
        <input type="text" id="buscar" placeholder="🔍 Buscar nombre o CI...">
        <input type="number" id="buscarNum" placeholder="Nº">
    </div>

    <div id="lista"></div>

    <button id="btnCerrar" class="btn-reporte" style="background:#e11d48" onclick="cerrarMesa()">🔒 CERRAR MESA Y EMPEZAR CONTEO</button>

    <div id="seccionConteo" class="escrutinio oculto">
        <h2>📊 Escrutinio Oficial</h2>
        <div class="grid-votos">
            <button class="v-btn patria-btn" onclick="votar('patria')">PATRIA (Oliva)</button>
            <button class="v-btn cdc-btn" onclick="votar('cdc')">CDC (Soruco)</button>
            <button class="v-btn blanco-btn" onclick="votar('blanco')">BLANCO</button>
            <button class="v-btn nulo-btn" onclick="votar('nulo')">NULO</button>
        </div>
        
        <div class="final-stats">
            <div>🟠 Patria<br><strong id="resPatria">0</strong></div>
            <div>🔵 CDC<br><strong id="resCDC">0</strong></div>
            <div>⚪ Blanco<br><strong id="resBlanco">0</strong></div>
            <div>🔴 Nulo<br><strong id="resNulo">0</strong></div>
        </div>
        <button class="btn-reporte" onclick="descargarReporte()">📥 DESCARGAR ACTA DE CIERRE (CSV)</button>
    </div>
</div>

<script>
// Datos basados en la lista previa incluyendo CI
const votantes = [
    {n:1, nombre:"SANTOS LEONARDO JAVIER", ci:"5044122"},
    {n:2, nombre:"SANTOS CHIRINOS LINDA GABRIELA", ci:"7245119"},
    {n:37, nombre:"TOLABA VARGAS MICHELLE ANGELI", ci:"1063321"},
    {n:51, nombre:"VARGAS MORALES FRANZ ROLANDO", ci:"8842100"}
    // ... completar con el resto de la lista
];

let registro = JSON.parse(localStorage.getItem("tja_votos")) || {};
let conteo = JSON.parse(localStorage.getItem("tja_conteo")) || { patria: 0, cdc: 0, blanco: 0, nulo: 0 };
let cerrada = localStorage.getItem("tja_cerrada") === "true";

function render() {
    const lista = document.getElementById("lista");
    const buscar = document.getElementById("buscar").value.toLowerCase();
    const buscarNum = document.getElementById("buscarNum").value;
    lista.innerHTML = "";
    
    let presentes = 0;
    votantes.forEach(v => {
        if(registro[v.nombre] === "voto") presentes++;
        
        const matchesFiltro = v.nombre.toLowerCase().includes(buscar) || v.ci.includes(buscar);
        const matchesNum = !buscarNum || v.n == buscarNum;

        if(matchesFiltro && matchesNum) {
            const div = document.createElement("div");
            div.className = "persona" + (registro[v.nombre] === "voto" ? " votado" : (registro[v.nombre] === "ausente" ? " ausente" : ""));
            div.innerHTML = `
                <div class="info">
                    <span class="n-orden">ORDEN #${v.n}</span>
                    <span class="nombre">${v.nombre}</span>
                    <span class="ci">CI: ${v.ci}</span>
                </div>
                <div>
                    <button class="btn-marcar" onclick="marcar('${v.nombre}')" ${cerrada ? "disabled" : ""}>
                        ${registro[v.nombre] === "voto" ? "REGISTRADO" : "MARCAR"}
                    </button>
                    ${registro[v.nombre] === "voto" && !cerrada ? `<button class="btn-quitar" onclick="quitar('${v.nombre}')">✕</button>` : ""}
                </div>
            `;
            lista.appendChild(div);
        }
    });

    const porc = ((presentes / votantes.length) * 100).toFixed(1);
    document.getElementById("progressBar").style.width = porc + "%";
    document.getElementById("perc").innerText = porc;

    if(cerrada) {
        document.getElementById("seccionConteo").classList.remove("oculto");
        document.getElementById("btnCerrar").classList.add("oculto");
        actualizarTablero();
    }
}

function marcar(nom) { registro[nom] = "voto"; save(); }
function quitar(nom) { delete registro[nom]; save(); }
function save() { localStorage.setItem("tja_votos", JSON.stringify(registro)); render(); }

function cerrarMesa() {
    if(!confirm("¿Cerrar mesa? Los no marcados se registrarán como ausentes.")) return;
    votantes.forEach(v => { if(!registro[v.nombre]) registro[v.nombre] = "ausente"; });
    cerrada = true;
    localStorage.setItem("tja_cerrada", "true");
    save();
}

function votar(tipo) {
    const totalVotos = conteo.patria + conteo.cdc + conteo.blanco + conteo.nulo;
    const asistentes = Object.values(registro).filter(x => x === "voto").length;
    
    if(totalVotos < asistentes) {
        conteo[tipo]++;
        localStorage.setItem("tja_conteo", JSON.stringify(conteo));
        actualizarTablero();
    } else {
        alert("Todos los votos de los asistentes ya han sido escrutados.");
    }
}

function actualizarTablero() {
    document.getElementById("resPatria").innerText = conteo.patria;
    document.getElementById("resCDC").innerText = conteo.cdc;
    document.getElementById("resBlanco").innerText = conteo.blanco;
    document.getElementById("resNulo").innerText = conteo.nulo;
}

function descargarReporte() {
    let csv = "\uFEFFN°;NOMBRE;CI;ESTADO\n";
    votantes.forEach(v => {
        csv += `${v.n};${v.nombre};${v.ci};${registro[v.nombre] === "voto" ? "PRESENTE" : "AUSENTE"}\n`;
    });
    csv += `\nRESULTADOS FINALES\nPATRIA (OLIVA);${conteo.patria}\nCDC (SORUCO);${conteo.cdc}\nBLANCO;${conteo.blanco}\nNULO;${conteo.nulo}`;
    
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "Acta_Gobernacion_Tarija_2026.csv";
    link.click();
}

document.getElementById("buscar").addEventListener("input", render);
document.getElementById("buscarNum").addEventListener("input", render);
render();
</script>
</body>
</html>
