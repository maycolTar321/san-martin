<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA INTEGRAL CATEQUESIS TARIJA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; --bg: #f0f2f5; }
        
        /* BLOQUEO DE SALIDA POR SCROLL */
        html, body { 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
            overscroll-behavior-y: contain; /* Evita pull-to-refresh */
            overscroll-behavior-x: none;    /* Evita gesto de 'atrás' lateral */
            height: 100%;
            overflow: hidden; 
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 90px;
        }

        #login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .app-header { background: var(--blue); color: white; padding: 20px; border-bottom: 6px solid var(--gold); border-radius: 0 0 35px 35px; text-align: center; position: relative; }
        
        .logout-btn { position: absolute; right: 20px; top: 20px; font-size: 1.5rem; color: white; cursor: pointer; display: none; }
        
        .card { border-radius: 20px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 12px; background: white; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 25px 25px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #bbb; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        
        .admin-only, .cate-only, .hidden { display: none !important; }
        .btn-del { color: #dc3545; cursor: pointer; font-size: 1.1rem; }
        .cumple-item { background: #fff9c4; border-left: 5px solid #fbc02d; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* ESTILO OJITO CONTRASEÑA */
        .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 15px; top: 10px; z-index: 100; cursor: pointer; color: #666; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card p-4 text-center" style="width: 90%; max-width: 360px;">
        <h4 class="fw-bold mb-1" style="color: var(--blue)">✝️ MISIÓN TARIJA</h4>
        <p class="small text-muted mb-3">Sistema de Gestión 2026</p>
        
        <select id="rol-select" class="form-select mb-3 rounded-pill" onchange="checkRol(this.value)">
            <option value="Joven">Modo Joven (Invitado)</option>
            <option value="Maycol">Maycol (Coordinador)</option>
            <option value="Yoselin">Yoselin (Sub-Coord)</option>
            <option value="Catequista">Catequista (Equipo)</option>
        </select>

        <div id="p-box" class="hidden pass-container">
            <input type="password" id="p-pass" class="form-control mb-3 rounded-pill" placeholder="Contraseña">
            <i class="bi bi-eye toggle-pass" id="eye-icon" onclick="togglePass()"></i>
        </div>

        <button onclick="entrar()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header">
        <i class="bi bi-box-arrow-right logout-btn" id="btn-logout" onclick="salir()"></i>
        <h5 class="fw-bold mb-0">CATEQUESIS TARIJA</h5>
        <div id="u-tag" class="badge bg-light text-dark mt-2"></div>
    </div>

    <div id="sec-home" class="seccion p-2">
        <div class="card p-0">
            <div class="ratio ratio-16x9">
                <iframe id="v-frame" src="about:blank" allowfullscreen></iframe>
            </div>
            <div class="admin-only p-2 bg-dark">
                <input type="text" id="v-id" class="form-control form-control-sm mb-1" placeholder="ID de Video YouTube">
                <button onclick="setVid()" class="btn btn-warning btn-sm w-100">Cambiar Video</button>
            </div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-primary"><i class="bi bi-megaphone"></i> Comunicados</h6>
            <div class="admin-only mb-3">
                <input type="text" id="t-not" class="form-control mb-1" placeholder="Título">
                <textarea id="m-not" class="form-control mb-2" placeholder="Mensaje..."></textarea>
                <div class="d-flex gap-2">
                    <button onclick="addNot()" class="btn btn-primary btn-sm w-100">Publicar</button>
                    <button onclick="wsNot()" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></button>
                </div>
            </div>
            <div id="lista-not"></div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-warning">🎂 Cumpleaños del Equipo</h6>
            <div class="cate-only mb-3 bg-light p-2 rounded">
                <input type="text" id="c-nom" class="form-control mb-1" placeholder="Tu Nombre">
                <input type="date" id="c-fec" class="form-control mb-1">
                <button onclick="addCum()" class="btn btn-warning btn-sm w-100">Registrar mi Cumple</button>
            </div>
            <div id="lista-cum"></div>
        </div>
    </div>

    <div id="sec-lib" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary"><i class="bi bi-book"></i> Biblioteca Virtual</h6>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden admin-only p-2">
        <div class="card p-4 bg-primary text-white text-center">
            <small>SALDO CAJA</small>
            <h2 id="s-bs">Bs. 0.00</h2>
        </div>
    </div>

    <div id="sec-chat" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">Buzón para Maycol</h6>
            <textarea id="j-msg" class="form-control mb-2" placeholder="Escribe tu duda aquí..."></textarea>
            <button onclick="sendMsg()" class="btn btn-primary w-100">Enviar Consulta</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-house"></i>Inicio</div>
        <div onclick="tab('lib')" id="n-lib" class="nav-item"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-cash-coin"></i>Gestión</div>
        <div onclick="tab('chat')" id="n-chat" class="nav-item"><i class="bi bi-chat-left-dots"></i>Dudas</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    
    // 1. BLOQUEO DE NAVEGACIÓN (Evita que el botón atrás cierre la app)
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() {
        window.history.pushState(null, null, window.location.href);
    };

    // 2. PERSISTENCIA: Cargar sesión al iniciar
    window.onload = function() {
        const guardado = localStorage.getItem('cate_session');
        if(guardado) {
            const d = JSON.parse(guardado);
            run(d.t, d.a, d.c, d.rol);
        }
    };

    function checkRol(v) {
        document.getElementById('p-box').classList.toggle('hidden', v === 'Joven');
    }

    function togglePass() {
        const input = document.getElementById('p-pass');
        const icon = document.getElementById('eye-icon');
        if(input.type === "password") {
            input.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const pass = document.getElementById('p-pass').value;
        
        if(r === "Joven") {
            const data = {t:"MODO LECTURA", a:false, c:false, rol:"Joven"};
            localStorage.setItem('cate_session', JSON.stringify(data));
            run(data.t, data.a, data.c, data.rol);
        } else if(pass === P[r]) {
            // Para administradores podrías elegir no guardar para más seguridad, 
            // pero si quieres que también se guarde, descomenta la siguiente línea:
            // localStorage.setItem('cate_session', JSON.stringify({t:r, a:true, c:true, rol:r}));
            run(r, r!=="Catequista", true, r);
        } else {
            alert("Clave Incorrecta");
        }
    }

    function run(t, a, c, rol) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = t;
        
        // El botón salir NO sale para Jóvenes (persistencia total)
        if(rol !== "Joven") {
            document.getElementById('btn-logout').style.display = 'block';
        }

        if(a) document.querySelectorAll('.admin-only').forEach(e => e.style.setProperty('display','block','important'));
        if(c) document.querySelectorAll('.cate-only').forEach(e => e.style.setProperty('display','block','important'));
    }

    function salir() {
        localStorage.removeItem('cate_session');
        location.reload();
    }

    // --- FUNCIONES DE INTERFAZ ---
    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
    }

    function setVid() {
        const id = document.getElementById('v-id').value;
        if(id) document.getElementById('v-frame').src = "https://www.youtube.com/embed/" + id;
    }

    function addNot() {
        const t = document.getElementById('t-not').value, m = document.getElementById('m-not').value;
        if(!t) return;
        const id = "n"+Date.now();
        document.getElementById('lista-not').insertAdjacentHTML('afterbegin', `<div class="p-2 border-bottom mb-2 bg-white" id="${id}"><b>${t}</b> <i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i><br><small>${m}</small></div>`);
        document.getElementById('t-not').value=""; document.getElementById('m-not').value="";
    }

    function wsNot() {
        window.open(`https://wa.me/?text=${encodeURIComponent("*"+document.getElementById('t-not').value+"*\n"+document.getElementById('m-not').value)}`);
    }

    function addCum() {
        const n = document.getElementById('c-nom').value, f = document.getElementById('c-fec').value;
        if(!n || !f) return;
        const id = "c"+Date.now();
        document.getElementById('lista-cum').insertAdjacentHTML('afterbegin', `<div class="cumple-item" id="${id}"><span>🎂 <b>${n}</b> (${f})</span><i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i></div>`);
    }

    function sendMsg() {
        alert("Consulta enviada a Maycol");
        document.getElementById('j-msg').value="";
    }
</script>
</body>
</html>
