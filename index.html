<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MAESTRO CATEQUESIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; --bg: #f0f2f5; }
        html, body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #app { height: 100vh; overflow-y: auto; padding-bottom: 110px; }
        
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--blue), #000); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .pass-group { position: relative; }
        .toggle-password { position: absolute; right: 15px; top: 12px; cursor: pointer; color: #666; z-index: 10; }

        .app-header { background: var(--blue); color: white; padding: 30px 20px; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; text-align: center; position: relative; }
        .logout-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: white; cursor: pointer; }

        .card { border-radius: 25px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin: 15px; background: white; padding: 18px; }
        .section-title { font-weight: 800; color: var(--blue); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-radius: 30px 30px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #999; flex: 1; cursor: pointer; font-size: 10px; font-weight: 600; }
        .nav-item i { font-size: 1.5rem; display: block; }
        .nav-item.active { color: var(--blue); }

        .hidden, .admin-only { display: none !important; }
        
        .cat-card { background: #fff; border-radius: 15px; border-left: 5px solid var(--gold); padding: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .btn-ws { color: #25d366; font-size: 1.2rem; text-decoration: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card text-center" style="width: 90%; max-width: 380px;">
        <h4 class="fw-bold mb-4">✝️ CATEQUESIS TARIJA</h4>
        <select id="rol-select" class="form-select mb-3 rounded-pill" onchange="checkRol(this.value)">
            <option value="Joven">Soy Joven</option>
            <option value="Maycol">Maycol (Director)</option>
            <option value="Yoselin">Yoselin (Coordinadora)</option>
            <option value="Catequista">Catequista</option>
        </select>
        <div id="p-box" class="hidden pass-group mb-3">
            <input type="password" id="p-pass" class="form-control rounded-pill" placeholder="Contraseña">
            <i class="bi bi-eye toggle-password" onclick="togglePass()"></i>
        </div>
        <button onclick="entrar()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">ENTRAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header">
        <div class="logout-btn" onclick="salir()"><i class="bi bi-door-closed"></i></div>
        <h5 class="fw-bold mb-0">SISTEMA INTEGRAL</h5>
        <span id="u-tag" class="badge bg-warning text-dark mt-2"></span>
    </div>

    <div id="sec-lib" class="seccion p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-book"></i> Biblioteca de Libros</h6>
            <div class="admin-only bg-light p-3 rounded-4 mb-3">
                <input type="text" id="l-tit" class="form-control mb-2" placeholder="Nombre del Libro">
                <input type="text" id="l-url" class="form-control mb-2" placeholder="Link (Drive o Web)">
                <button onclick="addLib()" class="btn btn-primary btn-sm w-100 rounded-pill">Subir Libro</button>
            </div>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-equipo" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-person-heart"></i> Mi Equipo de Catequistas</h6>
            <div class="admin-only bg-light p-3 rounded-4 mb-3">
                <input type="text" id="cat-nom" class="form-control mb-2" placeholder="Nombre Completo">
                <input type="number" id="cat-tel" class="form-control mb-2" placeholder="Celular (WhatsApp)">
                <input type="date" id="cat-cum" class="form-control mb-2">
                <button onclick="addCate()" class="btn btn-dark btn-sm w-100 rounded-pill">Registrar Catequista</button>
            </div>
            <div id="lista-cate"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden admin-only p-2">
        <div class="card bg-primary text-white text-center">
            <small>SALDO CAJA</small>
            <h2 id="s-bs" class="fw-bold">Bs. 0.00</h2>
        </div>
        <div class="card">
            <h6 class="section-title"><i class="bi bi-box-seam"></i> Inventario de Cosas</h6>
            <div class="d-flex gap-2 mb-3">
                <input type="text" id="i-item" class="form-control" placeholder="Objeto">
                <input type="number" id="i-cant" class="form-control" style="width: 70px;">
                <button onclick="addInv()" class="btn btn-dark">+</button>
            </div>
            <div id="lista-inv"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('lib')" id="n-lib" class="nav-item active"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('equipo')" id="n-equipo" class="nav-item"><i class="bi bi-people"></i>Equipo</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-wallet2"></i>Caja/Inv</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    let DATA = JSON.parse(localStorage.getItem('SISTEMA_V6')) || {
        libros: [], catequistas: [], inventario: [], saldo: 0
    };
    let userAct = "";

    window.onload = () => {
        const s = JSON.parse(localStorage.getItem('SESION_V6'));
        if(s) run(s.rol);
        render();
    };

    function togglePass() {
        const x = document.getElementById("p-pass");
        x.type = x.type === "password" ? "text" : "password";
    }

    function checkRol(v) { document.getElementById('p-box').classList.toggle('hidden', v === 'Joven'); }

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const p = document.getElementById('p-pass').value;
        if(r === "Joven" || p === P[r]) {
            localStorage.setItem('SESION_V6', JSON.stringify({rol: r}));
            run(r);
        } else { alert("Acceso denegado"); }
    }

    function run(rol) {
        userAct = rol;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = rol.toUpperCase();
        if(rol === 'Maycol' || rol === 'Yoselin') {
            document.querySelectorAll('.admin-only').forEach(e => e.style.setProperty('display','block','important'));
        }
        tab('lib');
    }

    function salir() { localStorage.removeItem('SESION_V6'); location.reload(); }

    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
    }

    function save() { localStorage.setItem('SISTEMA_V6', JSON.stringify(DATA)); render(); }

    function render() {
        // Libros
        document.getElementById('lista-lib').innerHTML = DATA.libros.map((l, i) => `
            <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
                <div><i class="bi bi-file-earmark-pdf text-danger me-2"></i><b>${l.t}</b></div>
                <div class="d-flex gap-2">
                    <a href="${l.u}" target="_blank" class="btn btn-sm btn-outline-primary rounded-pill">Ver</a>
                    ${(userAct==='Maycol') ? `<i class="bi bi-trash text-danger" onclick="elim('libros', ${i})"></i>` : ''}
                </div>
            </div>`).join('');

        // Catequistas
        document.getElementById('lista-cate').innerHTML = DATA.catequistas.map((c, i) => `
            <div class="cat-card">
                <div class="d-flex justify-content-between align-items-start">
                    <div>
                        <h6 class="mb-0 fw-bold">${c.n}</h6>
                        <small class="text-muted"><i class="bi bi-cake"></i> Cumple: ${c.f}</small>
                    </div>
                    <a href="https://wa.me/591${c.t}" target="_blank" class="btn-ws"><i class="bi bi-whatsapp"></i></a>
                </div>
                ${(userAct==='Maycol') ? `<div class="text-end"><small class="text-danger" onclick="elim('catequistas', ${i})">Eliminar</small></div>` : ''}
            </div>`).join('');

        // Inventario
        document.getElementById('lista-inv').innerHTML = DATA.inventario.map((inv, i) => `
            <div class="d-flex justify-content-between p-2 border-bottom">
                <span>${inv.n}</span> <span class="badge bg-dark">${inv.c}</span>
            </div>`).join('');

        document.getElementById('s-bs').innerText = "Bs. " + DATA.saldo.toFixed(2);
    }

    // ACCIONES
    function addLib() {
        const t = document.getElementById('l-tit').value, u = document.getElementById('l-url').value;
        if(!t || !u) return;
        DATA.libros.unshift({t: t, u: u});
        document.getElementById('l-tit').value=""; document.getElementById('l-url').value="";
        save();
    }

    function addCate() {
        const n = document.getElementById('cat-nom').value;
        const t = document.getElementById('cat-tel').value;
        const f = document.getElementById('cat-cum').value;
        if(!n || !t) return;
        DATA.catequistas.unshift({n: n, t: t, f: f});
        document.getElementById('cat-nom').value=""; document.getElementById('cat-tel').value="";
        save();
    }

    function addInv() {
        const n = document.getElementById('i-item').value, c = document.getElementById('i-cant').value;
        if(!n || !c) return;
        DATA.inventario.unshift({n: n, c: c});
        document.getElementById('i-item').value=""; document.getElementById('i-cant').value="";
        save();
    }

    function elim(tipo, i) { DATA[tipo].splice(i, 1); save(); }
</script>
</body>
</html>
