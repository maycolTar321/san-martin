<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control Electoral - Tarija 2026</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    h1 { text-align: center; color: #3b82f6; text-transform: uppercase; }
    .progress-box { background: #1e293b; border-radius: 20px; height: 25px; width: 100%; margin: 20px 0; border: 1px solid #334155; overflow: hidden; position: relative; }
    #progressBar { background: linear-gradient(90deg, #3b82f6, #22c55e); height: 100%; width: 0%; transition: 0.5s; }
    .perc-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 12px; font-weight: bold; z-index: 10; }
    .search-container { position: sticky; top: 10px; background: #0f172a; padding: 15px; z-index: 100; display: flex; gap: 10px; border-radius: 12px; border: 1px solid #334155; margin-bottom: 20px; }
    input { padding: 12px; border-radius: 8px; border: 2px solid #334155; background: #0f172a; color: white; flex-grow: 1; outline: none; }
    .persona { background: #1e293b; padding: 15px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
    .votado { border-color: #22c55e; background: rgba(34, 197, 94, 0.1) !important; }
    .escrutinio { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid #3b82f6; margin-top: 30px; }
    .grid-votos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
    .v-btn { padding: 20px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    .patria-btn { background: #ea580c; } .cdc-btn { background: #2563eb; }
    .blanco-btn { background: #f8fafc; color: #0f172a; } .nulo-btn { background: #dc2626; }
    .final-stats { display: flex; justify-content: space-around; font-size: 20px; text-align: center; background: #0f172a; padding: 15px; border-radius: 10px; }
    .btn-accion { background: #e11d48; width: 100%; padding: 15px; border-radius: 10px; border: none; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
    .oculto { display: none; }
</style>
</head>
<body>

<div class="container">
    <h1>GOBERNACIÓN TARIJA 2026</h1>

    <div class="progress-box">
        <div class="perc-text"><span id="perc">0</span>% Participación</div>
        <div id="progressBar"></div>
    </div>

    <div class="search-container">
        <input type="text" id="buscar" placeholder="🔍 Buscar votante...">
    </div>

    <div id="lista"></div>

    <button id="btnCerrar" class="btn-accion" onclick="forzarCierre()">🔒 CERRAR MESA AHORA (Convertir Ausentes a Nulos)</button>

    <div id="seccionConteo" class="escrutinio oculto">
        <h2>📊 Escrutinio Final</h2>
        <div class="grid-votos">
            <button class="v-btn patria-btn" onclick="votar('patria')">PATRIA (+1)</button>
            <button class="v-btn cdc-btn" onclick="votar('cdc')">CDC (+1)</button>
            <button class="v-btn blanco-btn" onclick="votar('blanco')">BLANCO (+1)</button>
            <button class="v-btn nulo-btn" onclick="votar('nulo')">NULO (+1)</button>
        </div>
        
        <div class="final-stats">
            <div>🟠 Patria<br><strong id="resPatria">0</strong></div>
            <div>🔵 CDC<br><strong id="resCDC">0</strong></div>
            <div>⚪ Blanco<br><strong id="resBlanco">0</strong></div>
            <div>🔴 Nulo<br><strong id="resNulo">0</strong></div>
        </div>
        <button class="btn-accion" style="background:#3b82f6" onclick="descargarReporte()">📥 DESCARGAR ACTA</button>
    </div>
</div>

];

let registro = JSON.parse(localStorage.getItem("tja_votos")) || {};
let conteo = JSON.parse(localStorage.getItem("tja_conteo")) || { patria: 0, cdc: 0, blanco: 0, nulo: 0 };
let cerrada = localStorage.getItem("tja_cerrada") === "true";

// Sincronizar enlace d=
const params = new URLSearchParams(window.location.search);
if(params.get("d")) {
    try {
        const d = JSON.parse(atob(params.get("d")));
        d.forEach(n => { if(!registro[n]) registro[n] = "voto"; });
        localStorage.setItem("tja_votos", JSON.stringify(registro));
    } catch(e) {}
}

function render() {
    const lista = document.getElementById("lista");
    const buscar = document.getElementById("buscar").value.toLowerCase();
    lista.innerHTML = "";
    let presentes = 0;

    votantes.forEach(v => {
        const est = registro[v.nombre];
        if(est === "voto") presentes++;
        if(v.nombre.toLowerCase().includes(buscar) || v.ci.includes(buscar)) {
            const div = document.createElement("div");
            div.className = "persona" + (est === "voto" ? " votado" : "");
            div.innerHTML = `<div><b>#${v.n}</b> ${v.nombre}<br><small>CI: ${v.ci}</small></div>
                <button class="v-btn" style="padding:10px; background:#22c55e" onclick="marcar('${v.nombre}')" ${cerrada ? "disabled" : ""}>
                ${est === "voto" ? "✔️" : "MARCAR"}</button>`;
            lista.appendChild(div);
        }
    });

    const p = ((presentes / votantes.length) * 100).toFixed(1);
    document.getElementById("progressBar").style.width = p + "%";
    document.getElementById("perc").innerText = p;

    if(cerrada) {
        document.getElementById("seccionConteo").classList.remove("oculto");
        document.getElementById("btnCerrar").classList.add("oculto");
        actualizarUI();
    }
}

function marcar(n) { registro[n] = "voto"; localStorage.setItem("tja_votos", JSON.stringify(registro)); render(); }

function forzarCierre() {
    if(!confirm("¿Cerrar mesa? Los ausentes se sumarán a NULOS.")) return;
    
    let ausentes = 0;
    votantes.forEach(v => {
        if(!registro[v.nombre]) {
            registro[v.nombre] = "ausente_nulo";
            ausentes++;
        }
    });

    conteo.nulo += ausentes;
    cerrada = true;
    localStorage.setItem("tja_cerrada", "true");
    localStorage.setItem("tja_conteo", JSON.stringify(conteo));
    localStorage.setItem("tja_votos", JSON.stringify(registro));
    render();
}

function votar(t) { conteo[t]++; localStorage.setItem("tja_conteo", JSON.stringify(conteo)); actualizarUI(); }

function actualizarUI() {
    document.getElementById("resPatria").innerText = conteo.patria;
    document.getElementById("resCDC").innerText = conteo.cdc;
    document.getElementById("resBlanco").innerText = conteo.blanco;
    document.getElementById("resNulo").innerText = conteo.nulo;
}

function descargarReporte() {
    let t = "\uFEFFACTA FINAL - TARIJA 2026\n\nPARTIDO;VOTOS\nPATRIA;" + conteo.patria + "\nCDC;" + conteo.cdc + "\nBLANCO;" + conteo.blanco + "\nNULO (Incl. Ausentes);" + conteo.nulo;
    const b = new Blob([t], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = "Acta_Tarija.csv";
    a.click();
}

document.getElementById("buscar").addEventListener("input", render);
render();

</html>
