<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catequesis San Martín de Porres - Tarija</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --guindo: #800020;
            --guindo-grad: linear-gradient(135deg, #800020 0%, #b31b3b 100%);
            --bg: #F0F2F5;
            --white: #ffffff;
            --radius: 20px;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: #1c1e21; padding-bottom: 90px; }

        /* --- AUTH SYSTEM --- */
        #auth-container {
            position: fixed; inset: 0; background: var(--white); z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 25px;
        }
        .logo-main { width: 120px; margin-bottom: 20px; border-radius: 25px; box-shadow: var(--shadow); }
        .auth-card { width: 100%; max-width: 380px; text-align: center; }
        
        .btn-vino { 
            width: 100%; padding: 16px; border: none; border-radius: 15px; font-weight: 800; 
            background: var(--guindo-grad); color: white; cursor: pointer; margin-top: 12px;
            box-shadow: 0 5px 15px rgba(128, 0, 32, 0.2);
        }
        .btn-outline { background: none; border: 2px solid var(--guindo); color: var(--guindo); }
        .captcha-box { background: #f8f9fa; border: 1px dashed var(--guindo); padding: 10px; border-radius: 10px; margin: 10px 0; font-weight: 800; }

        /* --- HEADER --- */
        header {
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #e4e6eb;
        }
        .brand { font-weight: 800; font-size: 14px; color: var(--guindo); line-height: 1.2; text-transform: uppercase; }

        /* --- DASHBOARD STATS --- */
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { 
            background: var(--white); padding: 15px; border-radius: var(--radius); 
            box-shadow: var(--shadow); text-align: center; border-left: 5px solid var(--guindo);
        }
        .stat-card h2 { font-size: 24px; color: var(--guindo); }
        .stat-card p { font-size: 10px; font-weight: 700; color: #65676b; }

        /* --- POSTS ESTILO INSTAGRAM --- */
        .section { display: none; animation: fadeInUp 0.5s ease forwards; }
        .section.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-insta { background: var(--white); border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); overflow: hidden; border: 1px solid #e4e6eb; }
        .card-header { padding: 12px 15px; display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 14px; }
        .card-header img { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--guindo); }
        .card-content { padding: 15px; font-size: 15px; line-height: 1.5; }
        .card-footer { padding: 10px 15px; background: #fdfdfd; border-top: 1px solid #f0f2f5; display: flex; justify-content: space-between; align-items: center; }

        /* --- FORMS --- */
        input, select, textarea { 
            width: 100%; padding: 14px; margin: 8px 0; border: 1.5px solid #eee; 
            border-radius: 12px; background: #f9f9f9; outline: none; font-size: 14px;
        }
        input:focus { border-color: var(--guindo); background: #fff; }

        /* --- NAV INFERIOR --- */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--white);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #e4e6eb; z-index: 1000;
        }
        .nav-item { border: none; background: none; color: #bcc0c4; font-size: 20px; cursor: pointer; flex: 1; transition: 0.3s; }
        .nav-item.active { color: var(--guindo); transform: translateY(-5px); }
        .nav-item span { display: block; font-size: 9px; font-weight: 800; margin-top: 4px; }

        .hidden { display: none !important; }
        .present-btn { padding: 5px 12px; border-radius: 20px; border: none; background: #eee; cursor: pointer; font-size: 12px; font-weight: 700; }
        .present-btn.on { background: var(--guindo); color: white; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <img src="https://i.ibb.co/Lnbm2Xq/1000540900-jpg.jpg" class="logo-main">
            <h2 style="color: var(--guindo); letter-spacing: -1px;">Confirmación SMP</h2>
            <p style="font-size: 12px; color: #65676b; margin-bottom: 25px;">Tarija, Bolivia</p>
            
            <div id="login-form">
                <input type="email" id="email-in" placeholder="Correo electrónico">
                <input type="password" id="pass-in" placeholder="Contraseña">
                <button class="btn-vino" onclick="app.login()">Iniciar Sesión</button>
                <button class="btn-vino btn-outline" onclick="app.toggleAuth(true)">Registrar Catequista</button>
                <p onclick="app.guestAccess()" style="margin-top: 25px; font-weight: 800; cursor: pointer; color: var(--guindo); font-size: 13px;">ENTRAR COMO JOVEN (PÁGINA)</p>
            </div>
        </div>

        <div class="auth-card hidden" id="register-box">
            <h2 style="color: var(--guindo);">Nueva Cuenta</h2>
            <input type="text" id="reg-name" placeholder="Nombre Completo">
            <input type="number" id="reg-phone" placeholder="Celular">
            <input type="email" id="reg-email" placeholder="Correo">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <div class="captcha-box">Seguridad: <span id="cap-q"></span></div>
            <input type="number" id="reg-cap-ans" placeholder="Resultado">
            <button class="btn-vino" onclick="app.register()">Finalizar Registro</button>
            <p onclick="app.toggleAuth(false)" style="margin-top:15px; cursor:pointer; font-size: 12px;">Volver al login</p>
        </div>
    </div>

    <header>
        <div class="brand">Catequistas de Confirmación <br><small>San Martín De Porres Tarija</small></div>
        <button onclick="app.logout()" style="background:none; border:none; color: var(--guindo);"><i class="fas fa-sign-out-alt fa-lg"></i></button>
    </header>

    <div class="container">
        
        <div id="v-dash" class="section active">
            <div class="stats-grid">
                <div class="stat-card"><h2 id="st-cat">0</h2><p>CATEQUISTAS</p></div>
                <div class="stat-card"><h2 id="st-gru">0</h2><p>GRUPOS</p></div>
                <div class="stat-card"><h2 id="st-con">0</h2><p>JÓVENES</p></div>
                <div class="stat-card"><h2 id="st-tar">0</h2><p>TAREAS</p></div>
            </div>

            <h3 style="margin: 20px 0 10px;">Comunidad y Avisos</h3>
            <div id="feed-comunidad"></div>
        </div>

        <div id="v-admin" class="section">
            <div class="card-insta" style="padding: 20px;">
                <h3 id="admin-title">Panel de Control</h3>
                <div id="admin-controls" class="admin-only">
                    <select id="adm-type">
                        <option value="grupos">Crear Nuevo Grupo</option>
                        <option value="confirmantes">Inscribir Joven</option>
                    </select>
                    <input type="text" id="adm-n1" placeholder="Nombre / Título">
                    <select id="adm-g-select" class="hidden"></select> <button class="btn-vino" onclick="app.saveAdmin()">Guardar en Sistema</button>
                </div>
            </div>
            <div id="list-master"></div>
        </div>

        <div id="v-edu" class="section">
            <div class="card-insta cat-only" style="padding: 20px;">
                <h3><i class="fas fa-edit"></i> Crear Contenido</h3>
                <select id="edu-type">
                    <option value="tareas">Tarea para mi grupo</option>
                    <option value="biblioteca">Recurso de Biblioteca (PDF/Link)</option>
                </select>
                <input type="text" id="edu-title" placeholder="Título">
                <textarea id="edu-desc" placeholder="Descripción o link..."></textarea>
                <button class="btn-vino" onclick="app.saveEdu()">Publicar</button>
            </div>
            <div id="list-edu"></div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="app.nav('dash')"><i class="fas fa-home"></i><span>Inicio</span></button>
        <button class="nav-item" onclick="app.nav('edu')"><i class="fas fa-graduation-cap"></i><span>Edu</span></button>
        <button class="nav-item" onclick="app.nav('admin')"><i class="fas fa-users-cog"></i><span>Gestión</span></button>
        <button class="nav-item admin-only" onclick="app.nav('master')"><i class="fas fa-chart-line"></i><span>Pro</span></button>
    </div>

    <script>
        const app = {
            db: JSON.parse(localStorage.getItem('smp_tarija_v5')) || {
                users: [], catequistas: [], grupos: [], confirmantes: [], tareas: [], biblioteca: [], asistencia: {}
            },
            session: JSON.parse(localStorage.getItem('smp_tarija_session')) || null,
            captcha: 0,

            init: () => {
                if(app.session) {
                    document.getElementById('auth-container').classList.add('hidden');
                    app.render();
                } else {
                    app.genCaptcha();
                }
            },

            // 1. AUTH SYSTEM
            genCaptcha: () => {
                const a = Math.floor(Math.random() * 10);
                const b = Math.floor(Math.random() * 10);
                app.captcha = a + b;
                document.getElementById('cap-q').innerText = `${a} + ${b}`;
            },

            toggleAuth: (show) => {
                document.getElementById('login-box').classList.toggle('hidden', show);
                document.getElementById('register-box').classList.toggle('hidden', !show);
            },

            register: () => {
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-pass').value;
                const ans = parseInt(document.getElementById('reg-cap-ans').value);
                if(ans !== app.captcha) return alert("Captcha incorrecto");
                
                app.db.users.push({name, email, pass, role: (email === 'avilamichael0@gmail.com') ? 'admin' : 'catequista'});
                app.sync("Cuenta creada exitosamente.");
                app.toggleAuth(false);
            },

            login: () => {
                const e = document.getElementById('email-in').value;
                const p = document.getElementById('pass-in').value;
                const u = app.db.users.find(x => x.email === e && x.pass === p);
                
                if(e === 'avilamichael0@gmail.com' && p === '123456') app.session = { name: "Michael", role: 'admin' };
                else if(u) app.session = { name: u.name, role: u.role };
                else return alert("Datos incorrectos");

                localStorage.setItem('smp_tarija_session', JSON.stringify(app.session));
                location.reload();
            },

            guestAccess: () => {
                app.session = { name: "Joven", role: 'joven' };
                localStorage.setItem('smp_tarija_session', JSON.stringify(app.session));
                location.reload();
            },

            // GESTIÓN
            nav: (id) => {
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('v-' + id).classList.add('active');
                event.currentTarget.classList.add('active');
            },

            saveAdmin: () => {
                const type = document.getElementById('adm-type').value;
                const name = document.getElementById('adm-n1').value;
                if(!name) return;
                app.db[type].push({name, id: Date.now()});
                app.sync("Registro completado.");
            },

            saveEdu: () => {
                const type = document.getElementById('edu-type').value;
                const title = document.getElementById('edu-title').value;
                const desc = document.getElementById('edu-desc').value;
                app.db[type].push({title, desc, author: app.session.name, date: new Date().toLocaleDateString()});
                app.sync("Publicado.");
            },

            sync: (m) => {
                localStorage.setItem('smp_tarija_v5', JSON.stringify(app.db));
                if(m) alert(m);
                app.render();
            },

            render: () => {
                const r = app.session.role;
                if(r !== 'admin') document.querySelectorAll('.admin-only').forEach(e => e.classList.add('hidden'));
                if(r === 'joven') document.querySelectorAll('.cat-only').forEach(e => e.classList.add('hidden'));

                // 10. Dashboard Stats
                document.getElementById('st-cat').innerText = app.db.users.filter(u=>u.role==='catequista').length;
                document.getElementById('st-gru').innerText = app.db.grupos.length;
                document.getElementById('st-con').innerText = app.db.confirmantes.length;
                document.getElementById('st-tar').innerText = app.db.tareas.length;

                // Feed Estilo Instagram
                const combined = [...app.db.tareas, ...app.db.biblioteca].reverse();
                document.getElementById('feed-comunidad').innerHTML = combined.map(p => `
                    <div class="card-insta">
                        <div class="card-header"><img src="https://i.ibb.co/Lnbm2Xq/1000540900-jpg.jpg"> <b>${p.author}</b></div>
                        <div class="card-content"><b>${p.title}</b><p>${p.desc}</p></div>
                        <div class="card-footer"><span style="font-size:10px; color:#65676b;">${p.date}</span> <i class="far fa-heart"></i></div>
                    </div>
                `).join('');

                // Listas de Gestión
                document.getElementById('list-master').innerHTML = `
                    <h4>Grupos de Catequesis</h4>
                    ${app.db.grupos.map(g => `<div class="card-header" style="background:#fff; margin-top:5px; border-radius:10px; border:1px solid #eee;">
                        <i class="fas fa-users"></i> ${g.name} 
                        <button class="present-btn" onclick="alert('Llamando asistencia para ${g.name}')">Llamar Lista</button>
                    </div>`).join('')}
                `;
            },

            logout: () => { localStorage.clear(); location.reload(); }
        };

        app.init();
    </script>
</body>
</html>
