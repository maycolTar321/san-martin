<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>100 Catequistas Dijeron - Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --purpura: #3d0066; --dorado: #ffd700; --rojo: #cc0000; }
        body { overscroll-behavior-y: contain; margin: 0; background: var(--purpura); color: white; font-family: sans-serif; text-align: center; }
        .btn { padding: 12px; border: 2px solid var(--dorado); background: rgba(0,0,0,0.5); color: var(--dorado); border-radius: 10px; font-weight: bold; width: 90%; margin: 5px; cursor: pointer; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid var(--dorado); margin: 5px; width: 80%; }
        
        #setup, .view { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .view { display: none; background: radial-gradient(circle, #4a0080, #1a0033); }

        /* JUEGO */
        .timer { font-size: 2rem; color: #ff9900; font-weight: bold; margin-bottom: 10px; }
        .pts-box { font-size: 2rem; background: #000; padding: 10px 20px; border-radius: 10px; border: 1px solid var(--dorado); }
        #pregunta { color: var(--dorado); font-size: 1.5rem; min-height: 60px; margin: 15px 0; }
        .x-mark { font-size: 120px; color: var(--rojo); display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-shadow: 4px 4px 0 #000; font-weight: bold; }
        
        .tablero { width: 100%; max-width: 500px; }
        .fila { border: 2px solid var(--dorado); margin: 6px 0; height: 45px; display: flex; align-items: center; justify-content: center; background: #111; border-radius: 8px; }
        .fila.open { background: linear-gradient(to bottom, #fff, var(--dorado)); color: black; font-weight: bold; }

        .admin-item { background: #222; padding: 10px; margin: 4px; width: 100%; border-radius: 5px; text-align: left; font-size: 0.9rem; border-left: 5px solid #555; }
    </style>
</head>
<body>

    <div id="setup">
        <h2 style="color:var(--dorado)">† CONFIGURACIÓN †</h2>
        <input type="text" id="room-id" placeholder="Nombre de Sala (ej: cate1)">
        
        <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; width: 90%;">
            <label>Cant. Preguntas:</label>
            <select id="cfg-qty"><option value="5">5 Preguntas</option><option value="10">10 Preguntas</option><option value="20">20 Preguntas</option><option value="100">Las 100</option></select>
            
            <label>Dificultad:</label>
            <select id="cfg-diff"><option value="all">Todas</option><option value="easy">Básica (Niños)</option><option value="hard">Teológica (Jóvenes)</option></select>
            
            <label>Tiempo (seg):</label>
            <select id="cfg-time"><option value="0">Sin tiempo</option><option value="30">30 Segundos</option><option value="60">60 Segundos</option></select>
        </div>

        <button class="btn" onclick="iniciar('P')">MODO PROYECTOR</button>
        <button class="btn" style="background:var(--dorado); color:black" onclick="iniciar('A')">MODO CONTROL</button>
    </div>

    <div class="view" id="pv">
        <div id="timer-p" class="timer"></div>
        <div style="display:flex; gap:20px">
            <div>FE<div class="pts-box" id="pA">0</div></div>
            <div>ESPERANZA<div class="pts-box" id="pB">0</div></div>
        </div>
        <h2 id="pregunta"></h2>
        <div class="tablero" id="tablero-p"></div>
        <div id="big-x" class="x-mark">X</div>
    </div>

    <div class="view" id="av">
        <div id="timer-a" class="timer"></div>
        <h3 id="adm-q"></h3>
        <div id="tablero-a" style="width:100%; overflow-y: auto; max-height: 40vh;"></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; width:100%; gap:5px; margin-top:10px;">
            <button class="btn" style="background:var(--rojo); color:white; width:auto;" onclick="accion('X')">¡X!</button>
            <button class="btn" style="width:auto;" onclick="accion('N')">SIGUIENTE</button>
            <button class="btn" style="width:auto; border-color:cyan;" onclick="accion('T')">⏱ INICIAR</button>
            <button class="btn" style="width:auto;" onclick="accion('PA')">+ FE</button>
            <button class="btn" style="width:auto;" onclick="accion('PB')">+ ESPERANZA</button>
        </div>
    </div>

    <audio id="sd" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
    <audio id="sb" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        // BASE DE DATOS (Muestra de 100)
        const totalPreguntas = [
            { q: "¿Qué llevaron los Reyes Magos?", d:"easy", a: [{t:"ORO",p:40},{t:"INCIENSO",p:35},{t:"MIRRA",p:25}] },
            { q: "¿Cuántos evangelios hay?", d:"easy", a: [{t:"MATEO",p:25},{t:"MARCOS",p:25},{t:"LUCAS",p:25},{t:"JUAN",p:25}] },
            { q: "¿Sacramento de iniciación?", d:"hard", a: [{t:"BAUTISMO",p:50},{t:"COMUNIÓN",p:30},{t:"CONFIRMACIÓN",p:20}] },
            { q: "¿Dónde nació Jesús?", d:"easy", a: [{t:"BELÉN",p:70},{t:"PESEBRE",p:20},{t:"ESTABLO",p:10}] },
            // ... (El sistema mezclará y seleccionará según tu configuración)
        ];
        // Autogenerar hasta 100 para prueba
        for(let i=5; i<=100; i++) {
            totalPreguntas.push({ q: "Pregunta Teológica #"+i, d: i%2==0?"easy":"hard", a: [{t:"Respuesta A",p:50},{t:"Respuesta B",p:50}] });
        }

        let peer, conn, modo, timerInt;
        let juego = { mazo: [], lvl: 0, rev: [], pA: 0, pB: 0, time: 0, maxTime: 0 };

        function iniciar(m) {
            const id = document.getElementById('room-id').value;
            if(!id) return alert("Pon un nombre de sala");
            
            modo = m;
            peer = new Peer(m === 'P' ? id : null);

            peer.on('open', () => {
                if(m === 'A') {
                    // Configurar mazo
                    const qty = parseInt(document.getElementById('cfg-qty').value);
                    const diff = document.getElementById('cfg-diff').value;
                    juego.maxTime = parseInt(document.getElementById('cfg-time').value);
                    juego.time = juego.maxTime;

                    let filtradas = totalPreguntas.filter(p => diff === 'all' || p.d === diff);
                    juego.mazo = filtradas.sort(() => Math.random() - 0.5).slice(0, qty);

                    conn = peer.connect(id);
                    conn.on('open', () => {
                        document.getElementById('setup').style.display = 'none';
                        document.getElementById('av').style.display = 'flex';
                        accion('SYNC');
                    });
                } else {
                    document.getElementById('setup').style.display = 'none';
                    document.getElementById('pv').style.display = 'flex';
                }
            });

            peer.on('connection', c => {
                conn = c;
                conn.on('data', d => {
                    if(d === 'X') mostrarError();
                    else { juego = d; actualizarInterfaz(); }
                });
            });
        }

        function accion(tipo, val) {
            if(tipo === 'R') { if(!juego.rev.includes(val)) juego.rev.push(val); }
            if(tipo === 'X') { conn.send('X'); return; }
            if(tipo === 'PA') juego.pA += 10;
            if(tipo === 'PB') juego.pB += 10;
            if(tipo === 'N') { juego.lvl++; juego.rev = []; juego.time = juego.maxTime; clearInterval(timerInt); }
            if(tipo === 'T') { iniciarReloj(); }
            
            if(conn) conn.send(juego);
            actualizarInterfaz();
        }

        function iniciarReloj() {
            clearInterval(timerInt);
            timerInt = setInterval(() => {
                if(juego.time > 0) {
                    juego.time--;
                    if(conn) conn.send(juego);
                    actualizarInterfaz();
                } else {
                    clearInterval(timerInt);
                    accion('X');
                }
            }, 1000);
        }

        function actualizarInterfaz() {
            const p = juego.mazo[juego.lvl];
            if(!p) return;

            // Actualizar Proyector
            if(document.getElementById('pv').style.display === 'flex') {
                document.getElementById('pregunta').innerText = p.q;
                document.getElementById('pA').innerText = juego.pA;
                document.getElementById('pB').innerText = juego.pB;
                document.getElementById('timer-p').innerText = juego.maxTime > 0 ? juego.time + "s" : "";
                
                const t = document.getElementById('tablero-p');
                t.innerHTML = '';
                p.a.forEach((ans, i) => {
                    const ok = juego.rev.includes(i);
                    t.innerHTML += `<div class="fila ${ok?'open':''}"> ${ok ? ans.t + " (" + ans.p + ")" : i+1} </div>`;
                });
                if(window.lastR < juego.rev.length) document.getElementById('sd').play();
                window.lastR = juego.rev.length;
            }

            // Actualizar Admin
            if(document.getElementById('av').style.display === 'flex') {
                document.getElementById('adm-q').innerText = p.q;
                document.getElementById('timer-a').innerText = juego.maxTime > 0 ? juego.time + "s" : "";
                const t = document.getElementById('tablero-a');
                t.innerHTML = '';
                p.a.forEach((ans, i) => {
                    const ok = juego.rev.includes(i);
                    t.innerHTML += `<div class="admin-item" style="border-left-color:${ok?'green':'#555'}" onclick="accion('R', ${i})"> ${ans.t} (${ans.p}) </div>`;
                });
            }
        }

        function mostrarError() {
            document.getElementById('sb').play();
            const x = document.getElementById('big-x');
            x.style.display = 'block';
            setTimeout(() => x.style.display = 'none', 1200);
        }

        document.addEventListener('touchstart', () => { 
            document.getElementById('sd').play().then(()=>document.getElementById('sd').pause()); 
        }, {once:true});
    </script>
</body>
</html>
