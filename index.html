<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Geometry Shift | Minimal Arcade</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --player: #3498db;
            --obstacle: #2c3e50;
            --text: #2c3e50;
        }
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }
        canvas { display: block; background: white; }
        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: 300;
            pointer-events: none;
        }
        .instructions {
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="hud">Puntos: <span id="score">0</span></div>
        <canvas id="gameCanvas"></canvas>
    </div>
    <div class="instructions">Presiona <b>ESPACIO</b> o <b>CLIC</b> para cambiar de forma</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = 400;
    canvas.height = 600;

    let score = 0;
    let gameActive = true;
    let speed = 4;
    let frame = 0;

    // Formas: 0 = Cuadrado, 1 = Círculo
    const player = {
        x: canvas.width / 2,
        y: canvas.height - 100,
        size: 40,
        shape: 0, 
        color: '#3498db'
    };

    let obstacles = [];

    function spawnObstacle() {
        const shapeType = Math.floor(Math.random() * 2);
        obstacles.push({
            y: -50,
            x: canvas.width / 2,
            size: 80,
            shape: shapeType,
            passed: false
        });
    }

    function drawPlayer() {
        ctx.fillStyle = player.color;
        ctx.beginPath();
        if (player.shape === 0) {
            // Dibujar cuadrado redondeado
            const r = 8;
            ctx.roundRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size, r);
        } else {
            // Dibujar círculo
            ctx.arc(player.x, player.y, player.size/2, 0, Math.PI * 2);
        }
        ctx.fill();
    }

    function drawObstacle(obs) {
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 4;
        ctx.beginPath();
        
        // Dibujamos el "hueco" por el que hay que pasar
        if (obs.shape === 0) {
            ctx.roundRect(obs.x - 30, obs.y - 30, 60, 60, 5);
        } else {
            ctx.arc(obs.x, obs.y, 35, 0, Math.PI * 2);
        }
        ctx.stroke();

        // Líneas laterales decorativas
        ctx.beginPath();
        ctx.moveTo(0, obs.y);
        ctx.lineTo(obs.x - 40, obs.y);
        ctx.moveTo(obs.x + 40, obs.y);
        ctx.lineTo(canvas.width, obs.y);
        ctx.stroke();
    }

    function update() {
        if (!gameActive) return;

        frame++;
        if (frame % 100 === 0) spawnObstacle();

        obstacles.forEach((obs, index) => {
            obs.y += speed;

            // Detección de colisión / Paso exitoso
            if (obs.y > player.y - 10 && obs.y < player.y + 10) {
                if (player.shape !== obs.shape) {
                    gameOver();
                } else if (!obs.passed) {
                    obs.passed = true;
                    score++;
                    scoreEl.innerText = score;
                    if (score % 5 === 0) speed += 0.5; // Aumenta dificultad
                }
            }

            if (obs.y > canvas.height) obstacles.splice(index, 1);
        });
    }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.fillRect(0,0,canvas.width, canvas.height);
        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 30px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('FIN DEL JUEGO', canvas.width/2, canvas.height/2);
        ctx.font = '18px sans-serif';
        ctx.fillText('Clic para reiniciar', canvas.width/2, canvas.height/2 + 40);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Fondo sutil
        ctx.fillStyle = '#fafafa';
        ctx.fillRect(0,0, canvas.width, canvas.height);

        obstacles.forEach(drawObstacle);
        drawPlayer();
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    const toggleShape = () => {
        if (!gameActive) {
            // Reiniciar
            score = 0;
            scoreEl.innerText = 0;
            obstacles = [];
            speed = 4;
            gameActive = true;
        } else {
            player.shape = player.shape === 0 ? 1 : 0;
            player.color = player.shape === 0 ? '#3498db' : '#e74c3c';
        }
    };

    window.addEventListener('keydown', (e) => { if(e.code === 'Space') toggleShape(); });
    canvas.addEventListener('mousedown', toggleShape);

    loop();
</script>
</body>
</html>
