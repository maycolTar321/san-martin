<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Votación PRO+ Final</title>
<style>
    body { font-family: Arial, sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 700px; margin: auto; }
    h1 { text-align: center; color: #3b82f6; }
    
    .search-container { position: sticky; top: 0; background: #0f172a; padding: 10px 0; z-index: 100; display: flex; gap: 10px; }
    input { padding: 15px; font-size: 18px; border-radius: 8px; border: 2px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
    #buscar { flex-grow: 1; }
    #buscarNum { width: 100px; }

    .persona { background: #1e293b; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; transition: 0.3s; }
    .n-orden { background: #334155; padding: 2px 8px; border-radius: 4px; margin-right: 10px; font-weight: bold; color: #94a3b8; }
    
    .btn-marcar { background: #22c55e; border: none; padding: 10px 15px; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; min-width: 90px; }
    .btn-quitar { background: #64748b; border: none; padding: 10px 15px; color: white; cursor: pointer; border-radius: 5px; font-weight: bold; margin-left: 5px; }
    
    .votado { background: #064e3b !important; border-color: #059669; }
    .ausente { background: #451a03 !important; border-color: #92400e; }

    .stats, .escrutinio { margin-top: 20px; font-size: 18px; background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid #334155; }
    .btn-cerrar { background: #e11d48; width: 100%; padding: 15px; margin-top: 15px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; color: white; font-weight: bold; }
    
    .conteo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
    .voto-btn { padding: 20px; font-size: 18px; border: none; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; }
    .cdc { background: #2563eb; }
    .patria { background: #ea580c; }
    .blanco { background: #f8fafc; color: #0f172a; }
    .nulo { background: #dc2626; }
    
    .btn-reporte { background: #3b82f6; width: 100%; padding: 15px; margin-top: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; color: white; font-weight: bold; }
    .share-box { margin-bottom: 20px; padding: 15px; background: #1e293b; border: 1px dashed #3b82f6; border-radius: 10px; text-align: center; }
    .oculto { display: none; }
</style>
</head>
<body>

<div class="container">
    <h1>🗳️ Control de Votación PRO+</h1>

    <div class="share-box">
        <button style="background:#3b82f6; border:none; color:white; padding:10px; border-radius:5px; cursor:pointer; font-weight:bold;" onclick="generarEnlace()">🔗 Copiar Enlace para Compartir Datos</button>
    </div>

    <div class="search-container">
        <input type="text" id="buscar" placeholder="🔍 Buscar por nombre...">
        <input type="number" id="buscarNum" placeholder="Nº" min="1" max="83">
    </div>

    <div id="lista"></div>

    <div class="stats">
        ✅ Asistentes: <span id="asistentes">0</span><br>
        ❌ Ausentes: <span id="ausentes">0</span><br>
        ⏳ Pendientes: <span id="pendientes">83</span>
        <button id="btnCerrar" class="btn-cerrar" onclick="cerrarVotacion()">🔒 FINALIZAR Y CERRAR MESA</button>
    </div>

    <div id="seccionEscrutinio" class="escrutinio oculto">
        <h2>📊 Conteo de Votos (Uno a Uno)</h2>
        <div class="conteo-grid">
            <button class="voto-btn cdc" onclick="sumarVoto('cdc')">+1 CDC</button>
            <button class="voto-btn patria" onclick="sumarVoto('patria')">+1 Patria</button>
            <button class="voto-btn blanco" onclick="sumarVoto('blanco')">+1 Blanco</button>
            <button class="voto-btn nulo" onclick="sumarVoto('nulo')">+1 Nulo</button>
        </div>
        <div style="margin-top:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:22px;">
            <div>🔵 CDC: <strong id="resCDC">0</strong></div>
            <div>🟠 Patria: <strong id="resPatria">0</strong></div>
            <div>⚪ Blanco: <strong id="resBlanco">0</strong></div>
            <div>🔴 Nulo: <strong id="resNulo">0</strong></div>
        </div>
        <button class="btn-reporte" onclick="descargarReporte()">📥 DESCARGAR REPORTE FINAL</button>
    </div>
</div>

<script>
const personas = [
    {n:1, nombre:"SANTOS LEONARDO JAVIER"}, {n:2, nombre:"SANTOS CHIRINOS LINDA GABRIELA"}, {n:3, nombre:"SANTOS MOLLINEDO GERMAN LUIS"}, {n:4, nombre:"SARAVIA AVALOS YOBANA"}, {n:5, nombre:"SARAVIA GUEVARA MARIA LOURDES"}, {n:6, nombre:"SEGOVIA AGUIRRE ALBERTO"}, {n:7, nombre:"SEGOVIA AGUIRRE LUISA GUMERCINDA"}, {n:8, nombre:"SEGOVIA ANAZCO FABIAN ALEJANDRO"}, {n:9, nombre:"SEGOVIA DIAZ KEVIN HERNAN"}, {n:10, nombre:"SEGOVIA FLORES GUSTAVO ARIEL"}, {n:11, nombre:"SEGOVIA GUTIERREZ ANIBAL"}, {n:12, nombre:"SERRUDO ROMERO JHON ANDER DAVID"}, {n:13, nombre:"SILVA SUBIETA LILIANA"}, {n:14, nombre:"SOLARES MENDOZA ALEXANDER MAGIN"}, {n:15, nombre:"SOLIZ ESPINDOLA LIMBER"}, {n:16, nombre:"SOLIZ LUNA ELIZABETH DORIS"}, {n:17, nombre:"SORUCO ALBA LUCERO"}, {n:18, nombre:"SORUCO RODAS ADRIANA"}, {n:19, nombre:"SORUCO ROMERO ANGELA VANESSA"}, {n:20, nombre:"SORUCO TEJERINA NATALIA"}, {n:21, nombre:"SOTO MANCILLA LIZBETH KAREN"}, {n:22, nombre:"SUBIA GUEVARA YAMIL GUSTAVO"}, {n:23, nombre:"TAPIA AMADOR MATIAS"}, {n:24, nombre:"TAPIA HUANCA LESLIE BONI"}, {n:25, nombre:"TAPIA ICUNA VIRGINIA"}, {n:26, nombre:"TARIFA FIGUEROA MARIEL ZARETH"}, {n:27, nombre:"TEGUA DANITZA"}, {n:28, nombre:"TEJERINA CASTILLO JHENNIFER ALISON"}, {n:29, nombre:"TEJERINA CAYO RONI"}, {n:30, nombre:"TEJERINA CHUQUIMIA ANAHY PAOLA"}, {n:31, nombre:"TEJERINA RUEDA ADA LUZ"}, {n:32, nombre:"TEJERINA VILAR JAZMIN ADELFA"}, {n:33, nombre:"TICONA ALI JORGE GASTON"}, {n:34, nombre:"TICONA GARECA SHIRLEY GABRIELA"}, {n:35, nombre:"TOLA TOLA RITA"}, {n:36, nombre:"TOLABA MAMANI NAYDELI LIDZA"}, {n:37, nombre:"TOLABA VARGAS MICHELLE ANGELI"}, {n:38, nombre:"TOLAY COPA MARTIN"}, {n:39, nombre:"TORREJON CANO PAMELA ANDREA"}, {n:40, nombre:"TORREJON LABRA PABLO"}, {n:41, nombre:"TORREZ ARRATIA DAYANA NICOLE"}, {n:42, nombre:"TORREZ BROWN JAVIER"}, {n:43, nombre:"TORREZ LOPEZ SAUL"}, {n:44, nombre:"UBALDO CHOQUE MARITZA"}, {n:45, nombre:"UGARTE CHOQUE RAYMUNDO"}, {n:46, nombre:"ULLOA ORTIZ ANGEL ANDRES"}, {n:47, nombre:"VADILLO PADILLA LEYDY LAURA"}, {n:48, nombre:"VALENCIA CONDORI LISSET ROCIO"}, {n:49, nombre:"VALERIANO NARVAEZ JHOEL EDUARDO"}, {n:50, nombre:"VARAS BUSTOS MARCELO"}, {n:51, nombre:"VARGAS MORALES FRANZ ROLANDO"}, {n:52, nombre:"VARGAS MORALES JACQUELINE REINA"}, {n:53, nombre:"VARGAS VALLEJO MARITZA LISBETH"}, {n:54, nombre:"VASCO TINTILAY LIDIA"}, {n:55, nombre:"VASQUEZ AYAVIRI LIMBERTH"}, {n:56, nombre:"VASQUEZ OSORIO KAREN ALEJANDRA"}, {n:57, nombre:"VASQUEZ VICTORIO MARCEL GERARDO"}, {n:58, nombre:"VEDIA RODRIGUEZ GREGORIO"}, {n:59, nombre:"VEGA ENCINAS VANLIZ MONTSERRAT"}, {n:60, nombre:"VEGA HIDALGO VILDO ROLANDO"}, {n:61, nombre:"VEGA SANTOS KARLA LORENA"}, {n:62, nombre:"VELASQUEZ FELIX"}, {n:63, nombre:"VELASQUEZ CRUZ MARGARITA"}, {n:64, nombre:"VELASQUEZ CRUZ NATALY HORTENCIA"}, {n:65, nombre:"VELASQUEZ HUANCA HUGO"}, {n:66, nombre:"VELASQUEZ REYES CRISTIAN MATIAS"}, {n:67, nombre:"VERA FRANCO"}, {n:68, nombre:"VICTORIO CONDORI JOEL ALEXANDER"}, {n:69, nombre:"VIDAURRE DAZA MARITZA"}, {n:70, nombre:"VIDES YUCRA FATIMA"}, {n:71, nombre:"VILAR COPA SAYDA MARLENI"}, {n:72, nombre:"VILLENA RODRIGUEZ ESTEBAN"}, {n:73, nombre:"VILTE FLORES EDIL"}, {n:74, nombre:"VILTE ORTIZ YOSELIN"}, {n:75, nombre:"YAÑEZ VIDAURRE ANA ISABEL"}, {n:76, nombre:"YUCA DELGADO JACQUELINNE STEFANI"}, {n:77, nombre:"ZARATE CORPUS FABIOLA"}, {n:78, nombre:"ZENTENO ARAMAYO ADRIANO RAUL"}, {n:79, nombre:"ZENTENO FIGUEROA LILIAN KAREN"}, {n:80, nombre:"ZENTENO GALLARDO OLIVER GERMAN"}, {n:81, nombre:"ZENTENO ORTIZ JHONNY EDUARDO"}, {n:82, nombre:"ZENTENO YEVARA WILLAN LUCIO"}, {n:83, nombre:"ZUBIETA MANCILLA YAZMIN"}
];

let estado = JSON.parse(localStorage.getItem("votos")) || {};
let conteo = JSON.parse(localStorage.getItem("conteo")) || { cdc: 0, patria: 0, blanco: 0, nulo: 0 };
let mesaCerrada = localStorage.getItem("mesaCerrada") === "true";

// Cargar datos de URL si existen
const params = new URLSearchParams(window.location.search);
if(params.get("d")) {
    const importados = JSON.parse(atob(params.get("d")));
    importados.forEach(nom => estado[nom] = true);
}

function render() {
    const lista = document.getElementById("lista");
    const filtroNombre = document.getElementById("buscar").value.toLowerCase();
    const filtroNum = document.getElementById("buscarNum").value;
    lista.innerHTML = "";
    
    let asistentes = 0, ausentes = 0;

    personas.forEach(p => {
        if(estado[p.nombre] === true) asistentes++;
        else if(estado[p.nombre] === "ausente") ausentes++;

        const coincideNombre = p.nombre.toLowerCase().includes(filtroNombre);
        const coincideNum = filtroNum === "" || p.n == filtroNum;

        if(coincideNombre && coincideNum) {
            const div = document.createElement("div");
            div.className = "persona" + (estado[p.nombre] === true ? " votado" : (estado[p.nombre] === "ausente" ? " ausente" : ""));
            
            div.innerHTML = `
                <div><span class="n-orden">${p.n}</span><span>${p.nombre}</span></div>
                <div>
                    <button class="btn-marcar" onclick="marcar('${p.nombre}')" ${mesaCerrada ? "disabled" : ""}>
                        ${estado[p.nombre] === true ? "✔️ Votó" : "Marcar"}
                    </button>
                    ${estado[p.nombre] === true && !mesaCerrada ? `<button class="btn-quitar" onclick="quitar('${p.nombre}')">✕</button>` : ""}
                </div>
            `;
            lista.appendChild(div);
        }
    });

    document.getElementById("asistentes").innerText = asistentes;
    document.getElementById("ausentes").innerText = ausentes;
    document.getElementById("pendientes").innerText = personas.length - asistentes - ausentes;
    
    if(mesaCerrada) {
        document.getElementById("seccionEscrutinio").classList.remove("oculto");
        document.getElementById("btnCerrar").classList.add("oculto");
        actualizarTablero();
    }
}

function marcar(nombre) {
    estado[nombre] = true;
    localStorage.setItem("votos", JSON.stringify(estado));
    render();
}

function quitar(nombre) {
    delete estado[nombre];
    localStorage.setItem("votos", JSON.stringify(estado));
    render();
}

function cerrarVotacion() {
    if(!confirm("¿Cerrar mesa? Los no marcados serán ausentes.")) return;
    personas.forEach(p => { if(!estado[p.nombre]) estado[p.nombre] = "ausente"; });
    mesaCerrada = true;
    localStorage.setItem("mesaCerrada", "true");
    localStorage.setItem("votos", JSON.stringify(estado));
    render();
}

function sumarVoto(tipo) {
    if((conteo.cdc + conteo.patria + conteo.blanco + conteo.nulo) < parseInt(document.getElementById("asistentes").innerText)) {
        conteo[tipo]++;
        localStorage.setItem("conteo", JSON.stringify(conteo));
        actualizarTablero();
    }
}

function actualizarTablero() {
    document.getElementById("resCDC").innerText = conteo.cdc;
    document.getElementById("resPatria").innerText = conteo.patria;
    document.getElementById("resBlanco").innerText = conteo.blanco;
    document.getElementById("resNulo").innerText = conteo.nulo;
}

function descargarReporte() {
    let csv = "REPORTE FINAL DE MESA\n\nASISTENTES;" + document.getElementById("asistentes").innerText + "\nAUSENTES;" + document.getElementById("ausentes").innerText + "\n\nRESULTADOS\nCDC;" + conteo.cdc + "\nPATRIA;" + conteo.patria + "\nBLANCO;" + conteo.blanco + "\nNULO;" + conteo.nulo + "\n\nLISTADO DE AUSENTES\n";
    personas.filter(p => estado[p.nombre] === "ausente").forEach(p => csv += p.n + ";" + p.nombre + "\n");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
    link.setAttribute("download", "Reporte_Final.csv");
    link.click();
}

function generarEnlace() {
    const votaron = Object.keys(estado).filter(k => estado[k] === true);
    const url = window.location.href.split('?')[0] + "?d=" + btoa(JSON.stringify(votaron));
    navigator.clipboard.writeText(url);
    alert("¡Enlace copiado! Envíalo para que otros vean tus marcas actuales.");
}

document.getElementById("buscar").addEventListener("input", render);
document.getElementById("buscarNum").addEventListener("input", render);
render();
</script>
</body>
</html>
