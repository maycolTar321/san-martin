<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA INTEGRAL CATEQUESIS TARIJA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; --bg: #f0f2f5; }
        
        /* MEJORA 1: Evitar que la app se salga o refresque al hacer scroll fuerte hacia arriba */
        body { 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            padding-bottom: 90px; 
            margin: 0; 
            overscroll-behavior-y: contain; 
            overflow-x: hidden;
        }

        #login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .app-header { background: var(--blue); color: white; padding: 20px; border-bottom: 6px solid var(--gold); border-radius: 0 0 35px 35px; text-align: center; position: relative; }
        
        /* Estilo para el botón de salir */
        .logout-btn { position: absolute; right: 20px; top: 20px; font-size: 1.2rem; color: white; cursor: pointer; }
        
        .card { border-radius: 20px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 12px; background: white; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 25px 25px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #bbb; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        
        .admin-only, .cate-only, .hidden { display: none !important; }
        .btn-del { color: #dc3545; cursor: pointer; font-size: 1.1rem; }
        .cumple-item { background: #fff9c4; border-left: 5px solid #fbc02d; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        /* Estilo para el ojo de la contraseña */
        .pass-group { position: relative; }
        .toggle-pass { position: absolute; right: 15px; top: 7px; cursor: pointer; color: #666; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card p-4 text-center" style="width: 90%; max-width: 360px;">
        <h4 class="fw-bold mb-1" style="color: var(--blue)">✝️ MISIÓN TARIJA</h4>
        <p class="small text-muted mb-3">Sistema de Gestión 2026</p>
        
        <select id="rol-select" class="form-select mb-3 rounded-pill" onchange="checkRol(this.value)">
            <option value="Joven">Modo Joven (Invitado)</option>
            <option value="Maycol">Maycol (Coordinador)</option>
            <option value="Yoselin">Yoselin (Sub-Coord)</option>
            <option value="Catequista">Catequista (Equipo)</option>
        </select>

        <div id="p-box" class="hidden pass-group">
            <input type="password" id="p-pass" class="form-control mb-3 rounded-pill" placeholder="Contraseña">
            <i class="bi bi-eye toggle-pass" id="eye-icon" onclick="toggleVisibility()"></i>
        </div>

        <button onclick="entrar()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header">
        <i class="bi bi-box-arrow-right logout-btn" id="btn-logout" onclick="salir()"></i>
        <h5 class="fw-bold mb-0">CATEQUESIS TARIJA</h5>
        <div id="u-tag" class="badge bg-light text-dark mt-2"></div>
    </div>

    <div id="sec-home" class="seccion p-2">
        <div class="card p-0">
            <div class="ratio ratio-16x9">
                <iframe id="v-frame" src="about:blank" allowfullscreen></iframe>
            </div>
            <div class="admin-only p-2 bg-dark">
                <input type="text" id="v-id" class="form-control form-control-sm mb-1" placeholder="ID de Video YouTube">
                <button onclick="setVid()" class="btn btn-warning btn-sm w-100">Cambiar Video</button>
            </div>
        </div>
        <div class="card p-3">
            <h6 class="fw-bold text-primary"><i class="bi bi-megaphone"></i> Comunicados</h6>
            <div class="admin-only mb-3">
                <input type="text" id="t-not" class="form-control mb-1" placeholder="Título">
                <textarea id="m-not" class="form-control mb-2" placeholder="Mensaje..."></textarea>
                <div class="d-flex gap-2">
                    <button onclick="addNot()" class="btn btn-primary btn-sm w-100">Publicar</button>
                    <button onclick="wsNot()" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></button>
                </div>
            </div>
            <div id="lista-not"></div>
        </div>
    </div>

    <div id="sec-lib" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary"><i class="bi bi-book"></i> Biblioteca Virtual</h6>
            <div class="admin-only mb-3 p-2 bg-light rounded">
                <input type="text" id="l-tit" class="form-control mb-1" placeholder="Nombre Libro">
                <input type="text" id="l-url" class="form-control mb-1" placeholder="Link (Drive/PDF)">
                <button onclick="addLib()" class="btn btn-primary btn-sm w-100">Subir Recurso</button>
            </div>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden admin-only p-2">
        <div class="card p-4 bg-primary text-white text-center">
            <small>SALDO CAJA</small>
            <h2 id="s-bs">Bs. 0.00</h2>
            <button class="btn btn-light btn-sm mt-2" onclick="rep()">Bajar Reporte .txt</button>
        </div>
        <div class="card p-3">
            <h6 class="fw-bold">Movimientos e Inventario</h6>
            <input type="number" id="c-mon" class="form-control mb-1" placeholder="Bs.">
            <input type="text" id="c-det" class="form-control mb-2" placeholder="Detalle / Artículo">
            <div class="d-flex gap-2 mb-3">
                <button onclick="mon(1)" class="btn btn-success w-100">Ingreso / Alta</button>
                <button onclick="mon(-1)" class="btn btn-danger w-100">Egreso / Baja</button>
            </div>
            <div id="lista-inv" class="small"></div>
        </div>
    </div>

    <div id="sec-chat" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">Buzón para Maycol</h6>
            <div id="lista-msg" class="mb-2 small"></div>
            <textarea id="j-msg" class="form-control mb-2" placeholder="Escribe tu duda aquí..."></textarea>
            <button onclick="sendMsg()" class="btn btn-primary w-100">Enviar Consulta</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-house"></i>Inicio</div>
        <div onclick="tab('lib')" id="n-lib" class="nav-item"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-cash-coin"></i>Gestión</div>
        <div onclick="tab('chat')" id="n-chat" class="nav-item"><i class="bi bi-chat-left-dots"></i>Dudas</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    let total = 0;

    // MEJORA 3: Persistencia de sesión
    window.onload = function() {
        const sesionGuardada = localStorage.getItem('sesion_cate');
        if(sesionGuardada) {
            const data = JSON.parse(sesionGuardada);
            run(data.t, data.a, data.c, data.rol);
        }
    };

    function checkRol(val) {
        document.getElementById('p-box').classList.toggle('hidden', val === 'Joven');
    }

    function toggleVisibility() {
        const p = document.getElementById('p-pass');
        const icon = document.getElementById('eye-icon');
        if(p.type === "password") {
            p.type = "text";
            icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
            p.type = "password";
            icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
    }

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const pass = document.getElementById('p-pass').value;
        
        if(r === "Joven") {
            // Guardar sesión para jóvenes
            localStorage.setItem('sesion_cate', JSON.stringify({t:"MODO LECTURA", a:false, c:false, rol:"Joven"}));
            run("MODO LECTURA", false, false, "Joven");
        } else if(pass === P[r]) {
            // No guardamos sesión para admin/catequistas por seguridad (o puedes elegir guardarla quitando este comentario)
            run(r, r!=="Catequista", true, r);
        } else {
            alert("Clave Incorrecta");
        }
    }

    function run(t, a, c, rol) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = t;
        
        // Mostrar/Ocultar botón salir según rol
        document.getElementById('btn-logout').style.display = (rol === "Joven") ? "none" : "block";

        if(a) document.querySelectorAll('.admin-only').forEach(e => e.style.setProperty('display','block','important'));
        if(c) document.querySelectorAll('.cate-only').forEach(e => e.style.setProperty('display','block','important'));
    }

    function salir() {
        localStorage.removeItem('sesion_cate');
        location.reload();
    }

    // Funciones de lógica de negocio (Se mantienen igual)
    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
    }

    function setVid() {
        const id = document.getElementById('v-id').value;
        if(id) document.getElementById('v-frame').src = "https://www.youtube.com/embed/" + id;
    }

    function addNot() {
        const t = document.getElementById('t-not').value, m = document.getElementById('m-not').value;
        if(!t) return;
        const id = "n"+Date.now();
        document.getElementById('lista-not').insertAdjacentHTML('afterbegin', `<div class="p-2 border-bottom shadow-sm mb-2 bg-white" id="${id}"><b>${t}</b> <i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i><br><small class="text-muted">${m}</small></div>`);
        document.getElementById('t-not').value=""; document.getElementById('m-not').value="";
    }

    function wsNot() {
        window.open(`https://wa.me/?text=${encodeURIComponent("*"+document.getElementById('t-not').value+"*\n"+document.getElementById('m-not').value)}`);
    }

    function addCum() {
        const n = document.getElementById('c-nom').value, f = document.getElementById('c-fec').value;
        if(!n || !f) return;
        const id = "c"+Date.now();
        document.getElementById('lista-cum').insertAdjacentHTML('afterbegin', `<div class="cumple-item" id="${id}"><span>🎂 <b>${n}</b> (${f})</span><div><i class="bi bi-whatsapp text-success me-2 admin-only" onclick="fel('${n}')"></i><i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i></div></div>`);
        document.getElementById('c-nom').value="";
    }

    function fel(n) { window.open(`https://wa.me/?text=${encodeURIComponent("🎉 ¡Feliz Cumpleaños "+n+"! Dios te bendiga mucho ✝️")}`); }

    function addLib() {
        const t = document.getElementById('l-tit').value, u = document.getElementById('l-url').value;
        if(!t || !u) return;
        const id = "l"+Date.now();
        document.getElementById('lista-lib').insertAdjacentHTML('afterbegin', `<div class="d-flex justify-content-between p-3 border-bottom align-items-center" id="${id}"><a href="${u}" target="_blank" class="text-dark small"><i class="bi bi-file-earmark-pdf text-danger me-2"></i>${t}</a><i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i></div>`);
    }

    function mon(v) {
        const m = parseFloat(document.getElementById('c-mon').value), d = document.getElementById('c-det').value;
        if(!m) return;
        total += (m * v);
        document.getElementById('s-bs').innerText = "Bs. " + total.toFixed(2);
        document.getElementById('lista-inv').insertAdjacentHTML('afterbegin', `<div class="border-bottom py-1">${d}: ${m*v} Bs.</div>`);
    }

    function rep() {
        const b = new Blob(["REPORTE CATEQUESIS TARIJA\nSaldo Final: "+total+" Bs."], {type:"text/plain"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = "reporte.txt"; a.click();
    }

    function sendMsg() {
        const m = document.getElementById('j-msg').value;
        if(!m) return;
        document.getElementById('lista-msg').insertAdjacentHTML('afterbegin', `<div class="p-2 bg-light border rounded mb-2"><b>Joven pregunta:</b> ${m}</div>`);
        document.getElementById('j-msg').value=""; alert("Enviado");
    }
</script>
</body>
</html>
