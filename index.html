<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMP - Grupo 4 (Maycol Avila)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --guindo: #800020; --bg: #f8f9fc; --white: #ffffff; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; }
        header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        #logo-header { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--guindo); margin-right: 12px; object-fit: cover; background: #eee; }
        .container { max-width: 100%; padding: 10px; }
        .card { background: var(--white); border-radius: 15px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        h2 { font-size: 16px; color: var(--guindo); margin-bottom: 5px; }
        .fecha-hoy { font-size: 12px; color: #666; margin-bottom: 15px; font-weight: 700; }
        
        input, textarea { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { background: var(--guindo); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 800; cursor: pointer; }
        
        .tabla-scroll { overflow-x: auto; background: white; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; font-size: 12px; }
        th { background: #f4f4f4; color: #444; padding: 12px; text-align: left; border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #f0f0f0; }
        
        .btn-grupo { display: flex; gap: 4px; }
        .btn-control { border: 1px solid #ddd; background: white; padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; font-weight: 800; color: #888; }
        .btn-control.active-p { background: #2e7d32; color: white; border-color: #2e7d32; }
        .btn-control.active-f { background: #c62828; color: white; border-color: #c62828; }
        .btn-control.active-per { background: #f9a825; color: white; border-color: #f9a825; }
        .btn-control.active-t { background: #4a148c; color: white; border-color: #4a148c; }

        .nav-bar { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); width: 94%; background: white; border-radius: 20px; display: flex; justify-content: space-around; padding: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .nav-btn { font-size: 20px; color: #ccc; cursor: pointer; }
        .nav-btn.active { color: var(--guindo); }
        .hidden { display: none !important; }
        label { font-size: 11px; font-weight: 700; color: #666; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<header>
    <img id="logo-header" src="">
    <div>
        <div style="font-weight:800; font-size:13px; color:var(--guindo);">GRUPO 4 • 2DO AÑO</div>
        <div style="font-size:10px; color:#666;">Catequista: Maycol Avila Zenteno</div>
    </div>
</header>

<div class="container">
    <div id="v-joven" class="view">
        <div id="card-registro" class="card">
            <h2><i class="fas fa-user-plus"></i> Registro Único</h2>
            <label>Nombre Completo:</label>
            <input type="text" id="reg-nom" placeholder="Ej: Juan Perez" oninput="app.formatoNombre(this)">
            <label>Fecha de Nacimiento:</label>
            <input type="date" id="reg-fecha">
            <label>C.I.:</label>
            <input type="number" id="reg-ci" placeholder="C.I.">
            <label>Celular:</label>
            <input type="number" id="reg-tel" placeholder="Celular">
            <button class="btn-main" onclick="app.registrar()">REGISTRARME</button>
        </div>

        <div id="panel-joven" class="hidden">
            <div class="card" style="background:#fff4e5; border-left:5px solid #ff9800;">
                <h2><i class="fas fa-bullhorn"></i> Aviso de Maycol</h2>
                <p id="txt-aviso" style="font-weight:700; color:#856404; margin:0;"></p>
            </div>
            <div class="card">
                <h2><i class="fas fa-list-check"></i> Mi Estado</h2>
                <div id="checklist-joven"></div>
            </div>
        </div>
    </div>

    <div id="v-admin" class="view hidden">
        <div class="card">
            <h2><i class="fas fa-calendar-alt"></i> Asistencia y Tareas</h2>
            <div id="fecha-actual" class="fecha-hoy"></div>
            <div class="tabla-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Nacimiento</th>
                            <th>Datos</th>
                            <th>Asistencia</th>
                            <th>Tarea</th>
                        </tr>
                    </thead>
                    <tbody id="lista-master"></tbody>
                </table>
            </div>
        </div>
        
        <div class="card">
            <h2><i class="fas fa-comment-dots"></i> Publicar Aviso</h2>
            <textarea id="input-aviso" placeholder="Escribe aquí..."></textarea>
            <button class="btn-main" onclick="app.publicarAviso()" style="background:#ff9800">ACTUALIZAR AVISO</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-camera"></i> Logo del Grupo</h2>
            <input type="file" id="input-foto" accept="image/*" onchange="app.subirFoto(this)">
            <button class="btn-main" onclick="app.exportar()" style="background:#107c41; margin-top:10px;">DESCARGAR EXCEL</button>
        </div>
    </div>
</div>

<nav class="nav-bar">
    <i class="fas fa-user-circle nav-btn active" onclick="app.nav('joven', this)"></i>
    <i class="fas fa-tasks nav-btn" onclick="app.nav('admin', this)"></i>
</nav>

<script>
    const app = {
        db: JSON.parse(localStorage.getItem('smp_v16_final')) || {
            jovenes: [], aviso: "", logo: "", asist: {}, tareas: {} 
        },
        sesion: JSON.parse(localStorage.getItem('smp_user_v16')) || null,

        init: () => {
            if(app.db.logo) document.getElementById('logo-header').src = app.db.logo;
            if(app.sesion) {
                document.getElementById('card-registro').classList.add('hidden');
                document.getElementById('panel-joven').classList.remove('hidden');
            }
            app.render();
        },

        formatoNombre: (el) => {
            el.value = el.value.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
        },

        nav: (id, el) => {
            if(id === 'admin' && prompt("Clave Maycol:") !== "adminSMP") return;
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('v-'+id).classList.remove('hidden');
            el.classList.add('active');
            app.render();
        },

        subirFoto: (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    app.db.logo = e.target.result;
                    document.getElementById('logo-header').src = e.target.result;
                    app.save("Logo actualizado.");
                };
                reader.readAsDataURL(input.files[0]);
            }
        },

        registrar: () => {
            const d = {
                id: Date.now(),
                n: document.getElementById('reg-nom').value,
                f: document.getElementById('reg-fecha').value,
                c: document.getElementById('reg-ci').value,
                t: document.getElementById('reg-tel').value
            };
            if(!d.n || !d.f || !d.c || !d.t) return alert("Faltan datos.");
            app.db.jovenes.push(d);
            app.sesion = d;
            localStorage.setItem('smp_user_v16', JSON.stringify(d));
            app.save("¡Listo!");
            location.reload();
        },

        publicarAviso: () => {
            app.db.aviso = document.getElementById('input-aviso').value;
            app.save("Aviso publicado.");
        },

        marcar: (tipo, jId, valor) => {
            const hoy = new Date().toLocaleDateString().replace(/\//g, '-');
            if(tipo === 'asist') {
                if(!app.db.asist[hoy]) app.db.asist[hoy] = {};
                app.db.asist[hoy][jId] = valor;
            } else {
                if(!app.db.tareas[hoy]) app.db.tareas[hoy] = {};
                app.db.tareas[hoy][jId] = valor;
            }
            app.save();
        },

        save: (m) => {
            localStorage.setItem('smp_v16_final', JSON.stringify(app.db));
            if(m) alert(m);
            app.render();
        },

        render: () => {
            const hoy = new Date().toLocaleDateString().replace(/\//g, '-');
            const fechaTxt = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('fecha-actual').innerText = "Hoy es: " + fechaTxt;
            
            if(app.sesion) {
                document.getElementById('txt-aviso').innerText = app.db.aviso || "No hay avisos.";
                const hecho = (app.db.tareas[hoy] && app.db.tareas[hoy][app.sesion.id]);
                document.getElementById('checklist-joven').innerHTML = `
                    <div style="display:flex; justify-content:space-between; padding:12px 0;">
                        <span>Tarea de hoy:</span>
                        <b style="color:${hecho?'green':'red'}">${hecho?'PRESENTADO':'PENDIENTE'}</b>
                    </div>
                `;
            }

            const aHoy = app.db.asist[hoy] || {};
            const tHoy = app.db.tareas[hoy] || {};
            
            document.getElementById('lista-master').innerHTML = app.db.jovenes.map(j => `
                <tr>
                    <td><b>${j.n}</b></td>
                    <td>${j.f}</td>
                    <td>CI: ${j.c}<br>${j.t}</td>
                    <td>
                        <div class="btn-grupo">
                            <button class="btn-control ${aHoy[j.id]=='p'?'active-p':''}" onclick="app.marcar('asist',${j.id},'p')">P</button>
                            <button class="btn-control ${aHoy[j.id]=='f'?'active-f':''}" onclick="app.marcar('asist',${j.id},'f')">F</button>
                            <button class="btn-control ${aHoy[j.id]=='per'?'active-per':''}" onclick="app.marcar('asist',${j.id},'per')">PER</button>
                        </div>
                    </td>
                    <td>
                        <button class="btn-control ${tHoy[j.id]?'active-t':''}" onclick="app.marcar('tarea',${j.id},!tHoy[j.id])">
                            ${tHoy[j.id]?'SÍ':'NO'}
                        </button>
                    </td>
                </tr>
            `).join('');
        },

        exportar: () => {
            const hoy = new Date().toLocaleDateString().replace(/\//g, '-');
            const data = app.db.jovenes.map(j => ({
                Nombre: j.n, CI: j.c, Asistencia: app.db.asist[hoy] ? (app.db.asist[hoy][j.id] || "-") : "-",
                Tarea: app.db.tareas[hoy] ? (app.db.tareas[hoy][j.id] ? "SÍ" : "NO") : "NO"
            }));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Lista");
            XLSX.writeFile(wb, "Catequesis_Maycol_" + hoy + ".xlsx");
        }
    };
    app.init();
</script>
</body>
</html>
