<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reportes Pagos V4</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">
    <style>
        :root { --primary: #2c3e50; --office: #27ae60; --extern: #2980b9; --bg: #f4f7f6; --police: #8e44ad; --accent: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .report-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-card { background: var(--primary); color: white; padding: 10px; border-radius: 10px; text-align: center; }
        .stat-card div { font-size: 18px; font-weight: bold; }
        .panel-carga { background: #fff3e0; padding: 12px; border-radius: 10px; border: 1px solid #ffe0b2; margin-bottom: 15px; }
        .card { border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 5px solid var(--office); position: relative; }
        .card.externo { border-left-color: var(--extern); background: #f0f7ff; }
        .card.policia { border-left-color: var(--police); }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; font-size: 14px; }
        .btn-office { background: var(--office); }
        .btn-extern { background: var(--extern); }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border-bottom: 1px solid #eee; padding: 8px; text-align: left; }
        .delete-btn { color: #e74c3c; font-weight: bold; cursor: pointer; }
        .reporte-individual { margin-top: 20px; background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <h3 style="text-align:center; margin: 0 0 15px 0;">📊 Reporte de Pagos</h3>
    
    <div class="report-grid">
        <div class="stat-card">Recaudado Ofic.<div id="totalOficina">0 bs</div></div>
        <div class="stat-card" style="background:var(--extern)">Recaudado Reg.<div id="totalRegistro">0 bs</div></div>
    </div>

    <div class="panel-carga">
        <strong>📥 Cargar Pago Anterior</strong>
        <select id="histUsuario">
            <option value="Ximena">1. Ximena</option>
            <option value="Maycol">2. Maycol</option>
            <option value="Samuel">3. Samuel</option>
            <option value="Oficial" id="optPolicial">4. Oficial (Nilsa)</option>
            <option value="Registro Civil">Registro Civil</option>
        </select>
        <div style="display:flex; gap:5px;">
            <input type="date" id="histFecha">
            <input type="number" id="histMonto" placeholder="Bs">
        </div>
        <button class="btn" style="background: var(--accent);" onclick="cargarHistorico()">Añadir al Reporte</button>
    </div>

    <div class="card"><strong>1. Ximena</strong><button class="btn btn-office" onclick="registrar('Ximena', 10, 'Oficina')">Cobrar 10 bs</button></div>
    <div class="card"><strong>2. Maycol</strong><button class="btn btn-office" onclick="registrar('Maycol', 10, 'Oficina')">Cobrar 10 bs</button></div>
    <div class="card"><strong>3. Samuel</strong><button class="btn btn-office" onclick="registrar('Samuel', 10, 'Oficina')">Cobrar 10 bs</button></div>
    <div class="card policia">
        <strong id="nombrePolicial">4. Oficial: Nilsa</strong>
        <input type="text" id="editPolicial" placeholder="Cambiar nombre oficial..." style="height:30px;">
        <button class="btn" style="background:var(--police); padding:5px; font-size:11px;" onclick="cambiarOficial()">ACTUALIZAR NOMBRE</button>
        <button class="btn btn-office" onclick="registrar('Oficial ('+document.getElementById('editPolicial').placeholder+')', 10, 'Oficina')">Cobrar 10 bs</button>
    </div>
    <div class="card externo"><strong>Reg. Civil</strong><button class="btn btn-extern" onclick="registrar('Registro Civil', 36, 'Registro Civil')">Cobrar 36 bs</button></div>

    <div class="reporte-individual">
        <strong style="font-size:14px;">📈 Total por Persona:</strong>
        <div id="listaIndividual" style="font-size:13px; margin-top:5px; color:#555;"></div>
    </div>

    <h4>Historial de Pagos</h4>
    <div class="table-wrap">
        <table id="tablaPagos">
            <thead><tr><th>Fecha</th><th>Nombre</th><th>Bs</th><th></th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <button class="btn" style="background: #27ae60; margin-top:20px;" onclick="exportarExcel()">📥 Descargar Excel Completo</button>
</div>

<script>
    let registros = JSON.parse(localStorage.getItem('pagos_v4_final')) || [];
    let nombreOficialActual = "Nilsa";

    function registrar(user, monto, tipo, fechaManual = null) {
        let f = fechaManual ? new Date(fechaManual + 'T12:00:00').toLocaleDateString() : new Date().toLocaleDateString();
        registros.push({ id: Date.now() + Math.random(), fecha: f, user: user, monto: parseFloat(monto), tipo: tipo });
        actualizar();
    }

    function cargarHistorico() {
        const u = document.getElementById('histUsuario').value, f = document.getElementById('histFecha').value, m = document.getElementById('histMonto').value;
        if(!f || !m) return alert('Datos incompletos');
        registrar(u, m, (u === 'Registro Civil' ? 'Registro Civil' : 'Oficina'), f);
    }

    function cambiarOficial() {
        const n = document.getElementById('editPolicial').value;
        if(!n) return;
        nombreOficialActual = n;
        document.getElementById('nombrePolicial').innerText = "4. Oficial: " + n;
        document.getElementById('editPolicial').placeholder = n;
        document.getElementById('optPolicial').innerText = "4. Oficial (" + n + ")";
        alert('Oficial actualizado');
    }

    function borrar(id) { if(confirm('¿Borrar?')) { registros = registros.filter(r => r.id !== id); actualizar(); } }

    function actualizar() {
        registros.sort((a, b) => new Date(b.fecha.split('/').reverse().join('-')) - new Date(a.fecha.split('/').reverse().join('-')));
        localStorage.setItem('pagos_v4_final', JSON.stringify(registros));
        
        const tbody = document.querySelector('#tablaPagos tbody');
        const listaInd = document.getElementById('listaIndividual');
        tbody.innerHTML = '';
        listaInd.innerHTML = '';
        
        let tO = 0, tR = 0, sumas = {};

        registros.forEach(r => {
            if(r.tipo === 'Oficina') tO += r.monto; else tR += r.monto;
            sumas[r.user] = (sumas[r.user] || 0) + r.monto;
            tbody.innerHTML += `<tr><td>${r.fecha}</td><td>${r.user}</td><td>${r.monto}</td><td class="delete-btn" onclick="borrar(${r.id})">✕</td></tr>`;
        });

        for(let persona in sumas) {
            listaInd.innerHTML += `<div>• ${persona}: <b>${sumas[persona]} bs</b></div>`;
        }

        document.getElementById('totalOficina').innerText = tO + ' bs';
        document.getElementById('totalRegistro').innerText = tR + ' bs';
    }

    function exportarExcel() {
        let csv = "\\ufeffFecha,Nombre,Monto,Tipo\\n";
        registros.forEach(r => { csv += `${r.fecha},${r.user},${r.monto},${r.tipo}\\n`; });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        a.download = 'Reporte_Pagos.csv';
        a.click();
    }
    actualizar();
</script>
</body>
</html>
