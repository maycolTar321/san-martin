<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA INTEGRAL CATEQUESIS TARIJA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; --bg: #f0f2f5; }
        
        /* PROTECCIÓN DE INTERFAZ */
        html, body { 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
            overscroll-behavior-y: contain; 
            overscroll-behavior-x: none;    
            height: 100%;
            overflow: hidden; 
        }

        #app {
            height: 100vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 100px;
        }

        #login-screen { position: fixed; inset: 0; background: var(--blue); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .app-header { background: var(--blue); color: white; padding: 20px; border-bottom: 6px solid var(--gold); border-radius: 0 0 35px 35px; text-align: center; position: relative; }
        
        /* BOTÓN PARA VOLVER AL LOGIN */
        .logout-btn { 
            position: absolute; 
            right: 15px; 
            top: 15px; 
            font-size: 0.75rem; 
            color: white; 
            cursor: pointer; 
            background: rgba(255,255,255,0.2); 
            padding: 5px 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.4);
            z-index: 1001;
        }
        
        .card { border-radius: 20px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin: 12px; background: white; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); border-radius: 25px 25px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #bbb; flex: 1; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        
        .admin-only, .cate-only, .hidden { display: none !important; }
        .btn-del { color: #dc3545; cursor: pointer; font-size: 1.1rem; }
        .cumple-item { background: #fff9c4; border-left: 5px solid #fbc02d; padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }

        .pass-container { position: relative; width: 100%; }
        .toggle-pass { position: absolute; right: 15px; top: 10px; z-index: 100; cursor: pointer; color: #666; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card p-4 text-center" style="width: 90%; max-width: 360px;">
        <h4 class="fw-bold mb-1" style="color: var(--blue)">✝️ MISIÓN TARIJA</h4>
        <p class="small text-muted mb-3">Sistema de Gestión 2026</p>
        
        <select id="rol-select" class="form-select mb-3 rounded-pill" onchange="checkRol(this.value)">
            <option value="Joven">Modo Joven (Invitado)</option>
            <option value="Maycol">Maycol (Coordinador)</option>
            <option value="Yoselin">Yoselin (Sub-Coord)</option>
            <option value="Catequista">Catequista (Equipo)</option>
        </select>

        <div id="p-box" class="hidden pass-container">
            <input type="password" id="p-pass" class="form-control mb-3 rounded-pill" placeholder="Contraseña">
            <i class="bi bi-eye toggle-pass" id="eye-icon" onclick="togglePass()"></i>
        </div>

        <button onclick="entrar()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header">
        <div class="logout-btn" onclick="salir()">Cambiar Cuenta</div>
        <h5 class="fw-bold mb-0">CATEQUESIS TARIJA</h5>
        <div id="u-tag" class="badge bg-light text-dark mt-2"></div>
    </div>

    <div id="sec-home" class="seccion p-2">
        <div class="card p-0">
            <div class="ratio ratio-16x9"><iframe id="v-frame" src="about:blank" allowfullscreen></iframe></div>
            <div class="admin-only p-2 bg-dark">
                <input type="text" id="v-id" class="form-control form-control-sm mb-1" placeholder="ID de Video YouTube">
                <button onclick="setVid()" class="btn btn-warning btn-sm w-100">Cambiar Video</button>
            </div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-primary"><i class="bi bi-megaphone"></i> Comunicados</h6>
            <div class="admin-only mb-3">
                <input type="text" id="t-not" class="form-control mb-1" placeholder="Título">
                <textarea id="m-not" class="form-control mb-2" placeholder="Mensaje..."></textarea>
                <div class="d-flex gap-2">
                    <button onclick="addNot()" class="btn btn-primary btn-sm w-100">Publicar</button>
                </div>
            </div>
            <div id="lista-not"></div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-warning">🎂 Cumpleaños</h6>
            <div class="cate-only mb-3 bg-light p-2 rounded">
                <input type="text" id="c-nom" class="form-control mb-1" placeholder="Nombre">
                <input type="date" id="c-fec" class="form-control mb-1">
                <button onclick="addCum()" class="btn btn-warning btn-sm w-100">Registrar</button>
            </div>
            <div id="lista-cum"></div>
        </div>
    </div>

    <div id="sec-lib" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">Biblioteca Virtual</h6>
            <div class="admin-only mb-3">
                <input type="text" id="l-tit" class="form-control mb-1" placeholder="Nombre Libro">
                <input type="text" id="l-url" class="form-control mb-1" placeholder="Link">
                <button onclick="addLib()" class="btn btn-primary btn-sm w-100">Subir</button>
            </div>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden admin-only p-2">
        <div class="card p-4 bg-primary text-white text-center">
            <small>SALDO CAJA</small>
            <h2 id="s-bs">Bs. 0.00</h2>
        </div>
        <div class="card p-3">
            <input type="number" id="c-mon" class="form-control mb-1" placeholder="Bs.">
            <input type="text" id="c-det" class="form-control mb-2" placeholder="Detalle">
            <div class="d-flex gap-2">
                <button onclick="mon(1)" class="btn btn-success w-100">Ingreso</button>
                <button onclick="mon(-1)" class="btn btn-danger w-100">Egreso</button>
            </div>
            <div id="lista-inv" class="mt-2 small"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-house"></i>Inicio</div>
        <div onclick="tab('lib')" id="n-lib" class="nav-item"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-cash-coin"></i>Gestión</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    let total = 0;

    // BLOQUEO BOTÓN ATRÁS
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function() { window.history.pushState(null, null, window.location.href); };

    // AL CARGAR: Verificar si hay sesión guardada
    window.onload = function() {
        const guardado = localStorage.getItem('sesion_activa');
        if(guardado) {
            const d = JSON.parse(guardado);
            run(d.t, d.a, d.c, d.rol);
        }
    };

    function checkRol(v) { document.getElementById('p-box').classList.toggle('hidden', v === 'Joven'); }

    function togglePass() {
        const input = document.getElementById('p-pass');
        input.type = (input.type === "password") ? "text" : "password";
    }

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const pass = document.getElementById('p-pass').value;
        
        if(r === "Joven") {
            const data = {t:"MODO JOVEN", a:false, c:false, rol:"Joven"};
            localStorage.setItem('sesion_activa', JSON.stringify(data));
            run(data.t, data.a, data.c, data.rol);
        } else if(pass === P[r]) {
            const data = {t:r, a:true, c:true, rol:r};
            localStorage.setItem('sesion_activa', JSON.stringify(data));
            run(data.t, data.a, data.c, data.rol);
        } else { alert("Contraseña Incorrecta"); }
    }

    function run(t, a, c, rol) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = t;
        
        // Resetear visibilidad
        document.querySelectorAll('.admin-only, .cate-only').forEach(e => e.style.setProperty('display','none','important'));
        
        if(a) document.querySelectorAll('.admin-only').forEach(e => e.style.setProperty('display','block','important'));
        if(c) document.querySelectorAll('.cate-only').forEach(e => e.style.setProperty('display','block','important'));
    }

    // FUNCIÓN CLAVE: Permite borrar la memoria y volver a la pantalla de roles
    function salir() {
        if(confirm("¿Cerrar sesión para entrar con otro rol?")) {
            localStorage.removeItem('sesion_activa');
            location.reload();
        }
    }

    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
    }

    function setVid() {
        const id = document.getElementById('v-id').value;
        if(id) document.getElementById('v-frame').src = "https://www.youtube.com/embed/" + id;
    }

    function addNot() {
        const t = document.getElementById('t-not').value;
        if(!t) return;
        document.getElementById('lista-not').insertAdjacentHTML('afterbegin', `<div class="p-2 border-bottom mb-2 bg-white"><b>${t}</b></div>`);
        document.getElementById('t-not').value="";
    }

    function addCum() {
        const n = document.getElementById('c-nom').value;
        if(!n) return;
        document.getElementById('lista-cum').insertAdjacentHTML('afterbegin', `<div class="cumple-item"><span>🎂 ${n}</span></div>`);
        document.getElementById('c-nom').value="";
    }

    function addLib() {
        const t = document.getElementById('l-tit').value, u = document.getElementById('l-url').value;
        if(!t || !u) return;
        document.getElementById('lista-lib').insertAdjacentHTML('afterbegin', `<div class="p-2 border-bottom"><a href="${u}" target="_blank">${t}</a></div>`);
    }

    function mon(v) {
        const m = parseFloat(document.getElementById('c-mon').value);
        if(!m) return;
        total += (m * v);
        document.getElementById('s-bs').innerText = "Bs. " + total.toFixed(2);
        document.getElementById('lista-inv').insertAdjacentHTML('afterbegin', `<div>${document.getElementById('c-det').value}: ${m*v}</div>`);
    }
</script>
</body>
    </html>
