<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Neon Kart 2D - Pro Version</title>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #333; box-shadow: 0 0 30px #ff00ff55; background: #000; cursor: crosshair; }
        .hud { position: absolute; top: 20px; width: 760px; display: flex; justify-content: space-between; font-size: 24px; text-shadow: 0 0 10px #0ff; pointer-events: none; }
        .inst { margin-top: 15px; color: #888; }
    </style>
</head>
<body>

    <div class="hud">
        <div>VUELTA: <span id="lap">0/3</span></div>
        <div>VELOCIDAD: <span id="speed">0</span> km/h</div>
    </div>
    
    <canvas id="kartCanvas"></canvas>
    
    <div class="inst">Usa las <b>Flechas</b> para conducir | Evita los muros oscuros</div>

<script>
    const canvas = document.getElementById('kartCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 600;

    const kart = {
        x: 400, y: 500,
        angle: -Math.PI / 2,
        speed: 0,
        accel: 0.2,
        decel: 0.96, // Fricción
        maxSpeed: 7,
        turnSpeed: 0.05,
        width: 20, height: 30,
        color: '#ff00ff'
    };

    const keys = {};
    let laps = 0;
    let checkpointPassed = false;

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    // --- EL CIRCUITO (DIBUJO) ---
    function drawTrack() {
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 80;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        // Circuito ovalado con curvas
        ctx.arc(400, 300, 200, 0, Math.PI * 2);
        ctx.stroke();

        // Meta
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(400, 460);
        ctx.lineTo(400, 540);
        ctx.stroke();
    }

    function checkOnTrack(x, y) {
        // Lógica simple: ¿está el kart dentro del anillo del circuito?
        const dx = x - 400;
        const dy = y - 300;
        const dist = Math.sqrt(dx*dx + dy*dy);
        return dist > 160 && dist < 240;
    }

    function update() {
        // Acelerar / Frenar
        if (keys['ArrowUp']) kart.speed += kart.accel;
        if (keys['ArrowDown']) kart.speed -= kart.accel;

        // Fricción constante
        kart.speed *= kart.decel;

        // Limitar velocidad
        if (kart.speed > kart.maxSpeed) kart.speed = kart.maxSpeed;
        if (kart.speed < -kart.maxSpeed / 2) kart.speed = -kart.maxSpeed / 2;

        // Giro (solo si se mueve)
        if (Math.abs(kart.speed) > 0.1) {
            const direction = kart.speed > 0 ? 1 : -1;
            if (keys['ArrowLeft']) kart.angle -= kart.turnSpeed * direction;
            if (keys['ArrowRight']) kart.angle += kart.turnSpeed * direction;
        }

        // Movimiento
        const nx = kart.x + Math.cos(kart.angle) * kart.speed;
        const ny = kart.y + Math.sin(kart.angle) * kart.speed;

        // Colisión con bordes de pista
        if (checkOnTrack(nx, ny)) {
            kart.x = nx;
            kart.y = ny;
        } else {
            kart.speed *= 0.5; // Chocar te frena
        }

        // Sistema de Vueltas (Meta en x=400, y > 460)
        if (kart.x > 390 && kart.x < 410 && kart.y > 400) {
            if (checkpointPassed) {
                laps++;
                document.getElementById('lap').innerText = `${laps}/3`;
                checkpointPassed = false;
                if(laps >= 3) alert("¡VICTORIA! Eres el rey de la pista.");
            }
        }
        // Checkpoint al otro lado (para evitar trampas)
        if (kart.x > 390 && kart.x < 410 && kart.y < 200) checkpointPassed = true;

        document.getElementById('speed').innerText = Math.round(Math.abs(kart.speed) * 20);
    }

    function draw() {
        // Limpiar
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawTrack();

        // Dibujar Kart
        ctx.save();
        ctx.translate(kart.x, kart.y);
        ctx.rotate(kart.angle);
        
        // Sombra neón
        ctx.shadowBlur = 15;
        ctx.shadowColor = kart.color;
        
        // Cuerpo del Kart
        ctx.fillStyle = kart.color;
        ctx.fillRect(-kart.height/2, -kart.width/2, kart.height, kart.width);
        
        // Dirección (frente)
        ctx.fillStyle = '#fff';
        ctx.fillRect(5, -kart.width/2, 10, kart.width);
        
        ctx.restore();
    }

    function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    gameLoop();
</script>
</body>
</html>
