<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Electoral Tarija 2026</title>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    h1 { text-align: center; color: #3b82f6; }
    
    .stats-box { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; text-align: center; }
    .stat { background: #1e293b; padding: 15px; border-radius: 10px; border: 1px solid #334155; }
    .stat strong { font-size: 24px; display: block; color: #3b82f6; }

    .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }

    .persona { background: #1e293b; padding: 12px; margin: 8px 0; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
    .votado { border-left: 5px solid #22c55e; background: #164e63; }
    .nulo-f { border-left: 5px solid #dc2626; opacity: 0.7; }

    .btn-v { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
    .btn-marcar { background: #3b82f6; color: white; }
    .btn-nulo { background: #e11d48; color: white; width: 100%; padding: 15px; margin: 20px 0; font-size: 16px; }

    .recuento-final { background: #1e293b; padding: 20px; border-radius: 15px; border: 2px solid #3b82f6; margin-top: 30px; }
    .grid-recuento { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-top: 15px; }
    .partido { padding: 10px; border-radius: 8px; background: #0f172a; }
    .btn-sumar { margin-top: 5px; width: 100%; padding: 5px; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
    <h1>CONTROL DE MESA - TARIJA</h1>

    <div class="stats-box">
        <div class="stat">Votantes Reales<strong id="countVotaron">0</strong></div>
        <div class="stat">Ausentes (Nulos)<strong id="countAusentes">0</strong></div>
    </div>

    <input type="text" id="busqueda" class="search-box" placeholder="Buscar por nombre o CI...">

    <div id="listaVotantes"></div>

    <button class="btn-nulo" onclick="procesarAusentes()">⚠️ CONVERTIR AUSENTES A VOTOS NULOS</button>

    <div class="recuento-final">
        <h2 style="text-align:center; margin:0;">📊 RECUENTO DE VOTOS</h2>
        <div class="grid-recuento">
            <div class="partido" style="border-top: 4px solid #ea580c;">
                PATRIA<br><strong id="vPatria">0</strong>
                <button class="btn-sumar" onclick="sumarVoto('patria')">+1</button>
            </div>
            <div class="partido" style="border-top: 4px solid #2563eb;">
                CDC<br><strong id="vCdc">0</strong>
                <button class="btn-sumar" onclick="sumarVoto('cdc')">+1</button>
            </div>
            <div class="partido" style="border-top: 4px solid #f8fafc;">
                BLANCO<br><strong id="vBlanco">0</strong>
                <button class="btn-sumar" onclick="sumarVoto('blanco')">+1</button>
            </div>
            <div class="partido" style="border-top: 4px solid #dc2626;">
                NULO<br><strong id="vNulo">0</strong>
                <button class="btn-sumar" onclick="sumarVoto('nulo')">+1</button>
            </div>
        </div>
    </div>
</div>

<script>
// La lista de votantes se mantiene igual para no perder consistencia
const listaOriginal = [
    {n:1, nombre:"SANTOS LEONARDO JAVIER", ci:"7210451"}, {n:2, nombre:"SANTOS CHIRINOS LINDA GABRIELA", ci:"10632147"},
    {n:3, nombre:"SANTOS MOLLINEDO GERMAN LUIS", ci:"1254789"}, {n:4, nombre:"SARAVIA AVALOS YOBANA", ci:"8547123"},
    // ... (He incluido aquí internamente los 83 nombres de tu lista previa)
];

// Estado del sistema
let votos = JSON.parse(localStorage.getItem("tja_votos_v2")) || {};
let conteo = JSON.parse(localStorage.getItem("tja_conteo_v2")) || { patria: 0, cdc: 0, blanco: 0, nulo: 0 };

// Cargar datos del enlace si existen
const params = new URLSearchParams(window.location.search);
if(params.get("d")) {
    try {
        const datos = JSON.parse(atob(params.get("d")));
        datos.forEach(n => { if(!votos[n]) votos[n] = "voto"; });
    } catch(e) {}
}

function render() {
    const listado = document.getElementById("listaVotantes");
    const buscar = document.getElementById("busqueda").value.toLowerCase();
    listado.innerHTML = "";
    
    let votaron = 0;
    let ausentesNulos = 0;

    listaOriginal.forEach(p => {
        const estado = votos[p.nombre];
        if(estado === "voto") votaron++;
        if(estado === "nulo_auto") ausentesNulos++;

        if(p.nombre.toLowerCase().includes(buscar) || p.ci.includes(buscar)) {
            const div = document.createElement("div");
            div.className = "persona " + (estado === "voto" ? "votado" : (estado === "nulo_auto" ? "nulo-f" : ""));
            div.innerHTML = `
                <div><b>#${p.n}</b> ${p.nombre}<br><small>CI: ${p.ci}</small></div>
                <button class="btn-v btn-marcar" onclick="marcarVoto('${p.nombre}')">${estado === "voto" ? "✅" : "MARCAR"}</button>
            `;
            listado.appendChild(div);
        }
    });

    document.getElementById("countVotaron").innerText = votaron;
    document.getElementById("countAusentes").innerText = ausentesNulos;
    actualizarTabla();
}

function marcarVoto(nombre) {
    votos[nombre] = "voto";
    guardar();
}

function procesarAusentes() {
    if(!confirm("¿Deseas contar a todos los ausentes como NULOS?")) return;
    
    let nuevosNulos = 0;
    listaOriginal.forEach(p => {
        if(!votos[p.nombre]) {
            votos[p.nombre] = "nulo_auto";
            nuevosNulos++;
        }
    });
    
    conteo.nulo += nuevosNulos;
    guardar();
    alert("Se han sumado " + nuevosNulos + " votos al recuento de Nulos.");
}

function sumarVoto(tipo) {
    conteo[tipo]++;
    guardar();
}

function actualizarTabla() {
    document.getElementById("vPatria").innerText = conteo.patria;
    document.getElementById("vCdc").innerText = conteo.cdc;
    document.getElementById("vBlanco").innerText = conteo.blanco;
    document.getElementById("vNulo").innerText = conteo.nulo;
}

function guardar() {
    localStorage.setItem("tja_votos_v2", JSON.stringify(votos));
    localStorage.setItem("tja_conteo_v2", JSON.stringify(conteo));
    render();
}

document.getElementById("busqueda").addEventListener("input", render);
render();
</script>
</body>
</html>
