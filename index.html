<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Votación - Completo</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}
h1 {
    text-align: center;
}
input {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    margin-bottom: 15px;
}
.persona {
    background: #1e293b;
    padding: 10px;
    margin: 5px 0;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
}
button {
    background: #22c55e;
    border: none;
    padding: 5px 10px;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}
.votado { background: #16a34a !important; }
.nulo { background: #dc2626 !important; }
.stats {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>🗳️ Control de Votación</h1>

<input type="text" id="buscar" placeholder="Buscar por apellido...">

<div id="lista"></div>

<div class="stats">
    ✅ Ya votaron: <span id="votaron">0</span><br>
    ❌ Nulos: <span id="nulos">0</span><br>
    ⏳ Faltan: <span id="faltan">0</span>
</div>

<script>

"ZENTENO GALLARDO OLIVER GERMAN",
"ZENTENO ORTIZ JHONNY EDUARDO",
"ZENTENO YEVARA WILLAN LUCIO",
"ZUBIETA MANCILLA YAZMIN"
];

let estado = JSON.parse(localStorage.getItem("votos")) || {};

const lista = document.getElementById("lista");
const buscar = document.getElementById("buscar");

function esHoraCierre() {
    return new Date().getHours() >= 16;
}

function render(filtro="") {
    lista.innerHTML = "";

    let votaron = 0;
    let nulos = 0;

    personas.forEach(nombre => {

        if(esHoraCierre() && !estado[nombre]) {
            estado[nombre] = "nulo";
        }

        if(estado[nombre] === true) votaron++;
        if(estado[nombre] === "nulo") nulos++;

        if(nombre.toLowerCase().includes(filtro.toLowerCase())) {
            const div = document.createElement("div");
            div.className = "persona";

            if(estado[nombre] === true) div.classList.add("votado");
            if(estado[nombre] === "nulo") div.classList.add("nulo");

            div.innerHTML = `
                <span>${nombre}</span>
                <button onclick="marcar('${nombre}')">
                    ${estado[nombre] ? "✔️" : "Marcar"}
                </button>
            `;

            lista.appendChild(div);
        }
    });

    localStorage.setItem("votos", JSON.stringify(estado));

    document.getElementById("votaron").innerText = votaron;
    document.getElementById("nulos").innerText = nulos;
    document.getElementById("faltan").innerText = personas.length - votaron - nulos;
}

function marcar(nombre) {
    estado[nombre] = true;
    localStorage.setItem("votos", JSON.stringify(estado));
    render(buscar.value);
}

buscar.addEventListener("input", e => render(e.target.value));

render();

</script>

</body>
</html>
