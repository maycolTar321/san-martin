<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catequesis PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
padding:20px;
}

.box{
background:#1e293b;
padding:25px;
border-radius:15px;
width:100%;
max-width:350px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
color:#38bdf8;
}

.msg{
text-align:center;
margin-top:10px;
color:#f87171;
}

/* APP */
#app{display:none;}

.sidebar{
position:fixed;
width:200px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar button{
display:block;
width:100%;
padding:10px;
background:none;
border:none;
color:white;
text-align:left;
}

.main{
margin-left:200px;
padding:20px;
}

.section{display:none;}
.active{display:block;}

.card{
background:#1e293b;
padding:10px;
margin:10px 0;
border-radius:10px;
}

@media(max-width:768px){
.sidebar{
position:relative;
width:100%;
display:flex;
}
.main{margin-left:0;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView" class="container">
<div class="box">
<h2>Login</h2>

<input id="loginEmail" placeholder="Correo">
<input id="loginPass" type="password" placeholder="Contraseña">

<button onclick="loginUser()">Ingresar</button>

<div class="link" onclick="showRegister()">Crear cuenta</div>

<p id="loginMsg" class="msg"></p>
</div>
</div>

<!-- REGISTRO -->
<div id="registerView" class="container" style="display:none;">
<div class="box">
<h2>Registro</h2>

<input id="regNombre" placeholder="Nombre completo">
<input id="regCel" placeholder="Celular">
<input id="regEmail" placeholder="Correo">
<input id="regPass" type="password" placeholder="Contraseña">

<label>¿Cuánto es 3 + 4?</label>
<input id="regCaptcha">

<button onclick="registerUser()">Registrar</button>

<div class="link" onclick="showLogin()">Volver</div>

<p id="regMsg" class="msg"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="sidebar">
<button onclick="showSection('dashboard')">Dashboard</button>
<button onclick="showSection('grupos')">Grupos</button>
<button onclick="logout()">Salir</button>
</div>

<div class="main">

<div id="dashboard" class="section active">
<h2>Bienvenido</h2>
</div>

<div id="grupos" class="section">
<input id="grupoNombre" placeholder="Nombre grupo">
<button onclick="addGrupo()">Crear</button>
<div id="listaGrupos"></div>
</div>

</div>
</div>

<script>

// BASE DATOS
let db = JSON.parse(localStorage.getItem("db")) || {
users:[],
grupos:[]
};

function saveDB(){
localStorage.setItem("db", JSON.stringify(db));
}

// VISTAS
function showRegister(){
document.getElementById("loginView").style.display="none";
document.getElementById("registerView").style.display="flex";
}

function showLogin(){
document.getElementById("registerView").style.display="none";
document.getElementById("loginView").style.display="flex";
}

// REGISTRO
function registerUser(){

let nombre = document.getElementById("regNombre").value;
let cel = document.getElementById("regCel").value;
let email = document.getElementById("regEmail").value;
let pass = document.getElementById("regPass").value;
let captcha = document.getElementById("regCaptcha").value;

if(captcha !== "7"){
document.getElementById("regMsg").innerText="Captcha incorrecto";
return;
}

if(!nombre || !email || !pass){
document.getElementById("regMsg").innerText="Completa los datos";
return;
}

let existe = db.users.find(u => u.email === email);
if(existe){
document.getElementById("regMsg").innerText="Correo ya registrado";
return;
}

db.users.push({nombre,cel,email,pass});
saveDB();

document.getElementById("regMsg").style.color="#22c55e";
document.getElementById("regMsg").innerText="Cuenta creada";

setTimeout(()=>{
showLogin();
},1500);
}

// LOGIN
function loginUser(){

let email = document.getElementById("loginEmail").value;
let pass = document.getElementById("loginPass").value;

let user = db.users.find(u => u.email === email && u.pass === pass);

if(user){
localStorage.setItem("session", email);
loadApp();
}else{
document.getElementById("loginMsg").innerText="Datos incorrectos";
}
}

// APP
function loadApp(){
document.getElementById("loginView").style.display="none";
document.getElementById("registerView").style.display="none";
document.getElementById("app").style.display="block";
render();
}

function logout(){
localStorage.removeItem("session");
location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("session")){
loadApp();
}

// SECCIONES
function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// GRUPOS
function addGrupo(){
let nombre = document.getElementById("grupoNombre").value;
if(!nombre) return;

db.grupos.push({nombre});
saveDB();
render();
}

// RENDER
function render(){
let cont = document.getElementById("listaGrupos");
cont.innerHTML = db.grupos.map(g=>`<div class="card">${g.nombre}</div>`).join("");
}

</script>

</body>
</html>
