<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 CATEQUISTAS DIJERON - FIX</title>
    <style>
        :root { --azul-fondo: #001a33; --dorado: #ffcc00; --azul-card: linear-gradient(180deg, #005eff, #003399); --rojo: #ff0000; }
        body { background-color: var(--azul-fondo); color: white; font-family: 'Arial Black', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        #selector { position: fixed; top:0; width: 100%; height: 100%; background: var(--azul-fondo); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        
        .view { display: none; width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        #pregunta-txt { color: var(--dorado); font-size: 1.8rem; text-shadow: 2px 2px #000; min-height: 80px; margin: 10px 0; }
        
        .x-container { height: 80px; display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .x-mark { font-size: 70px; color: var(--rojo); display: none; text-shadow: 3px 3px #000; }

        .board { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card { background: linear-gradient(180deg, #333, #111); border: 3px solid var(--dorado); height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; }
        .card.revealed { background: var(--azul-card); border-color: white; transform: rotateX(360deg); transition: 0.6s; }
        .card .content { display: none; width: 100%; padding: 0 20px; justify-content: space-between; font-size: 18px; }
        .card.revealed .content { display: flex; }
        .card.revealed .num { display: none; }

        .admin-btn { width: 100%; background: #222; color: white; border: 1px solid #444; padding: 15px; margin: 5px 0; border-radius: 10px; text-align: left; font-size: 14px; }
        .btn-main { padding: 20px; border-radius: 10px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; width: 80%; }
        
        .emoji { position: fixed; font-size: 60px; pointer-events: none; animation: fly 1s forwards; opacity: 0; z-index: 50; }
        @keyframes fly { 0% { bottom: 0; opacity: 1; } 100% { bottom: 80%; opacity: 0; } }
    </style>
</head>
<body>

    <div id="selector">
        <h2 style="color:var(--dorado)">ELIGE TU PANTALLA</h2>
        <button class="btn-main" style="background:var(--azul-card); color:white;" onclick="setMode('player')">MODO JUGADOR (PROYECTOR)</button>
        <button class="btn-main" style="background:var(--dorado);" onclick="setMode('admin')">MODO ADMIN (CONTROL)</button>
        <p style="font-size: 12px; color: #888;">Nota: Debes abrir el mismo link en ambos.</p>
    </div>

    <div class="view" id="pv">
        <h2 id="pregunta-txt">ESPERANDO AL LÍDER...</h2>
        <div class="x-container">
            <div id="px1" class="x-mark">X</div>
            <div id="px2" class="x-mark">X</div>
            <div id="px3" class="x-mark">X</div>
        </div>
        <div class="board" id="player-board"></div>
    </div>

    <div class="view" id="av">
        <h3 style="color:var(--dorado)">CONTROL DE PREGUNTAS</h3>
        <div id="admin-board"></div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button class="btn-main" style="background:var(--rojo); color:white;" onclick="doAction('error')">¡ERROR!</button>
            <button class="btn-main" style="background:var(--dorado);" onclick="doAction('next')">SIGUIENTE</button>
        </div>
    </div>

    <audio id="s-ok" src="https://www.myinstants.com/media/sounds/ding-sound-effect_2.mp3"></audio>
    <audio id="s-no" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        const datos = [
            { q: "¿Qué llevaron los Reyes Magos?", a: [{t:"ORO",p:40},{t:"INCIENSO",p:35},{t:"MIRRA",p:25}] },
            { q: "¿Cuántos evangelios hay?", a: [{t:"MATEO",p:25},{t:"MARCOS",p:25},{t:"LUCAS",p:25},{t:"JUAN",p:25}] }
        ];

        let localState = { level: 0, rev: [], err: 0 };

        function setMode(m) {
            document.getElementById('selector').style.display = 'none';
            document.getElementById(m == 'player' ? 'pv' : 'av').style.display = 'block';
            
            // Inicializar estado si no existe
            if(!localStorage.getItem('gs')) {
                localStorage.setItem('gs', JSON.stringify(localState));
            }

            if(m == 'player') {
                window.addEventListener('storage', () => sync());
                sync();
            } else {
                updateAdmin();
            }
        }

        function doAction(type, val = null) {
            let s = JSON.parse(localStorage.getItem('gs'));
            if(type == 'rev') { if(!s.rev.includes(val)) s.rev.push(val); }
            if(type == 'error') s.err++;
            if(type == 'next') { s.level++; s.rev = []; s.err = 0; }
            if(s.level >= datos.length) s.level = 0;

            localStorage.setItem('gs', JSON.stringify(s));
            localStorage.setItem('last_cmd', type + "_" + Date.now()); 
            updateAdmin();
        }

        function sync() {
            const s = JSON.parse(localStorage.getItem('gs'));
            const lvl = datos[s.level];
            document.getElementById('pregunta-txt').innerText = lvl.q;
            
            const cmd = localStorage.getItem('last_cmd') || "";
            if(cmd.includes('rev')) { document.getElementById('s-ok').play(); popEmoji("👍"); }
            if(cmd.includes('error')) { document.getElementById('s-no').play(); popEmoji("👎"); }

            const pb = document.getElementById('player-board');
            pb.innerHTML = '';
            lvl.a.forEach((item, i) => {
                const isR = s.rev.includes(i);
                pb.innerHTML += `<div class="card ${isR?'revealed':''}">
                    <div class="num">${i+1}</div>
                    <div class="content"><span>${item.t}</span><span>${item.p}</span></div>
                </div>`;
            });

            for(let i=1; i<=3; i++) document.getElementById('px'+i).style.display = (s.err >= i) ? 'block' : 'none';
        }

        function updateAdmin() {
            const s = JSON.parse(localStorage.getItem('gs'));
            const lvl = datos[s.level];
            const ab = document.getElementById('admin-board');
            ab.innerHTML = `<p>${lvl.q}</p>`;
            lvl.a.forEach((item, i) => {
                const isR = s.rev.includes(i);
                ab.innerHTML += `<button class="admin-btn" style="${isR?'opacity:0.4':''}" onclick="doAction('rev', ${i})">${i+1}. ${item.t} (${item.p})</button>`;
            });
        }

        function popEmoji(e) {
            const div = document.createElement('div');
            div.className = 'emoji';
            div.innerText = e;
            div.style.left = (Math.random() * 60 + 20) + "%";
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 1000);
        }

        // Desbloquear audio al primer toque
        document.addEventListener('click', () => { 
            document.getElementById('s-ok').load(); 
            document.getElementById('s-no').load(); 
        }, {once: true});
    </script>
</body>
</html>
