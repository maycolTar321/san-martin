<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CATEQUESIS TARIJA V13</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --gold: #ffd600; }
        body { background: #f4f7f9; font-family: sans-serif; padding-bottom: 80px; }
        .app-header { background: var(--blue); color: white; padding: 20px; border-bottom: 5px solid var(--gold); border-radius: 0 0 30px 30px; text-align: center; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 10px; background: white; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); z-index: 1000; }
        .nav-item { text-align: center; color: #bbb; flex: 1; font-size: 11px; cursor: pointer; }
        .nav-item.active { color: var(--blue); font-weight: bold; }
        .nav-item i { font-size: 20px; display: block; }
        .admin-only, .cate-only, .hidden { display: none !important; }
        .btn-del { color: #dc3545; cursor: pointer; }
        .cumple-item { background: #fff9c4; padding: 10px; border-radius: 10px; margin-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="login-screen" style="position:fixed; inset:0; background:var(--blue); z-index:9999; display:flex; align-items:center; justify-content:center;">
    <div class="card p-4 text-center" style="width:90%; max-width:350px;">
        <h4 class="fw-bold mb-3" style="color:var(--blue)">✝️ MISIÓN TARIJA</h4>
        <select id="rol-select" class="form-select mb-3" onchange="document.getElementById('p-box').classList.toggle('hidden', this.value=='Joven')">
            <option value="Joven">Modo Joven</option>
            <option value="Maycol">Maycol (Admin)</option>
            <option value="Yoselin">Yose (Admin)</option>
            <option value="Catequista">Catequista</option>
        </select>
        <div id="p-box" class="hidden"><input type="password" id="p-pass" class="form-control mb-3" placeholder="Contraseña"></div>
        <button onclick="entrar()" class="btn btn-primary w-100 fw-bold">INGRESAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header"><h5 class="fw-bold m-0">CATEQUESIS TARIJA</h5><div id="u-tag" class="badge bg-light text-dark mt-2"></div></div>

    <div id="sec-home" class="seccion p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">Comunicados</h6>
            <div class="admin-only mb-2">
                <input type="text" id="t-not" class="form-control mb-1" placeholder="Título">
                <textarea id="m-not" class="form-control mb-1" placeholder="Mensaje"></textarea>
                <div class="d-flex gap-2">
                    <button onclick="addNot()" class="btn btn-primary btn-sm w-100">Publicar</button>
                    <button onclick="wsNot()" class="btn btn-success btn-sm"><i class="bi bi-whatsapp"></i></button>
                </div>
            </div>
            <div id="lista-not"></div>
        </div>

        <div class="card p-3">
            <h6 class="fw-bold text-warning">🎂 Cumpleaños</h6>
            <div class="cate-only mb-2">
                <input type="text" id="c-nom" class="form-control mb-1" placeholder="Tu Nombre">
                <input type="date" id="c-fec" class="form-control mb-1">
                <button onclick="addCum()" class="btn btn-warning btn-sm w-100">Registrarme</button>
            </div>
            <div id="lista-cum"></div>
        </div>
    </div>

    <div id="sec-lib" class="seccion hidden p-2">
        <div class="card p-3">
            <h6 class="fw-bold text-primary">Biblioteca Virtual</h6>
            <div class="admin-only mb-2">
                <input type="text" id="l-tit" class="form-control mb-1" placeholder="Nombre">
                <input type="text" id="l-url" class="form-control mb-1" placeholder="Link">
                <button onclick="addLib()" class="btn btn-primary btn-sm w-100">Subir</button>
            </div>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden p-2 admin-only">
        <div class="card p-4 bg-primary text-white text-center">
            <small>SALDO</small><h2 id="s-bs">Bs. 0.00</h2>
            <button class="btn btn-light btn-sm" onclick="rep()">Reporte .txt</button>
        </div>
        <div class="card p-3">
            <input type="number" id="c-mon" class="form-control mb-1" placeholder="Bs.">
            <input type="text" id="c-det" class="form-control mb-2" placeholder="Detalle/Inventario">
            <div class="d-flex gap-2 mb-2">
                <button onclick="mon(1)" class="btn btn-success w-100">Ingreso</button>
                <button onclick="mon(-1)" class="btn btn-danger w-100">Egreso</button>
            </div>
            <div id="lista-inv" class="small"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-house"></i>Inicio</div>
        <div onclick="tab('lib')" id="n-lib" class="nav-item"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-cash-coin"></i>Caja</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    let total = 0;

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const pass = document.getElementById('p-pass').value;
        if(r === "Joven") run("JOVEN", 0, 0);
        else if(pass === P[r] || (r==="Maycol" && pass===P["Maycol"])) run(r, r!=="Catequista", 1);
        else alert("Error");
    }

    function run(t, a, c) {
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = t;
        if(a) document.querySelectorAll('.admin-only').forEach(e => e.style.setProperty('display','block','important'));
        if(c) document.querySelectorAll('.cate-only').forEach(e => e.style.setProperty('display','block','important'));
    }

    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('sec-'+id).classList.remove('hidden');
        document.getElementById('n-'+id).classList.add('active');
    }

    function addNot() {
        const t = document.getElementById('t-not').value, m = document.getElementById('m-not').value;
        if(!t) return;
        const id = "n"+Date.now();
        document.getElementById('lista-not').insertAdjacentHTML('afterbegin', `<div class="p-2 border-bottom" id="${id}"><b>${t}</b> <i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i><br><small>${m}</small></div>`);
        document.getElementById('t-not').value=""; document.getElementById('m-not').value="";
    }

    function wsNot() {
        const t = document.getElementById('t-not').value, m = document.getElementById('m-not').value;
        window.open(`https://wa.me/?text=${encodeURIComponent("*"+t+"*\n"+m)}`);
    }

    function addCum() {
        const n = document.getElementById('c-nom').value, f = document.getElementById('c-fec').value;
        if(!n || !f) return;
        const id = "c"+Date.now();
        document.getElementById('lista-cum').insertAdjacentHTML('afterbegin', `<div class="cumple-item" id="${id}"><span>🎂 <b>${n}</b> (${f})</span><div><i class="bi bi-whatsapp text-success me-2 admin-only" onclick="fel('${n}')"></i><i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i></div></div>`);
        document.getElementById('c-nom').value="";
    }

    function fel(n) { window.open(`https://wa.me/?text=${encodeURIComponent("🎉 ¡Feliz Cumple "+n+"! Dios te bendiga ✝️")}`); }

    function addLib() {
        const t = document.getElementById('l-tit').value, u = document.getElementById('l-url').value;
        const id = "l"+Date.now();
        document.getElementById('lista-lib').insertAdjacentHTML('afterbegin', `<div class="d-flex justify-content-between p-2 border-bottom" id="${id}"><a href="${u}" target="_blank" class="text-dark small">${t}</a><i class="bi bi-trash btn-del admin-only" onclick="document.getElementById('${id}').remove()"></i></div>`);
    }

    function mon(v) {
        const m = parseFloat(document.getElementById('c-mon').value), d = document.getElementById('c-det').value;
        if(!m) return;
        total += (m * v);
        document.getElementById('s-bs').innerText = "Bs. " + total.toFixed(2);
        document.getElementById('lista-inv').insertAdjacentHTML('afterbegin', `<div>${d}: ${m*v}</div>`);
    }

    function rep() {
        const blob = new Blob(["REPORTE TARIJA\nSaldo: " + total], {type:"text/plain"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "reporte.txt"; a.click();
    }
</script>
</body>
</html>
