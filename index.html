<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100 Catequistas Dijeron</title>
    <style>
        :root {
            --azul-oscuro: #003366;
            --dorado: #ffd700;
            --rojo-error: #ff0000;
        }

        body {
            background-color: var(--azul-oscuro);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { color: var(--dorado); text-shadow: 2px 2px #000; }

        /* Contenedor de Errores */
        #error-container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            height: 100px;
        }

        .x-mark {
            font-size: 80px;
            color: var(--rojo-error);
            visibility: hidden;
            text-shadow: 3px 3px #000;
        }

        /* Tablero de Respuestas */
        #board {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: linear-gradient(180deg, #222, #444);
            border: 3px solid var(--dorado);
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            border-radius: 8px;
        }

        .card .content {
            visibility: hidden; /* Oculto por defecto */
            display: flex;
            width: 100%;
            justify-content: space-between;
        }

        .card.revealed .content {
            visibility: visible;
        }

        .card.revealed {
            background: linear-gradient(180deg, #0055ff, #0022aa);
        }

        .card .number {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .card.revealed .number {
            display: none;
        }

        /* Botones de Control */
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            border: none;
        }

        .btn-error { background-color: var(--rojo-error); color: white; }
        .btn-next { background-color: var(--dorado); color: black; }
    </style>
</head>
<body>

    <h1 id="pregunta-titulo">Cargando pregunta...</h1>

    <div id="error-container">
        <div class="x-mark" id="x1">X</div>
        <div class="x-mark" id="x2">X</div>
        <div class="x-mark" id="x3">X</div>
    </div>

    <div id="board">
        </div>

    <div class="controls">
        <button class="btn-error" onclick="marcarError()">¡ERROR (X)!</button>
        <button class="btn-next" onclick="siguienteNivel()">Siguiente Nivel</button>
    </div>

    <audio id="snd-acierto" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="snd-error" src="https://www.myinstants.com/media/sounds/family-feud-buzzer.mp3"></audio>

    <script>
        const bancoPreguntas = [
            {
                pregunta: "¿Cuántos evangelios hay?",
                respuestas: [
                    { texto: "Mateo", puntos: 25 },
                    { texto: "Marcos", puntos: 25 },
                    { texto: "Lucas", puntos: 25 },
                    { texto: "Juan", puntos: 25 }
                ]
            },
            {
                pregunta: "Menciona un Sacramento",
                respuestas: [
                    { texto: "Bautismo", puntos: 40 },
                    { texto: "Eucaristía", puntos: 30 },
                    { texto: "Confirmación", puntos: 20 },
                    { texto: "Confesión", puntos: 10 }
                ]
            }
        ];

        let nivelActual = 0;
        let errores = 0;

        function cargarTablero() {
            const data = bancoPreguntas[nivelActual];
            document.getElementById('pregunta-titulo').innerText = data.pregunta;
            const board = document.getElementById('board');
            board.innerHTML = '';
            errores = 0;
            resetErrores();

            data.respuestas.forEach((r, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="number">${index + 1}</div>
                    <div class="content">
                        <span>${r.texto}</span>
                        <span>${r.puntos}</span>
                    </div>
                `;
                card.onclick = () => revelar(card);
                board.appendChild(card);
            });
        }

        function revelar(elemento) {
            if (!elemento.classList.contains('revealed')) {
                elemento.classList.add('revealed');
                document.getElementById('snd-acierto').play();
            }
        }

        function marcarError() {
            if (errores < 3) {
                errores++;
                document.getElementById(`x${errores}`).style.visibility = 'visible';
                document.getElementById('snd-error').play();
            }
        }

        function resetErrores() {
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`x${i}`).style.visibility = 'hidden';
            }
        }

        function siguienteNivel() {
            nivelActual++;
            if (nivelActual < bancoPreguntas.length) {
                cargarTablero();
            } else {
                alert("¡Fin del juego!");
                nivelActual = 0;
                cargarTablero();
            }
        }

        // Iniciar el juego
        window.onload = cargarTablero;
    </script>
</body>
</html>
