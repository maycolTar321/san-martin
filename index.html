<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA TOTAL - CATEQUESIS TARIJA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --blue: #1a237e; --blue-light: #303f9f; --gold: #ffd600; --bg: #f4f7f9; }
        html, body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #app { height: 100vh; overflow-y: auto; padding-bottom: 120px; -webkit-overflow-scrolling: touch; }
        
        #login-screen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--blue), #000); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .app-header { background: var(--blue); color: white; padding: 30px 20px; border-bottom: 5px solid var(--gold); border-radius: 0 0 40px 40px; text-align: center; position: relative; }
        .logout-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: white; cursor: pointer; }

        .card { border-radius: 25px; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.06); margin: 15px; background: white; padding: 18px; }
        .section-title { font-weight: 800; color: var(--blue); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 12px 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); border-radius: 30px 30px 0 0; z-index: 1000; }
        .nav-item { text-align: center; color: #999; flex: 1; cursor: pointer; font-size: 9px; font-weight: 600; }
        .nav-item i { font-size: 1.4rem; display: block; }
        .nav-item.active { color: var(--blue); }

        .hidden { display: none !important; }
        
        .cat-card { border-left: 5px solid var(--gold); background: #f8f9fa; padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .wa-btn { background: #25d366; color: white; border-radius: 50%; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; text-decoration: none; }
        
        .media-card { border-radius: 15px; overflow: hidden; border: 1px solid #eee; margin-bottom: 15px; background: white; }
        .check-item { background: #fdfdfd; border: 1px solid #eee; padding: 10px; border-radius: 15px; margin-bottom: 8px; }
        .agenda-item { border-left: 4px solid var(--blue); background: #f0f2f5; margin-bottom: 10px; padding: 10px; border-radius: 10px; }
        .done { text-decoration: line-through; opacity: 0.6; }
        .msg-bubble { background: #e8eaf6; padding: 12px; border-radius: 15px 15px 15px 0; margin-bottom: 10px; border-left: 4px solid var(--blue-light); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="card text-center" style="width: 90%; max-width: 380px;">
        <h4 class="fw-bold mb-4">CATEQUESIS TARIJA</h4>
        <select id="rol-select" class="form-select mb-3 rounded-pill" onchange="document.getElementById('p-box').classList.toggle('hidden', this.value === 'Joven')">
            <option value="Joven">Soy Joven</option>
            <option value="Maycol">Maycol (Director)</option>
            <option value="Yoselin">Yoselin (Coordinadora)</option>
            <option value="Catequista">Catequista</option>
        </select>
        <div id="p-box" class="hidden mb-3">
            <input type="password" id="p-pass" class="form-control rounded-pill" placeholder="Contraseña">
        </div>
        <button onclick="entrar()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">ENTRAR</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="app-header">
        <div class="logout-btn" onclick="salir()"><i class="bi bi-power"></i></div>
        <h5 class="fw-bold mb-0">PANEL INTEGRAL</h5>
        <span id="u-tag" class="badge bg-warning text-dark mt-2"></span>
    </div>

    <div id="sec-home" class="seccion p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-megaphone"></i> Blog y Comunicados</h6>
            <div id="can-publish" class="hidden mb-3">
                <input type="text" id="m-tit" class="form-control mb-2" placeholder="Título">
                <input type="file" id="m-img-file" class="form-control mb-2" accept="image/*">
                <input type="text" id="m-url" class="form-control mb-2" placeholder="ID Video YouTube">
                <button onclick="addMedia()" class="btn btn-primary w-100 rounded-pill">Publicar</button>
            </div>
            <div id="lista-media"></div>
        </div>
    </div>

    <div id="sec-equipo" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-people"></i> Equipo y Grupos</h6>
            <div id="admin-equipo" class="hidden bg-light p-3 rounded-4 mb-3">
                <input type="text" id="cat-nom" class="form-control mb-1" placeholder="Nombre Catequista">
                <input type="number" id="cat-tel" class="form-control mb-1" placeholder="WhatsApp (sin 591)">
                <button onclick="addCate()" class="btn btn-dark btn-sm w-100 rounded-pill mb-3">Registrar Catequista</button>
                <input type="text" id="g-nom" class="form-control mb-1" placeholder="Nombre del Grupo">
                <select id="g-cat" class="form-select mb-2"></select>
                <button onclick="addGroup()" class="btn btn-primary btn-sm w-100 rounded-pill">Crear Grupo</button>
            </div>
            <div id="lista-equipo"></div>
            <hr>
            <div id="lista-grupos"></div>
        </div>
    </div>

    <div id="sec-asistencia" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-person-check"></i> Registro y Lista</h6>
            <div id="can-register-joven" class="hidden bg-light p-3 rounded-4 mb-3">
                <input type="text" id="j-nom-reg" class="form-control mb-1" placeholder="Nombre completo">
                <select id="j-grupo-reg" class="form-select mb-2"></select>
                <button onclick="addJoven()" class="btn btn-primary btn-sm w-100 rounded-pill">Inscribir Joven</button>
            </div>
            <select id="filtro-grupo" class="form-select mb-3 shadow-sm" onchange="actualizarListaJovenes()"></select>
            <div id="tabla-jovenes"></div>
        </div>
    </div>

    <div id="sec-agenda" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-calendar-check"></i> Agenda</h6>
            <div id="admin-agenda-form" class="hidden bg-light p-3 rounded-4 mb-3">
                <input type="text" id="a-task" class="form-control mb-2" placeholder="Pendiente...">
                <button onclick="addAgenda()" class="btn btn-primary w-100 rounded-pill btn-sm">Agregar</button>
            </div>
            <div id="lista-agenda"></div>
        </div>
    </div>

    <div id="sec-lib" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-book"></i> Biblioteca</h6>
            <div id="admin-lib" class="hidden mb-3">
                <input type="text" id="l-tit" class="form-control mb-2" placeholder="Nombre del Libro">
                <input type="text" id="l-url" class="form-control mb-2" placeholder="Link (Drive/PDF)">
                <button onclick="addLib()" class="btn btn-primary w-100 rounded-pill btn-sm">Subir</button>
            </div>
            <div id="lista-lib"></div>
        </div>
    </div>

    <div id="sec-adm" class="seccion hidden p-2">
        <div class="card bg-primary text-white text-center">
            <small>SALDO TOTAL</small>
            <h2 id="s-bs" class="fw-bold">Bs. 0.00</h2>
        </div>
        <div class="card">
            <input type="number" id="c-mon" class="form-control mb-2" placeholder="Monto">
            <input type="text" id="c-det" class="form-control mb-2" placeholder="Concepto">
            <div class="d-flex gap-2">
                <button onclick="mon(1)" class="btn btn-success w-100 rounded-pill">Ingreso</button>
                <button onclick="mon(-1)" class="btn btn-danger w-100 rounded-pill">Egreso</button>
            </div>
            <div id="lista-caja" class="mt-3 small" style="max-height: 100px; overflow: auto;"></div>
        </div>
        <div class="card">
            <h6 class="section-title"><i class="bi bi-box-seam"></i> Inventario</h6>
            <div class="d-flex gap-1 mb-2">
                <input type="text" id="i-item" class="form-control" placeholder="Item">
                <input type="number" id="i-cant" class="form-control" style="width: 70px;">
                <button onclick="addInv()" class="btn btn-dark">+</button>
            </div>
            <div id="lista-inv"></div>
        </div>
    </div>

    <div id="sec-msg" class="seccion hidden p-2">
        <div class="card">
            <h6 class="section-title"><i class="bi bi-chat-dots"></i> Chat</h6>
            <div id="lista-msg" style="max-height: 300px; overflow-y: auto;" class="mb-3"></div>
            <div class="input-group">
                <input type="text" id="j-msg" class="form-control" placeholder="Mensaje...">
                <button onclick="sendMsg()" class="btn btn-primary"><i class="bi bi-send"></i></button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div onclick="tab('home')" id="n-home" class="nav-item active"><i class="bi bi-megaphone"></i>Blog</div>
        <div onclick="tab('asistencia'); actualizarListaJovenes();" id="n-asistencia" class="nav-item"><i class="bi bi-person-check"></i>Lista</div>
        <div onclick="tab('agenda')" id="n-agenda" class="nav-item hidden-joven"><i class="bi bi-calendar-check"></i>Agenda</div>
        <div onclick="tab('lib')" id="n-lib" class="nav-item"><i class="bi bi-book"></i>Libros</div>
        <div onclick="tab('equipo')" id="n-equipo" class="nav-item"><i class="bi bi-people"></i>Equipo</div>
        <div onclick="tab('adm')" id="n-adm" class="nav-item admin-only"><i class="bi bi-gear"></i>Caja</div>
        <div onclick="tab('msg')" id="n-msg" class="nav-item"><i class="bi bi-chat-dots"></i>Chat</div>
    </div>
</div>

<script>
    const P = { "Maycol":"coord_2026", "Yoselin":"sub_tarija", "Catequista":"cate_2026" };
    let DATA = JSON.parse(localStorage.getItem('CATE_SISTEMA_TOTAL')) || {
        media: [], catequistas: [], grupos: [], libros: [], mensajes: [], caja: [], inventario: [], saldo: 0, jovenes: [], agenda: []
    };
    let userAct = "";

    function entrar() {
        const r = document.getElementById('rol-select').value;
        const p = document.getElementById('p-pass').value;
        if(r === "Joven" || p === P[r]) {
            localStorage.setItem('SESION_TOTAL', JSON.stringify({rol: r}));
            run(r);
        } else { alert("Clave Incorrecta"); }
    }

    function run(rol) {
        userAct = rol;
        document.getElementById('login-screen').style.display='none';
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('u-tag').innerText = rol.toUpperCase();

        // REINICIAR VISIBILIDAD
        document.querySelectorAll('.admin-only, .hidden-joven, #can-publish, #can-register-joven, #admin-equipo, #admin-agenda-form, #admin-lib').forEach(el => el.classList.add('hidden'));

        if(rol === 'Joven') {
            document.getElementById('n-adm').classList.add('hidden');
            document.getElementById('n-agenda').classList.add('hidden');
            // El joven puede elegir su grupo para ver la lista
            document.getElementById('filtro-grupo').classList.remove('hidden'); 
        } else {
            document.getElementById('can-publish').classList.remove('hidden');
            document.getElementById('can-register-joven').classList.remove('hidden');
            document.querySelectorAll('.hidden-joven').forEach(e => e.classList.remove('hidden'));
        }

        if(rol === 'Maycol' || rol === 'Yoselin') {
            document.getElementById('admin-equipo').classList.remove('hidden');
            document.getElementById('admin-agenda-form').classList.remove('hidden');
            document.getElementById('admin-lib').classList.remove('hidden');
            document.querySelectorAll('.admin-only').forEach(e => e.classList.remove('hidden'));
        }
        actualizarTodo();
    }

    function salir() { localStorage.removeItem('SESION_TOTAL'); location.reload(); }

    function tab(id) {
        document.querySelectorAll('.seccion').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const target = document.getElementById('sec-'+id);
        if(target) target.classList.remove('hidden');
        const nav = document.getElementById('n-'+id);
        if(nav) nav.classList.add('active');
    }

    function save() {
        localStorage.setItem('CATE_SISTEMA_TOTAL', JSON.stringify(DATA));
        actualizarTodo();
    }

    function actualizarTodo() {
        // BLOG
        document.getElementById('lista-media').innerHTML = DATA.media.map(m => {
            let mediaContent = m.vId ? `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${m.vId}" frameborder="0" allowfullscreen></iframe>` : `<img src="${m.u}" class="w-100" style="height:200px; object-fit:cover;">`;
            return `<div class="media-card">${mediaContent}<div class="p-2"><b>${m.t}</b></div></div>`;
        }).join('');

        // EQUIPO
        document.getElementById('lista-equipo').innerHTML = DATA.catequistas.map(c => `
            <div class="cat-card">
                <div><b>${c.n}</b><br><small class="text-muted">Catequista</small></div>
                <a href="https://wa.me/591${c.t}" target="_blank" class="wa-btn"><i class="bi bi-whatsapp"></i></a>
            </div>`).join('');
        
        document.getElementById('lista-grupos').innerHTML = DATA.grupos.map(g => `<div class="p-2 border mb-1 rounded bg-white"><b>${g.n}</b> - ${g.c}</div>`).join('');
        
        // SELECTORES
        const gOpts = DATA.grupos.map(g => `<option value="${g.n}">${g.n}</option>`).join('');
        document.getElementById('g-cat').innerHTML = DATA.catequistas.map(c => `<option value="${c.n}">${c.n}</option>`).join('');
        document.getElementById('j-grupo-reg').innerHTML = gOpts;
        document.getElementById('filtro-grupo').innerHTML = '<option value="">Seleccionar Grupo...</option>' + gOpts;

        // OTROS DATOS
        document.getElementById('lista-lib').innerHTML = DATA.libros.map(l => `<div class="p-2 border-bottom d-flex justify-content-between"><span>${l.t}</span><a href="${l.u}" target="_blank" class="btn btn-sm btn-outline-primary">Abrir</a></div>`).join('');
        document.getElementById('lista-agenda').innerHTML = DATA.agenda.map(a => `<div class="agenda-item d-flex justify-content-between ${a.done?'done':''}"><span>${a.t}</span><input type="checkbox" ${a.done?'checked':''} onclick="toggleAgenda(${a.id})"></div>`).join('');
        document.getElementById('s-bs').innerText = "Bs. " + DATA.saldo.toFixed(2);
        document.getElementById('lista-caja').innerHTML = DATA.caja.map(c => `<div class="small border-bottom">${c.m} Bs - ${c.d}</div>`).join('');
        document.getElementById('lista-inv').innerHTML = DATA.inventario.map(i => `<div class="d-flex justify-content-between border-bottom p-1"><span>${i.n}</span><b>${i.c}</b></div>`).join('');
        document.getElementById('lista-msg').innerHTML = DATA.mensajes.map(m => `<div class="msg-bubble"><b>${m.u}:</b> ${m.t}</div>`).join('');
        actualizarListaJovenes();
    }

    function actualizarListaJovenes() {
        const filter = document.getElementById('filtro-grupo').value;
        if(userAct === 'Joven' && !filter) {
            document.getElementById('tabla-jovenes').innerHTML = "<p class='text-center p-3'>Selecciona un grupo para ver la lista.</p>";
            return;
        }
        const list = filter ? DATA.jovenes.filter(j => j.grupo === filter) : DATA.jovenes;
        document.getElementById('tabla-jovenes').innerHTML = list.map(j => `
            <div class="check-item d-flex justify-content-between align-items-center">
                <div><b>${j.nombre}</b><br><small>${j.grupo}</small></div>
                <div class="d-flex gap-2 text-center">
                    ${userAct !== 'Joven' ? `
                        <div><small class="d-block">LISTA</small><input type="checkbox" ${j.presente?'checked':''} onclick="tglJ(${j.id},'presente')"></div>
                        <div><small class="d-block">TAREA</small><input type="checkbox" ${j.tarea?'checked':''} onclick="tglJ(${j.id},'tarea')"></div>
                    ` : `
                        <span class="badge ${j.presente ? 'bg-success' : 'bg-secondary'}">${j.presente ? 'Presente' : 'Ausente'}</span>
                    `}
                </div>
            </div>`).join('');
    }

    // FUNCIONES DE ACCIÓN
    function addMedia() {
        const t = document.getElementById('m-tit').value, v = document.getElementById('m-url').value, f = document.getElementById('m-img-file').files[0];
        const cb = (u) => { DATA.media.unshift({t, u, vId:v}); save(); };
        if(f) { const r = new FileReader(); r.onloadend = () => cb(r.result); r.readAsDataURL(f); } else { cb(""); }
    }
    function addJoven() {
        const n = document.getElementById('j-nom-reg').value, g = document.getElementById('j-grupo-reg').value;
        if(n && g) { DATA.jovenes.unshift({id:Date.now(), nombre:n, grupo:g, presente:false, tarea:false}); save(); document.getElementById('j-nom-reg').value=""; }
    }
    function tglJ(id, k) { if(userAct === 'Joven') return; const j = DATA.jovenes.find(x => x.id === id); if(j){ j[k]=!j[k]; save(); } }
    function addAgenda() { const t = document.getElementById('a-task').value; if(t){ DATA.agenda.unshift({id:Date.now(), t, done:false}); save(); document.getElementById('a-task').value=""; } }
    function toggleAgenda(id) { if(userAct === 'Joven') return; const a = DATA.agenda.find(x => x.id === id); if(a){ a.done=!a.done; save(); } }
    function addCate() { const n = document.getElementById('cat-nom').value, t = document.getElementById('cat-tel').value; DATA.catequistas.unshift({n, t}); save(); }
    function addGroup() { const n = document.getElementById('g-nom').value, c = document.getElementById('g-cat').value; DATA.grupos.unshift({n, c}); save(); }
    function addLib() { const t = document.getElementById('l-tit').value, u = document.getElementById('l-url').value; DATA.libros.unshift({t, u}); save(); }
    function mon(v) { const m = parseFloat(document.getElementById('c-mon').value), d = document.getElementById('c-det').value; if(!isNaN(m)){ DATA.saldo+=(m*v); DATA.caja.unshift({m:m*v, d}); save(); } }
    function addInv() { const n = document.getElementById('i-item').value, c = document.getElementById('i-cant').value; DATA.inventario.unshift({n, c}); save(); }
    function sendMsg() { const t = document.getElementById('j-msg').value; if(t){ DATA.mensajes.push({u: userAct, t}); save(); document.getElementById('j-msg').value=""; } }

    window.onload = () => { 
        const s = JSON.parse(localStorage.getItem('SESION_TOTAL')); 
        if(s) run(s.rol); 
        else actualizarTodo(); 
    };
</script>
</body>
                </html>
