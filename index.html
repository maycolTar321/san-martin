<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CAT SAN MARTÍN PRO MAX</title>

<style>
:root{
--guindo:#6e0d25;
--oro:#d4af37;
--bg:#fdfaf6;
--white:#fff;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{display:flex;height:100vh;font-family:sans-serif;background:var(--bg);}

/* LOGIN */
#login{
position:fixed;inset:0;background:#000;color:#fff;
display:flex;align-items:center;justify-content:center;
z-index:999;
}

/* SIDEBAR */
.sidebar{
width:260px;background:var(--guindo);color:#fff;padding:20px;
display:flex;flex-direction:column;
}
.nav{margin:10px 0;cursor:pointer;padding:10px;border-radius:10px;}
.nav:hover{background:rgba(255,255,255,0.1);}

/* MAIN */
.main{flex:1;padding:20px;overflow:auto;}
.view{display:none;}
.view.active{display:block;}

.card{
background:#fff;padding:15px;margin:10px 0;
border-radius:15px;
transition:0.3s;
}
.card:hover{transform:translateY(-3px);}

button{
padding:10px;border:none;background:var(--guindo);color:#fff;
border-radius:8px;cursor:pointer;
}
.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div>
<h2>Login</h2>
<input id="u" placeholder="usuario"><br>
<input id="p" type="password" placeholder="password"><br>
<button onclick="Core.login()">Entrar</button>
</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>San Martín</h2>

<div class="nav" onclick="Core.nav('dash')">🏠 Inicio</div>
<div class="nav" onclick="Core.nav('fin')">💰 Finanzas</div>
<div class="nav" onclick="Core.nav('inv')">📦 Inventario</div>
<div class="nav" onclick="Core.nav('act')">🎉 Actividades</div>
<div class="nav" onclick="Core.nav('cal')">📅 Calendario</div>
<div class="nav" onclick="Core.nav('lib')">📚 Biblioteca</div>
<div class="nav" onclick="Core.nav('task')">🧑‍🤝‍🧑 Tareas</div>

<p id="rol"></p>
</div>

<!-- MAIN -->
<div class="main">

<div id="dash" class="view active"><h1>Bienvenido</h1></div>

<div id="fin" class="view">
<h2>Finanzas</h2>
<button onclick="Core.setCaja()">Caja Inicial</button>
<input id="monto" placeholder="monto">
<input id="concepto" placeholder="concepto">
<button onclick="Core.addFin()">Agregar</button>
<div id="fin-list"></div>
<h3 id="total"></h3>
</div>

<div id="inv" class="view">
<h2>Inventario</h2>
<button onclick="Core.addInv()">Agregar</button>
<div id="inv-list"></div>
</div>

<div id="act" class="view">
<h2>Actividades</h2>
<button onclick="Core.addAct()">Nueva</button>
<div id="act-list"></div>
</div>

<div id="cal" class="view">
<h2>Calendario</h2>
<button onclick="Core.addCal()">Evento</button>
<div id="cal-list"></div>
</div>

<div id="lib" class="view">
<h2>Biblioteca</h2>
<button onclick="Core.addPDF()">Subir PDF</button>
<div id="lib-list"></div>
</div>

<div id="task" class="view">
<h2>Tareas</h2>
<button onclick="Core.addTask()">Nueva tarea</button>
<div id="task-list"></div>
</div>

</div>

<script>
const Core = {

user:null,

data:{
caja: parseFloat(localStorage.getItem('caja'))||0,
fin: JSON.parse(localStorage.getItem('fin'))||[],
inv: JSON.parse(localStorage.getItem('inv'))||[],
act: JSON.parse(localStorage.getItem('act'))||[],
cal: JSON.parse(localStorage.getItem('cal'))||[],
lib: JSON.parse(localStorage.getItem('lib'))||[],
task: JSON.parse(localStorage.getItem('task'))||[]
},

login(){
let u=document.getElementById("u").value.trim();
let p=document.getElementById("p").value.trim();

if(u==="admin"&&p==="123"){this.user="admin";}
else if(u==="catequista"&&p==="123"){this.user="catequista";}
else if(u==="joven"&&p==="123"){this.user="joven";}
else return alert("error");

document.getElementById("login").style.display="none";
document.getElementById("rol").innerText=this.user;

this.render();
},

nav(id){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
document.getElementById(id).classList.add("active");
},

setCaja(){
if(this.user!=="admin")return alert("solo admin");
let v=prompt("monto");
this.data.caja=parseFloat(v);
localStorage.setItem("caja",this.data.caja);
this.render();
},

addFin(){
let m=parseFloat(monto.value);
let c=concepto.value;
if(!m||!c)return;
this.data.fin.push({m,c});
localStorage.setItem("fin",JSON.stringify(this.data.fin));
this.render();
},

addInv(){
if(this.user!=="admin")return;
let n=prompt("producto");
let c=prompt("cantidad");
this.data.inv.push({n,c});
localStorage.setItem("inv",JSON.stringify(this.data.inv));
this.render();
},

addAct(){
let t=prompt("titulo");
let f=prompt("fecha");
let img=prompt("flyer");
this.data.act.push({t,f,img});
localStorage.setItem("act",JSON.stringify(this.data.act));
this.render();
},

addCal(){
let e=prompt("evento");
let f=prompt("fecha");
this.data.cal.push({e,f});
localStorage.setItem("cal",JSON.stringify(this.data.cal));
this.render();
},

addPDF(){
if(this.user!=="admin")return;
let n=prompt("nombre");
let l=prompt("link");
this.data.lib.push({n,l});
localStorage.setItem("lib",JSON.stringify(this.data.lib));
this.render();
},

addTask(){
if(this.user==="joven")return;
let t=prompt("tarea");
this.data.task.push({t});
localStorage.setItem("task",JSON.stringify(this.data.task));
this.render();
},

render(){

let total=this.data.caja;

document.getElementById("fin-list").innerHTML=
this.data.fin.map(f=>{
total+=f.m;
return `<div class="card">${f.c} Bs ${f.m}</div>`;
}).join("");

document.getElementById("total").innerText="Total Bs "+total;

document.getElementById("inv-list").innerHTML=
this.data.inv.map(i=>`<div class="card">${i.n} (${i.c})</div>`).join("");

document.getElementById("act-list").innerHTML=
this.data.act.map(a=>`
<div class="card">
<img src="${a.img}" width="100%">
<h3>${a.t}</h3>
<p>${a.f}</p>
</div>`).join("");

document.getElementById("cal-list").innerHTML=
this.data.cal.map(c=>`<div class="card">${c.e} - ${c.f}</div>`).join("");

document.getElementById("lib-list").innerHTML=
this.data.lib.map(l=>`<div class="card"><a href="${l.l}" target="_blank">${l.n}</a></div>`).join("");

document.getElementById("task-list").innerHTML=
this.data.task.map(t=>`<div class="card">${t.t}</div>`).join("");

}

};
</script>

</body>
</html>
