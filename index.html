<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catequesis PRO</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--primary:#22c55e;
--text:#fff;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--bg);
color:var(--text);
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
justify-content:center;
height:100vh;
padding:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
cursor:pointer;
}

/* APP */
.app{
display:none;
}

/* SIDEBAR */
.sidebar{
position:fixed;
width:220px;
height:100%;
background:#020617;
padding-top:20px;
}

.sidebar button{
display:block;
width:100%;
padding:12px;
background:none;
border:none;
color:white;
text-align:left;
}

/* MAIN */
.main{
margin-left:220px;
padding:15px;
}

/* MOBILE */
@media(max-width:768px){
.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
overflow:auto;
}
.main{
margin-left:0;
}
}

/* SECTIONS */
.section{display:none;}
.active{display:block;}

/* CARDS */
.card{
background:var(--card);
padding:15px;
border-radius:15px;
margin:10px 0;
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.small{font-size:12px;color:#94a3b8;}

</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login Catequesis</h2>
<input id="email" placeholder="Correo">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<button onclick="register()">Crear cuenta</button>
</div>

<!-- APP -->
<div id="app" class="app">

<div class="sidebar">
<button onclick="ver('dashboard')">📊 Dashboard</button>
<button onclick="ver('catequistas')">👥 Catequistas</button>
<button onclick="ver('grupos')">📚 Grupos</button>
<button onclick="ver('confirmantes')">🙋 Confirmantes</button>
<button onclick="ver('tareas')">📝 Tareas</button>
<button onclick="ver('blog')">💬 Blog</button>
<button onclick="ver('biblioteca')">📖 Biblioteca</button>
<button onclick="ver('eventos')">📅 Eventos</button>
<button onclick="ver('publicidad')">📢 Publicidad</button>
<button onclick="logout()">🚪 Salir</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Dashboard</h2>
<div class="grid">
<div class="card">Catequistas: <span id="totalCatequistas"></span></div>
<div class="card">Grupos: <span id="totalGrupos"></span></div>
<div class="card">Confirmantes: <span id="totalConfirmantes"></span></div>
<div class="card">Tareas: <span id="totalTareas"></span></div>
</div>
</div>

<!-- CATEQUISTAS -->
<div id="catequistas" class="section">
<input id="cNombre" placeholder="Nombre completo">
<input id="cCel" placeholder="Celular">
<button onclick="addCatequista()">Agregar</button>
<div id="listaCatequistas"></div>
</div>

<!-- GRUPOS -->
<div id="grupos" class="section">
<input id="gNombre" placeholder="Nombre grupo">
<button onclick="addGrupo()">Crear</button>
<div id="listaGrupos"></div>
</div>

<!-- CONFIRMANTES -->
<div id="confirmantes" class="section">
<input id="uNombre" placeholder="Nombre">
<select id="uGrupo"></select>
<button onclick="addConfirmante()">Agregar</button>
<div id="listaConfirmantes"></div>
</div>

<!-- TAREAS -->
<div id="tareas" class="section">
<input id="tTexto" placeholder="Tarea">
<select id="tGrupo"></select>
<button onclick="addTarea()">Crear</button>
<div id="listaTareas"></div>
</div>

<!-- BLOG -->
<div id="blog" class="section">
<textarea id="bTexto"></textarea>
<button onclick="addPost()">Publicar</button>
<div id="listaBlog"></div>
</div>

<!-- BIBLIOTECA -->
<div id="biblioteca" class="section">
<input id="libro" placeholder="Libro">
<button onclick="addLibro()">Agregar</button>
<div id="listaLibros"></div>
</div>

<!-- EVENTOS -->
<div id="eventos" class="section">
<input id="eNombre" placeholder="Evento">
<input type="date" id="eFecha">
<button onclick="addEvento()">Guardar</button>
<div id="listaEventos"></div>
</div>

<!-- PUBLICIDAD -->
<div id="publicidad" class="section">
<input id="publi" placeholder="Mensaje">
<button onclick="addPubli()">Publicar</button>
<div id="listaPubli"></div>
</div>

</div>
</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {
users:[],
catequistas:[],
grupos:[],
confirmantes:[],
tareas:[],
blog:[],
libros:[],
eventos:[],
publicidad:[]
};

function save(){
localStorage.setItem("db", JSON.stringify(db));
}

// LOGIN
function register(){
db.users.push({email:email.value,pass:pass.value});
save();
alert("Cuenta creada");
}

function login(){
let u = db.users.find(x=>x.email==email.value && x.pass==pass.value);
if(u){
localStorage.setItem("session",email.value);
mostrar();
}else{
alert("Error");
}
}

function logout(){
localStorage.removeItem("session");
location.reload();
}

if(localStorage.getItem("session")) mostrar();

function mostrar(){
login.style.display="none";
app.style.display="block";
render();
}

// NAV
function ver(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// FUNCIONES
function addCatequista(){
db.catequistas.push({nombre:cNombre.value,cel:cCel.value});
save();render();
}

function addGrupo(){
db.grupos.push({nombre:gNombre.value});
save();render();
}

function addConfirmante(){
db.confirmantes.push({nombre:uNombre.value,grupo:uGrupo.value});
save();render();
}

function addTarea(){
db.tareas.push({texto:tTexto.value,grupo:tGrupo.value});
save();render();
}

function addPost(){
db.blog.push({texto:bTexto.value});
save();render();
}

function addLibro(){
db.libros.push({nombre:libro.value});
save();render();
}

function addEvento(){
db.eventos.push({nombre:eNombre.value,fecha:eFecha.value});
save();render();
}

function addPubli(){
db.publicidad.push({texto:publi.value});
save();render();
}

// RENDER
function render(){

uGrupo.innerHTML="";
tGrupo.innerHTML="";

listaCatequistas.innerHTML=db.catequistas.map(c=>`<div class="card">${c.nombre} <div class="small">${c.cel}</div></div>`).join("");

listaGrupos.innerHTML=db.grupos.map(g=>{
uGrupo.innerHTML+=`<option>${g.nombre}</option>`;
tGrupo.innerHTML+=`<option>${g.nombre}</option>`;
return `<div class="card">${g.nombre}</div>`;
}).join("");

listaConfirmantes.innerHTML=db.confirmantes.map(u=>`<div class="card">${u.nombre} - ${u.grupo}</div>`).join("");

listaTareas.innerHTML=db.tareas.map(t=>`<div class="card">${t.texto}</div>`).join("");

listaBlog.innerHTML=db.blog.map(b=>`<div class="card">${b.texto}</div>`).join("");

listaLibros.innerHTML=db.libros.map(l=>`<div class="card">${l.nombre}</div>`).join("");

listaEventos.innerHTML=db.eventos.map(e=>`<div class="card">${e.nombre} - ${e.fecha}</div>`).join("");

listaPubli.innerHTML=db.publicidad.map(p=>`<div class="card">${p.texto}</div>`).join("");

totalCatequistas.innerText=db.catequistas.length;
totalGrupos.innerText=db.grupos.length;
totalConfirmantes.innerText=db.confirmantes.length;
totalTareas.innerText=db.tareas.length;

}

</script>

</body>
</html>
