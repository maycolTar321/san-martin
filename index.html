<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santa Clara - Control de Distribución</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #0ea5e9; --bg: #0f172a; --card: #1e293b; --success: #10b981; --warning: #facc15; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; padding-bottom: 30px; }

        header { background: #075985; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #334155; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: var(--success); color: white; }
        .btn-w { background: var(--warning); color: #000; }

        .client-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border-left: 5px solid transparent; }
        .recurrente { border-left-color: var(--success); }
        .poca-frecuencia { border-left-color: var(--warning); }
        
        .hidden { display: none; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; overflow-y: auto; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #334155; }
    </style>
</head>
<body>

<header>
    <h1><i class="fas fa-tint"></i> SANTA CLARA</h1>
    <p>Control de Ventas y Envases</p>
</header>

<div class="container">
    <div id="step-vendedor" class="card">
        <h3><i class="fas fa-user-circle"></i> Iniciar Turno</h3>
        <select id="vendedor-activo">
            <option value="Adriana">Adriana</option>
            <option value="Maycol">Maycol</option>
            <option value="Lidia">Lidia (Admin)</option>
        </select>
        <button class="btn btn-p" onclick="iniciarSesion()">Empezar Ruta</button>
    </div>

    <div id="step-busqueda" class="hidden">
        <div class="card">
            <h3><i class="fas fa-users"></i> Buscar Cliente</h3>
            <input type="text" id="search-input" placeholder="Nombre o barrio..." onkeyup="filtrar()">
            <div id="lista-clientes" style="max-height: 250px; overflow-y: auto;">
                </div>
            <button class="btn btn-w" style="margin-top: 10px;" onclick="abrirRegistroNuevo()">
                <i class="fas fa-user-plus"></i> NUEVO CLIENTE (No está en lista)
            </button>
        </div>
    </div>

    <div id="step-venta" class="hidden">
        <div class="card" style="border: 2px solid var(--success);">
            <h3 id="cliente-seleccionado-nombre" style="color: var(--success);"></h3>
            <p id="cliente-seleccionado-info" style="font-size: 0.8rem; margin-bottom: 10px;"></p>
            
            <label>Producto:</label>
            <select id="prod-venta">
                <option value="15">Botellón 20L - Bs 15</option>
                <option value="8">Botellón 10L - Bs 8</option>
                <option value="10">Hielo Cubos (P) - Bs 10</option>
                <option value="20">Hielo Cubos (G) - Bs 20</option>
            </select>

            <label>Cantidad:</label>
            <input type="number" id="cant-venta" placeholder="Ej: 5">
            
            <button class="btn btn-s" onclick="finalizarVenta()">
                <i class="fas fa-shopping-cart"></i> CONFIRMAR VENTA
            </button>
            <button class="btn" style="background:none; color:gray; font-size: 0.8rem;" onclick="cancelarSeleccion()">
                Cambiar de Cliente
            </button>
        </div>
    </div>
</div>

<div id="modal-nuevo" class="modal hidden">
    <h2><i class="fas fa-plus"></i> Registrar Nuevo Cliente</h2>
    <p style="font-size: 0.8rem; margin-bottom: 15px;">Esto capturará la ubicación GPS actual para el control de envases.</p>
    
    <input type="text" id="new-nombre" placeholder="Nombre completo o Negocio">
    <input type="text" id="new-whatsapp" placeholder="WhatsApp (Obligatorio)">
    <input type="text" id="new-barrio" placeholder="Barrio / Zona">
    <input type="text" id="new-ref" placeholder="Referencia de casa/portón">
    
    <button class="btn btn-s" onclick="guardarNuevo()">
        <i class="fas fa-save"></i> GUARDAR Y SELECCIONAR
    </button>
    <button class="btn" style="margin-top:10px; background:#444;" onclick="cerrarRegistroNuevo()">Cerrar</button>
</div>

<script>
    // 1. Datos iniciales (Prueba)
    let db = JSON.parse(localStorage.getItem('sc_db')) || {
        clientes: [
            {id: 1, nombre: "Tienda Doña Juana", barrio: "San Roque", ws: "75123456", tipo: "recurrente", ref: "Portón verde", gps: "-21.5, -64.7"},
            {id: 2, nombre: "Pensión El Tejar", barrio: "El Tejar", ws: "75198765", tipo: "recurrente", ref: "Frente a la plaza", gps: "-21.5, -64.7"},
            {id: 3, nombre: "Mini Mercado Central", barrio: "Centro", ws: "78945612", tipo: "poca-frecuencia", ref: "Esquina blanca", gps: "-21.5, -64.7"},
            {id: 4, nombre: "Gimnasio Fitness", barrio: "Senac", ws: "65147852", tipo: "poca-frecuencia", ref: "Puerta de vidrio", gps: "-21.5, -64.7"},
            {id: 5, nombre: "Hospital Regional", barrio: "San Roque", ws: "60123987", tipo: "recurrente", ref: "Entrada emergencias", gps: "-21.5, -64.7"},
            {id: 6, nombre: "Comedor Universitario", barrio: "Centro", ws: "77788899", tipo: "poca-frecuencia", ref: "Segunda planta", gps: "-21.5, -64.7"}
        ],
        ventas: []
    };

    let vendedor = "";
    let clienteActivo = null;

    // 2. Lógica de Flujo
    function iniciarSesion() {
        vendedor = document.getElementById('vendedor-activo').value;
        document.getElementById('step-vendedor').classList.add('hidden');
        document.getElementById('step-busqueda').classList.remove('hidden');
        renderLista();
    }

    function renderLista() {
        const cont = document.getElementById('lista-clientes');
        cont.innerHTML = db.clientes.map(c => `
            <div class="client-item ${c.tipo}" onclick="seleccionar(${c.id})">
                <strong>${c.nombre}</strong> <span class="badge">${c.tipo}</span><br>
                <small><i class="fas fa-map-marker-alt"></i> ${c.barrio} | <i class="fab fa-whatsapp"></i> ${c.ws}</small>
            </div>
        `).join('');
    }

    function seleccionar(id) {
        clienteActivo = db.clientes.find(c => c.id === id);
        document.getElementById('cliente-seleccionado-nombre').innerText = clienteActivo.nombre;
        document.getElementById('cliente-seleccionado-info').innerText = `Zona: ${clienteActivo.barrio} | Ref: ${clienteActivo.ref}`;
        
        document.getElementById('step-busqueda').classList.add('hidden');
        document.getElementById('step-venta').classList.remove('hidden');
    }

    function cancelarSeleccion() {
        clienteActivo = null;
        document.getElementById('step-venta').classList.add('hidden');
        document.getElementById('step-busqueda').classList.remove('hidden');
    }

    // 3. Registro de Nuevo Cliente
    function abrirRegistroNuevo() { document.getElementById('modal-nuevo').classList.remove('hidden'); }
    function cerrarRegistroNuevo() { document.getElementById('modal-nuevo').classList.add('hidden'); }

    function guardarNuevo() {
        const n = document.getElementById('new-nombre').value;
        const w = document.getElementById('new-whatsapp').value;
        const b = document.getElementById('new-barrio').value;
        const r = document.getElementById('new-ref').value;

        if(!n || !w) return alert("Nombre y WhatsApp son obligatorios");

        navigator.geolocation.getCurrentPosition((pos) => {
            const nuevo = {
                id: Date.now(),
                nombre: n,
                ws: w,
                barrio: b,
                ref: r,
                tipo: "nuevo-registrado",
                gps: `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`
            };
            db.clientes.push(nuevo);
            localStorage.setItem('sc_db', JSON.stringify(db));
            cerrarRegistroNuevo();
            seleccionar(nuevo.id); // Pasa directo a la venta
        }, (err) => alert("Error: Debes activar el GPS para registrar clientes nuevos."));
    }

    // 4. Venta Final
    function finalizarVenta() {
        const cant = document.getElementById('cant-venta').value;
        const p = document.getElementById('prod-venta');
        const total = cant * p.value;

        if(!cant || cant <= 0) return alert("Ingresa cantidad válida");

        const venta = {
            fecha: new Date().toLocaleString(),
            vendedor: vendedor,
            cliente: clienteActivo.nombre,
            producto: p.options[p.selectedIndex].text,
            cantidad: cant,
            total: total,
            gps: clienteActivo.gps
        };

        db.ventas.push(venta);
        localStorage.setItem('sc_db', JSON.stringify(db));
        
        alert(`Venta registrada exitosamente para ${clienteActivo.nombre}.\nTotal: Bs ${total}`);
        
        document.getElementById('cant-venta').value = "";
        cancelarSeleccion();
    }

    function filtrar() {
        const q = document.getElementById('search-input').value.toLowerCase();
        document.querySelectorAll('.client-item').forEach(i => {
            i.style.display = i.innerText.toLowerCase().includes(q) ? 'block' : 'none';
        });
    }
</script>
</body>
</html>
