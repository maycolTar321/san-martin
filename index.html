<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA MAYCOL V9 - GESTIÓN TOTAL</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135706.png">

    <style>
        :root {
            --primary: #1e293b;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --water: #0ea5e9;
            --reg: #f43f5e;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
        }

        /* --- ESTILOS GENERALES --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--primary);
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* --- NAVEGACIÓN --- */
        .nav-bottom {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: var(--primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -4px 15px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        .nav-item {
            color: #94a3b8;
            text-decoration: none;
            font-size: 12px;
            text-align: center;
            flex: 1;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .nav-item.active { color: white; font-weight: bold; }
        .nav-item span { font-size: 22px; }

        /* --- PÁGINAS --- */
        .page { display: none; padding: 20px; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .header-main { padding: 10px 0 20px 0; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
        .header-main h1 { margin: 0; font-size: 24px; letter-spacing: -0.5px; }

        /* --- INDICADORES (STATS) --- */
        .dashboard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-box { 
            background: var(--card-bg); 
            padding: 15px; 
            border-radius: 18px; 
            border-top: 4px solid var(--accent);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .stat-box label { color: #64748b; font-size: 11px; text-transform: uppercase; font-weight: bold; }
        .stat-box .val { font-size: 18px; font-weight: 800; margin-top: 4px; }

        /* --- TARJETAS --- */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .section-title { font-size: 14px; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; color: #475569; }

        /* --- BOTONES --- */
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-green { background: var(--success); color: white; }
        .btn-water { background: var(--water); color: white; }
        .btn-reg { background: var(--reg); color: white; }
        .btn-net { background: #6366f1; color: white; }
        .btn-outline { background: white; border: 2.5px solid #e2e8f0; color: var(--primary); }
        .btn:active { transform: scale(0.96); filter: brightness(0.9); }

        /* --- MODAL DE EDICIÓN --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content { background: white; border-radius: 20px; width: 100%; max-width: 400px; padding: 25px; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; }

        /* --- LISTADO HISTORIAL --- */
        .history-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 8px;
            border: 1px solid #f1f5f9;
        }
        .hist-info b { display: block; font-size: 15px; color: #1e293b; }
        .hist-info small { color: #94a3b8; font-size: 11px; }
        .hist-actions { display: flex; align-items: center; gap: 12px; }
        .hist-amt { font-weight: 900; color: #1e293b; }
        .icon-btn { font-size: 18px; padding: 8px; cursor: pointer; }
        .btn-edit { color: var(--accent); }
        .btn-del { color: var(--danger); }

        /* --- PDF PRINT STYLE --- */
        @media print {
            .nav-bottom, .btn, #cobros, .section-title { display: none !important; }
            .page { display: block !important; padding: 0; }
            #reportes { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="cobros" class="page active">
        <div class="header-main">
            <h1>Registro de Operaciones</h1>
            <small id="currentDateDisplay" style="color: #64748b; font-weight: bold;"></small>
        </div>

        <div class="dashboard-stats">
            <div class="stat-box" style="border-top-color: var(--success);">
                <label>Recaudación Oficina</label>
                <div class="val" id="totalOficina">0 Bs</div>
            </div>
            <div class="stat-box" style="border-top-color: var(--reg);">
                <label>Ingreso Registro</label>
                <div class="val" id="totalRegistro">0 Bs</div>
            </div>
        </div>

        <div class="card">
            <div class="section-title">🏢 APORTES OFICINA (10 BS)</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn btn-green" onclick="registrar('Ximena', 10, 'Oficina')">Ximena</button>
                <button class="btn btn-green" onclick="registrar('Maycol', 10, 'Oficina')">Maycol</button>
                <button class="btn btn-green" onclick="registrar('Samuel', 10, 'Oficina')">Samuel</button>
                <button id="btnNilsa" class="btn btn-green" onclick="registrar(oficialName, 10, 'Oficina')">Nilsa</button>
            </div>
        </div>

        <div class="card" style="border-left: 6px solid var(--reg);">
            <div class="section-title">📄 REGISTRO CIVIL (36 BS)</div>
            <button class="btn btn-reg" onclick="registrar('Registro Civil - Internet', 36, 'Ingreso Registro')">Cobrar Internet Registro</button>
        </div>

        <div class="card" style="border-left: 6px solid var(--water);">
            <div class="section-title">💧 COMPRA DE AGUA (36 BS)</div>
            <button class="btn btn-water" onclick="registrar('Agua: Nilsa y Maycol', 36, 'Agua')">Pareja: Nilsa y Maycol</button>
            <button class="btn btn-water" onclick="registrar('Agua: Samuel y Ximena', 36, 'Agua')">Pareja: Samuel y Ximena</button>
        </div>

        <div class="card" style="border-left: 6px solid #6366f1;">
            <div class="section-title">🌐 GASTOS GENERALES (179 BS)</div>
            <button class="btn btn-net" onclick="registrar('Pago Internet Mensual', 179, 'Gasto Internet')">Pagar Internet Matriz</button>
        </div>

        <div class="card">
            <div class="section-title">⚙️ CONFIGURACIÓN</div>
            <input type="text" id="oficialInput" placeholder="Cambiar nombre de Oficial...">
            <button class="btn btn-outline" onclick="saveOficialName()">Actualizar Nombre Oficial</button>
        </div>
    </div>

    <div id="reportes" class="page">
        <div class="header-main">
            <h1>Reporte Detallado</h1>
        </div>

        <div class="card">
            <div class="section-title">📈 RESUMEN POR PERSONA / CONCEPTO</div>
            <div id="resumenReporte"></div>
            <hr style="border: 0; border-top: 1px dashed #cbd5e1; margin: 15px 0;">
            <div style="display:flex; justify-content:space-between; font-size: 18px;">
                <strong>CAJA TOTAL:</strong>
                <strong id="cajaTotal" style="color:var(--accent);">0 Bs</strong>
            </div>
        </div>

        <div class="card" style="background: transparent; border: none; padding: 0;">
            <div class="section-title">📜 HISTORIAL CON EDICIÓN</div>
            <div id="historialList"></div>
        </div>

        <button class="btn btn-net" onclick="exportarCSV()">📥 Descargar Datos (CSV)</button>
        <button class="btn btn-outline" onclick="window.print()">🖨️ Generar Reporte PDF</button>
        <button class="btn" style="background:var(--danger); color:white; margin-top: 20px;" onclick="resetDatabase()">⚠️ BORRAR TODO EL MES</button>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Editar Registro</h3>
            <label>Nombre/Concepto:</label>
            <input type="text" id="editNombre">
            <label>Monto (Bs):</label>
            <input type="number" id="editMonto">
            <input type="hidden" id="editId">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
                <button class="btn btn-green" onclick="saveEdit()">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item active" onclick="navigate('cobros', this)">
            <span>📱</span>Cobros
        </a>
        <a href="#" class="nav-item" onclick="navigate('reportes', this)">
            <span>📊</span>Reportes
        </a>
    </nav>

    <script>
        // --- BASE DE DATOS Y PERSISTENCIA ---
        let storage = JSON.parse(localStorage.getItem('MAYCOL_AVILA_OS_V9')) || [];
        let oficialName = localStorage.getItem('OFICIAL_VAR_V9') || "Nilsa";

        // --- LÓGICA DE NAVEGACIÓN ---
        function navigate(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            refresh();
        }

        // --- LÓGICA DE NEGOCIO ---
        function registrar(user, monto, tipo) {
            const now = new Date();
            const timestamp = now.toLocaleDateString() + " " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
            
            const nuevoRegistro = {
                id: Date.now(),
                fecha: timestamp,
                user: user,
                monto: parseFloat(monto),
                tipo: tipo
            };

            storage.push(nuevoRegistro);
            commit();
            alert("✅ Registro guardado: " + user);
        }

        function commit() {
            localStorage.setItem('MAYCOL_AVILA_OS_V9', JSON.stringify(storage));
            refresh();
        }

        function refresh() {
            const histCont = document.getElementById('historialList');
            const resCont = document.getElementById('resumenReporte');
            const totalOficinaEl = document.getElementById('totalOficina');
            const totalRegistroEl = document.getElementById('totalRegistro');
            const totalCajaEl = document.getElementById('cajaTotal');

            histCont.innerHTML = '';
            resCont.innerHTML = '';
            
            let ofiSum = 0, regSum = 0, totalGral = 0, summary = {};

            // Renderizado de Historial (Más reciente arriba)
            storage.slice().reverse().forEach(item => {
                if(item.tipo === 'Oficina') ofiSum += item.monto;
                if(item.tipo === 'Ingreso Registro') regSum += item.monto;
                totalGral += item.monto;

                summary[item.user] = (summary[item.user] || 0) + item.monto;

                histCont.innerHTML += `
                    <div class="history-row">
                        <div class="hist-info">
                            <b>${item.user}</b>
                            <small>${item.fecha} • ${item.tipo}</small>
                        </div>
                        <div class="hist-actions">
                            <span class="hist-amt">${item.monto} Bs</span>
                            <span class="icon-btn btn-edit" onclick="openModal(${item.id})">✏️</span>
                            <span class="icon-btn btn-del" onclick="deleteItem(${item.id})">✕</span>
                        </div>
                    </div>
                `;
            });

            // Renderizado de Resumen
            for(let key in summary) {
                resCont.innerHTML += `
                    <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                        <span>${key}</span>
                        <b>${summary[key]} Bs</b>
                    </div>
                `;
            }

            totalOficinaEl.innerText = ofiSum + " Bs";
            totalRegistroEl.innerText = regSum + " Bs";
            totalCajaEl.innerText = totalGral + " Bs";
            document.getElementById('btnNilsa').innerText = oficialName;
            document.getElementById('currentDateDisplay').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        // --- EDICIÓN Y ELIMINACIÓN ---
        function openModal(id) {
            const item = storage.find(x => x.id === id);
            document.getElementById('editNombre').value = item.user;
            document.getElementById('editMonto').value = item.monto;
            document.getElementById('editId').value = id;
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }

        function saveEdit() {
            const id = parseInt(document.getElementById('editId').value);
            const item = storage.find(x => x.id === id);
            item.user = document.getElementById('editNombre').value;
            item.monto = parseFloat(document.getElementById('editMonto').value);
            commit();
            closeModal();
        }

        function deleteItem(id) {
            if(confirm("¿Estás seguro de eliminar este registro definitivamente?")) {
                storage = storage.filter(x => x.id !== id);
                commit();
            }
        }

        function saveOficialName() {
            const name = document.getElementById('oficialInput').value;
            if(!name) return;
            oficialName = name;
            localStorage.setItem('OFICIAL_VAR_V9', name);
            refresh();
            alert("Nombre actualizado");
        }

        function resetDatabase() {
            if(confirm("❗ ADVERTENCIA: Se borrarán TODOS los datos acumulados. ¿Continuar?")) {
                storage = [];
                commit();
            }
        }

        function exportarCSV() {
            let csv = "\ufeffFecha,Responsable,Monto,Categoria\n";
            storage.forEach(i => csv += `${i.fecha},${i.user},${i.monto},${i.tipo}\n`);
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Reporte_Maycol_Avila_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        // --- INICIALIZACIÓN ---
        refresh();
    </script>
</body>
</html>
