<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZOE | Vida en Abundancia - Sistema Maestro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --zoe: #22c55e; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s ease; }
        
        /* Configuración Modo Oscuro */
        body.dark-mode { background-color: var(--dark); color: #f8fafc; }
        .dark-mode .glass { background: rgba(15, 23, 42, 0.9); border-color: #334155; }
        .dark-mode .card-custom { background: #1e293b !important; border: 1px solid #334155; color: white; }
        
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .edit-mode-active { outline: 3px dashed #3b82f6 !important; background: rgba(59, 130, 246, 0.1) !important; }
        
        .message-animate { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        #mural-grid img { border-radius: 20px; transition: transform 0.3s; cursor: pointer; }
        #mural-grid img:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="auth-screen" class="fixed inset-0 z-[500] bg-white dark:bg-slate-950 hidden flex items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-8 text-center">
            <div class="bg-green-600 w-24 h-24 rounded-[35px] flex items-center justify-center text-white text-4xl mx-auto shadow-2xl">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h2 class="text-4xl font-black mt-8 tracking-tighter">Acceso Admin</h2>
            <div class="space-y-4">
                <input type="text" id="user-in" placeholder="Usuario" class="w-full p-5 bg-slate-100 dark:bg-slate-900 rounded-[25px] outline-none font-bold">
                <input type="password" id="pass-in" placeholder="Contraseña" class="w-full p-5 bg-slate-100 dark:bg-slate-900 rounded-[25px] outline-none font-bold">
                <button onclick="login()" class="w-full bg-green-600 text-white py-5 rounded-[25px] font-black shadow-xl hover:bg-green-700 active:scale-95 transition-all">ACCEDER AL SERVIDOR</button>
                <button onclick="closeAuth()" class="text-slate-400 font-bold text-xs uppercase tracking-widest">Cancelar</button>
            </div>
        </div>
    </div>
